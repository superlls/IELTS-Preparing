<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思生词卡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

/* 顶栏 */
.topbar {
  width: 100%;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.topbar h1 {
  font-size: 1.3rem;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}
.topbar .counter {
  font-size: 0.95rem;
  color: #888;
  white-space: nowrap;
}
.search-box {
  flex: 1;
  min-width: 160px;
  max-width: 320px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.95rem;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: #6c63ff; }
.search-box svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  stroke: #666;
}
.btn-group {
  display: flex;
  gap: 8px;
}
.btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1a1a2e;
  color: #ccc;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.btn:hover { background: #252545; border-color: #6c63ff; color: #fff; }
.btn.active { background: #6c63ff; border-color: #6c63ff; color: #fff; }

/* 卡片容器 */
.card-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 720px;
  padding: 16px 24px 24px;
  perspective: 1200px;
}
.card-wrapper {
  width: 100%;
  aspect-ratio: 4 / 3;
  max-height: 70vh;
  cursor: pointer;
  position: relative;
}
.card {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,.2,.2,1);
}
.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  padding: 32px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 正面 */
.card-front {
  background: linear-gradient(135deg, #1e1e3a 0%, #2a2a4a 100%);
  border: 1px solid #333;
  align-items: center;
  justify-content: center;
}
.card-front .word {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700;
  color: #fff;
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}
.card-front .hint {
  margin-top: 20px;
  font-size: 0.85rem;
  color: #666;
}

/* 背面 */
.card-back {
  background: linear-gradient(135deg, #1a1a30 0%, #222244 100%);
  border: 1px solid #333;
  transform: rotateY(180deg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.card-back .back-word {
  font-size: 1.2rem;
  font-weight: 700;
  color: #b8b0ff;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #333;
}
.card-back p { margin: 4px 0; line-height: 1.65; font-size: 0.92rem; color: #d0d0d0; }
.card-back strong { color: #e8c547; font-weight: 600; }
.card-back table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 0.85rem;
}
.card-back th, .card-back td {
  padding: 6px 10px;
  border: 1px solid #3a3a5a;
  text-align: left;
}
.card-back th { background: #2a2a4a; color: #b8b0ff; font-weight: 600; }
.card-back td { color: #ccc; }
.card-back blockquote {
  border-left: 3px solid #6c63ff;
  padding: 8px 12px;
  margin: 8px 0;
  background: rgba(108,99,255,.08);
  font-size: 0.88rem;
  color: #aaa;
  border-radius: 0 6px 6px 0;
}
.card-back ul { padding-left: 20px; margin: 6px 0; }
.card-back li { margin: 3px 0; font-size: 0.9rem; line-height: 1.6; color: #ccc; }
.card-back code {
  background: #2a2a4a;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.88em;
  color: #e8c547;
}

/* 底部导航 */
.nav {
  width: 100%;
  max-width: 720px;
  padding: 0 24px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid #333;
  background: #1a1a2e;
  color: #ccc;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.nav-btn:hover { background: #252545; border-color: #6c63ff; color: #fff; }
.progress {
  font-size: 0.95rem;
  color: #888;
  min-width: 80px;
  text-align: center;
}

/* 列表模式 */
.list-area {
  width: 100%;
  max-width: 720px;
  padding: 0 24px 24px;
  display: none;
}
.list-area.active { display: block; }
.list-item {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .2s;
}
.list-item:hover { border-color: #6c63ff; }
.list-item-header {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.list-item-header .word { font-weight: 600; font-size: 1.05rem; color: #fff; }
.list-item-header .arrow {
  transition: transform .2s;
  color: #666;
  font-size: .8rem;
}
.list-item.open .arrow { transform: rotate(90deg); }
.list-item-body {
  display: none;
  padding: 0 18px 14px;
}
.list-item.open .list-item-body { display: block; }
.list-item-body p { margin: 4px 0; line-height: 1.65; font-size: 0.9rem; color: #ccc; }
.list-item-body strong { color: #e8c547; }
.list-item-body table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.82rem; }
.list-item-body th, .list-item-body td { padding: 5px 8px; border: 1px solid #3a3a5a; text-align: left; }
.list-item-body th { background: #2a2a4a; color: #b8b0ff; }
.list-item-body td { color: #bbb; }
.list-item-body blockquote {
  border-left: 3px solid #6c63ff;
  padding: 8px 12px;
  margin: 8px 0;
  background: rgba(108,99,255,.08);
  font-size: 0.85rem;
  color: #aaa;
  border-radius: 0 6px 6px 0;
}
.list-item-body ul { padding-left: 18px; margin: 6px 0; }
.list-item-body li { margin: 2px 0; font-size: 0.88rem; color: #bbb; }
.list-item-body code { background: #2a2a4a; padding: 1px 5px; border-radius: 4px; font-size: 0.88em; color: #e8c547; }

.card-area.hidden, .nav.hidden { display: none; }

@media (max-width: 500px) {
  .topbar { padding: 12px 16px; }
  .card-area { padding: 12px 16px 16px; }
  .card-face { padding: 20px; }
  .nav { padding: 0 16px 16px; }
  .list-area { padding: 0 16px 16px; }
}

/* 滚动条 */
.card-back::-webkit-scrollbar { width: 4px; }
.card-back::-webkit-scrollbar-track { background: transparent; }
.card-back::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>雅思生词卡</h1>
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="搜索单词...">
  </div>
  <span class="counter" id="total"></span>
  <div class="btn-group">
    <button class="btn" id="btnShuffle">随机</button>
    <button class="btn" id="btnList">列表</button>
  </div>
</div>

<div class="card-area" id="cardArea">
  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="word" id="frontWord"></div>
        <div class="hint">点击翻转</div>
      </div>
      <div class="card-face card-back">
        <div class="back-word" id="backWord"></div>
        <div id="backBody"></div>
      </div>
    </div>
  </div>
</div>

<div class="nav" id="navBar">
  <button class="nav-btn" id="prevBtn">&larr;</button>
  <span class="progress" id="progress"></span>
  <button class="nav-btn" id="nextBtn">&rarr;</button>
</div>

<div class="list-area" id="listArea"></div>

<script>
const ALL_CARDS = [{"word": "premier", "body": "**词性：** 形容词  \n**含义：** 排名第一的、地位最高的  \n**语域：** 正式、书面\n\n**vs. best 的区别：**\n\n| | premier | best |\n|---|---|---|\n| 语域 | 正式、书面 | 正式/口语均可 |\n| 含义侧重 | 地位/排名第一 | 质量/程度最好 |\n| 常见搭配 | 机构、职位、赛事 | 几乎任何名词 |\n| IELTS写作 | 加分词汇 | 过于基础 |\n\n**例句：**\n- Singapore's **premier** medical institution（书面，强调地位）\n- Singapore's **best** hospital（口语，主观评价）\n- the **Premier** League\n\n> **备考提示：** 写作中描述机构、城市、国家地位时，用 premier 替换 best/top，更有书面感。"}, {"word": "would like (to do)", "body": "**结构：** would like sb. to do sth.  \n**含义：** 希望某人做某事（礼貌表达，≠ will like）\n\n**语气对比：**\n- I **want** to go → 直接，略显粗鲁\n- I **would like** to go → 礼貌、正式\n\n**例句：**\n- They **would like** the college administration to exert more control...  \n  （他们希望学校行政部门加强管控）\n- She **would like** you to call her.\n- They **would like** him to resign.\n\n> **注意：** would like 是固定短语，与 will 的过去式无关，表示当下的委婉愿望。"}, {"word": "have/has come to do", "body": "**结构：** have/has come to + 动词原形  \n**含义：** 渐渐地……、慢慢演变成……（强调过程的积累性）\n\n**与普通完成时的区别：**\n- Humans **have dominated** the planet. → 强调结果\n- Humans **have come to dominate** the planet. → 强调逐渐演变的过程\n\n**例句：**\n- I **have come to** realize that I was wrong.（渐渐意识到）\n- She **has come to** accept the situation.（慢慢接受）\n- We **have come to** depend on smartphones.（越来越依赖）\n\n> **规律：** 后接认知/感受/状态类动词：realize, understand, believe, accept, dominate, depend on 等。"}, {"word": "out of my league", "body": "**词性：** 习语  \n**含义：** 我配不上（你）/ 不在同一档次 / 超出我的能力范围\n\n**来源：** 体育概念——不同水平的队伍分在不同 league（联赛），引申为档次/水平差距。\n\n**例句：**\n- She's **out of my league**.（她我配不上）\n- That job is **out of my league**.（那份工作我还不够格）\n- This project is **out of my league**.（这个项目超出我能力范围）\n\n**相关表达：**\n- in the same league = 同一水平，势均力敌\n- major league / minor league = 大联盟/小联盟，引申为大人物/小角色"}, {"word": "puppet", "body": "**词性：** 名词（可作定语）\n**含义：** ①木偶，玩偶；②傀儡（受人操控的人或政权）\n**语域：** 中性；比喻义多见于正式书面语（政治、新闻语境）\n\n**用法说明：**\n\"puppet\" 的核心隐喻是\"被操控者\"。字面义指手偶或木偶；引申义指缺乏自主权、受幕后势力摆布的人、政府或组织。常见搭配：\n\n| 搭配 | 含义 |\n|---|---|\n| puppet government / regime | 傀儡政府/政权 |\n| puppet state | 傀儡国家 |\n| puppet leader | 受人摆布的领导人 |\n| mere puppet | 纯粹的傀儡（强调毫无自主权） |\n| pull the strings of a puppet | 在幕后操控傀儡 |\n\n**近义词辨析：**\n- **puppet**：强调被外部力量控制，多用于政治语境\n- **pawn**：国际象棋中的\"兵\"，强调被牺牲或利用\n- **figurehead**：有名无实的领袖，不一定受外部控制\n\n**例句：**\n- The installed government was widely condemned as a **puppet regime** controlled by foreign powers.（这届政府被广泛谴责为受外国势力操控的傀儡政权。）\n- He may hold the title of CEO, but he is little more than a **puppet**—all major decisions are made by the board.（他虽顶着CEO头衔，但不过是个傀儡，所有重大决策均由董事会拍板。）\n- Children's **puppet** shows have long been used as a tool for moral education.（儿童木偶剧长期被用作道德教育的工具。）\n\n> **雅思备考提示：** 在 Task 2 政治、国际关系或权力类议题中，用 **puppet government/regime** 替换\"controlled government\"可显著提升词汇分；口语 Part 3 讨论领导力或权力时，\"a mere puppet\"也是亮眼表达。"}, {"word": "I am having trouble getting ... vs I have been having trouble getting", "body": "**词性：** 句型对比（动词时态结构）\n**含义：** 两者都表示\"在做某事时遇到困难\"，前者强调\"此刻正遇到困难\"，后者强调\"一段时间以来持续遇到困难\"\n**语域：** 中性，口语、书面均可\n\n**用法说明：**\n\n| 结构 | 时态 | 强调重点 | 潜台词 |\n|---|---|---|---|\n| I **am** having trouble getting... | 现在进行时 | 此刻正在发生 | 当下的困境，刚遇到 |\n| I **have been** having trouble getting... | 现在完成进行时 | 从过去持续到现在 | 已经困扰我一段时间了 |\n\n**have been having** 暗含\"不是刚开始，已经这样一段时间了\"，比 **am having** 更有纵深感。\n\n**例句：**\n- I **am having trouble getting** this file to open—can you help me right now?（我现在打不开这个文件，你能帮我看看吗？——此刻的困难）\n- I **have been having trouble getting** enough sleep lately.（我最近一段时间都睡不好。——持续了一段时间）\n- She **has been having trouble getting** her visa approved for weeks.（她申请签证好几周了一直卡着。——强调持续时长）\n\n> **雅思备考提示：** 口语 Part 2/3 描述个人经历时，用 **have been having trouble doing** 比 **am having trouble** 更有深度，体现对时态的精准掌控——这正是 Band 7+ 考官关注的语法多样性指标。写作中描述社会问题持续性时也可套用此结构，如 \"Many students have been having trouble getting access to quality education.\""}, {"word": "as well as", "body": "**词性：** 连接短语 / 介词短语\n**含义：** ①和...一样好（比较）；②除了...还有、既...又...（列举）\n**语域：** 正式、书面，中性\n\n**用法说明：**\n\n虽然形式相似，但两个含义用法差异很大：\n\n| 用法 | 含义 | 句子结构 | 单复数规则 |\n|---|---|---|---|\n| 比较型 | 和...一样好 | A + **as well as** + B（两者平行） | 通常单数 |\n| 列举型（更常见） | 除了...还有、既...又... | A, **as well as** B（B 是补充信息） | 谓语跟 A 的数 |\n\n**列举型关键点：as well as 后的内容不影响前面主语的单复数**：\n- \"The teacher, **as well as** the students, **was** happy.\"（主语是 teacher，用 was，不是 were）\n- 对比：\"The teacher **and** the students **were** happy.\"（and 则两个都算主语）\n\n**例句：**\n- She plays tennis **as well as** her brother.（她网球和她哥哥打得一样好。——比较型）\n- The university offers scholarships **as well as** loans.（这所大学既提供奖学金，也提供贷款。——列举型）\n- China, **as well as** India, **is** experiencing rapid economic growth.（中国和印度一样，都在经历快速的经济增长。）\n\n> **雅思备考提示：** Task 2 写作中，用 **as well as** 列举因素/观点比 and 更显正式感，特别是在\"列举多个事物\"的段落中频繁使用——这正是 Band 7+ 的语法复杂度体现。口语 Part 3 讨论时也能加分：\"Education **as well as** healthcare plays a crucial role...\" 关键记住：**as well as 后的信息不改变前面主语的动词数**，这是常见错误点。"}, {"word": "fence", "body": "**词性：** 名词（可作动词）  \n**含义：** ①栅栏、围栏；②（动词）用栅栏围住\n**语域：** 中性，口语、书面均可\n\n**用法说明：**\n\nfence 的基础义是\"围墙或栏杆\"，可指学校、监狱、住宅周围的围栏结构。作动词时意为\"用围栏围住\"。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| prison fence / jail fence | 监狱栅栏 |\n| school fence | 学校围栏 |\n| wooden fence / metal fence | 木制/金属围栏 |\n| barbed wire fence | 铁丝网围栏 |\n| fence in / fence off | 用围栏围住 / 隔离 |\n| sit on the fence | 骑墙（中立、不表态） |\n\n**近义词辨析：**\n- **fence**：通用概念，各种栏杆都可以用\n- **barrier**：强调\"阻挡\"功能，较为抽象\n- **wall**：通常指砖石等实心结构\n- **railing / rail**：扶手、栏杆，多见于楼梯或阳台\n\n**例句：**\n- The **prison fence** was topped with barbed wire.（监狱栅栏顶部缠着铁丝网。）\n- Children played near the **school fence** during recess.（孩子们在课间休息时在学校围栏附近玩耍。）\n- They **fenced in** the garden to protect it from wild animals.（他们用栅栏围住花园以防野生动物。）\n- Some countries **fence off** disputed territories with military barriers.（一些国家用军事屏障隔离争议领土。）\n\n> **雅思备考提示：** Task 1 地理描述中描写场景时（如公园、校园平面图），用 fence 比 barrier 更具体、更自然。口语 Part 2 描述地点或人物特征时也能用上，如\"a house surrounded by a wooden fence\"。短语 **sit on the fence** 在 Task 2 讨论立场时可当习语使用。"}, {"word": "barren", "body": "**词性：** 形容词  \n**含义：** ①（土地）贫瘠的、荒芜的、不毛的；②（人/动物）不能生育的、无生育能力的；③（生活）单调的、乏味的\n**语域：** 正式、书面、中性\n\n**用法说明：**\n\nbarren 的核心含义是\"缺乏生产力或创造力\"。作地理/环境用语时，强调土壤贫瘠、不能生长植物；作生物学用语时，指无法生育；引申义可指生活枯燥乏味。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| barren land / soil | 贫瘠的土地/土壤 |\n| barren desert | 荒漠 |\n| barren woman / animal | 不能生育的女性/动物 |\n| barren landscape | 光秃秃的景观 |\n| barren of... | 缺乏... |\n\n**近义词辨析：**\n- **barren**：强调生产力缺乏（土地不毛、无生育能力），相对技术性、中性\n- **desolate**：强调荒凉感和孤独感（废墟、冷清），感情色彩更悲凉\n- **arid**：强调干旱（气候缺水），较为专业\n\n**例句：**\n- The **barren** desert stretches endlessly under the scorching sun.（贫瘠的沙漠在烈日骄阳下无限延伸。）\n- The couple longed for a child after years of **barren** marriage.（这对夫妻多年无法生育，渴望拥有孩子。）\n- The region's economy is **barren** of new opportunities.（该地区经济缺乏新的机遇。）\n\n> **雅思备考提示：** Task 1 地理描述中用 **barren land** 比 \"empty land\" 更学术；Task 2 环境议题中可用 \"barren soil/fields\" 替换 \"bad soil\"。口语 Part 1/2 描述不适宜居住的地方时也适用。"}, {"word": "desolate", "body": "**词性：** 形容词（可作动词，较少）  \n**含义：** ①（地方）荒凉的、冷清的、人迹罕至的；②（感受）凄凉的、孤独的\n**语域：** 正式、书面、带有悲凉的感情色彩\n\n**用法说明：**\n\ndesolate 既描写外在的\"荒凉景象\"，也传达内在的\"孤独感受\"。与 barren 不同，desolate 更强调地点的\"废弃感\"和\"冷清感\"，常见于描写城镇废墟、荒废建筑等场景。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| desolate landscape / place | 荒凉的景观/地方 |\n| desolate ruins | 凄凉的废墟 |\n| desolate town / street | 冷清的城镇/街道 |\n| feel desolate | 感到孤独/凄凉 |\n| desolate mood / feeling | 凄凉的心情/感受 |\n\n**与 barren 的对比：**\n- **barren**：强调\"无生产力\"（土地不生长、不能生育）——更客观、技术性\n- **desolate**：强调\"被遗弃感\"和\"孤独感\"——更文学性、感伤性\n\n**例句：**\n- The **desolate** ruins of the ancient city echoed with silence.（古城凄凉的废墟回荡着沉寂。）\n- After the war, many towns lay **desolate** and abandoned.（战争过后，许多城镇被遗弃，荒凉一片。）\n- She felt **desolate** sitting alone in the empty house.（她独自坐在空荡荡的房子里，感到凄凉。）\n\n> **雅思备考提示：** Task 1 描写衰退的城镇或荒废场景时，用 **desolate** 比 \"empty\" 更生动；Task 2 社会议题中，\"desolate communities\" 能强调地区被边缘化的现象。口语 Part 3 讨论城市发展或环境问题时也是出彩表达。"}, {"word": "mutation", "body": "**词性：** 名词  \n**含义：** ①（生物学）突变、基因突变；②（广义）变化、改变、蜕变\n**语域：** 正式、书面、中性；科技/学术环境中常见\n\n**用法说明：**\n\nmutation 在学术语境中主要用于生物学/遗传学，指 DNA 序列的变化导致生物性状改变。在更广泛的用法中，可指任何形式的重大变化。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| genetic mutation | 遗传突变 |\n| viral mutation | 病毒突变 |\n| mutation rate | 突变率 |\n| undergo mutation | 发生突变 |\n| social / cultural mutation | 社会/文化变迁 |\n\n**近义词辨析：**\n- **mutation**：强调遗传/生物学层面的突然改变，或重大的蜕变\n- **change / alteration**：通用词，指任何形式的改变\n- **evolution**：强调渐进式、长期的演化过程\n- **transformation**：强调彻底的、根本的改变\n\n**例句：**\n- Scientists discovered a **mutation** in the COVID-19 virus that made it more transmissible.（科学家们发现COVID-19病毒的一种**突变**使其传染性更强。）\n- The **mutations** in the DNA sequence led to the development of the disease.（DNA序列中的**突变**导致了疾病的发展。）\n- The rapid technological advances have caused a **mutation** in human work patterns.（快速的技术进步引发了人类工作模式的重大**变化**。）\n\n> **雅思备考提示：** Task 2 讨论科技/医学/社会变化议题时，用 **mutation** 比 \"change\" 更显学术性和专业度。特别是在生物医学背景的写作中（如疫病传播、遗传研究），这是必备表达。口语 Part 3 讨论环境演化或物种适应时也能体现词汇广度。"}, {"word": "thermal", "body": "**词性：** 形容词  \n**含义：** ①与热量/温度有关的；②由热引起的\n**语域：** 正式、书面、中性；科技/学术环境中常见\n\n**用法说明：**\n\nthermal 是科技/环境类词汇，主要用于描述与热、温度、热能相关的事物或现象。常见于环保、物理、气象等领域。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| thermal energy / power | 热能 / 火力发电 |\n| thermal pollution | 热污染 |\n| thermal insulation | 隔热 / 保温 |\n| thermal imaging / camera | 热成像 / 热像仪 |\n| geothermal energy | 地热能 |\n| thermal conductivity | 导热率 |\n\n**近义词辨析：**\n- **thermal**：强调与热有关的性质或能量，较为学术、正式\n- **hot**：日常用词，指温度高\n- **heat**：名词或动词，指热或加热的过程\n- **temperature**：强调温度数值本身\n\n**例句：**\n- **Thermal** power plants are major sources of air pollution.（**火力**发电厂是空气污染的主要来源。）\n- The building uses **thermal** insulation to reduce energy consumption.（该建筑采用**保温**材料以降低能源消耗。）\n- **Geothermal** energy is a renewable and clean power source.（**地热能**是一种可再生的清洁能源。）\n- **Thermal** imaging technology helps detect heat loss in buildings.（**热成像**技术帮助检测建筑物的热损失。）\n\n> **雅思备考提示：** Task 2 讨论环境/能源议题时，用 **thermal energy** 或 **thermal pollution** 等搭配能显著提升学术感；Task 1 若涉及建筑或能源流程图，\"thermal insulation\" 和 \"thermal efficiency\" 是关键表达。口语 Part 3 讨论可持续能源或气候变化时也是加分词汇。"}, {"word": "pollen", "body": "**词性：** 名词（通常不可数）  \n**含义：** 花粉（花或树上的细粉状物质，含有雄性生殖细胞）\n**语域：** 正式、书面、中性；生物学/环保话题中常见\n\n**用法说明：**\n\npollen 是植物生殖的关键，指花或树木释放的微小粉状物质。常见于生物学、环保、过敏症等语境。重要的是 pollen 通常作不可数名词使用。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| pollen grain | 花粉粒 |\n| pollen count | 花粉数量（空气中的） |\n| bee-pollinated / wind-pollinated | 蜜蜂传播 / 风力传播的 |\n| pollen allergy / hay fever | 花粉过敏 / 花粉症 |\n| pollination | 传粉（动词形式：pollinate）|\n| tree pollen / flower pollen | 树花粉 / 花卉花粉 |\n\n**近义词辨析：**\n- **pollen**：植物的生殖性微粒，强调生物学意义\n- **dust**：灰尘，范围更广\n- **spore**：孢子，真菌/蕨类繁殖体\n- **seed**：种子，已成熟的生殖体\n\n**例句：**\n- High **pollen** counts in spring trigger allergies in many people.（春天**花粉**数量高会引发许多人的过敏。）\n- Bees collect **pollen** from flowers and transfer it to other plants.（蜜蜂从花朵采集**花粉**，并将其传递到其他植物。）\n- **Pollen** is dispersed by wind or insects to ensure plant reproduction.（**花粉**通过风或昆虫传播以确保植物繁殖。）\n- Many people suffer from **pollen** allergies during the spring season.（许多人在春季遭受**花粉**过敏。）\n\n> **雅思备考提示：** Task 1 描写植物生长或生态系统时，用 **pollen** 和 **pollination** 比通用词更学术；Task 2 讨论环保或气候议题时，\"pollen levels\" 和 \"wind-pollinated plants\" 能体现科学素养。口语 Part 1/2 若涉及季节、植物或过敏话题，这是自然的表达。"}, {"word": "meadow", "body": "**词性：** 名词  \n**含义：** （开放的）草地、草甸、牧场\n**语域：** 正式、书面、中性；描写自然景观时常见\n\n**用法说明：**\n\nmeadow 是具有文学气质的词，指由草覆盖的开放地带，通常有野花、很少有树木。与简单的 \"grass field\" 不同，meadow 带有更诗意、自然的意象，常见于环保、乡村描写等语境。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| wild meadow | 野生草甸 |\n| alpine meadow | 高山草甸 |\n| wet meadow | 湿地草甸 |\n| flower meadow | 花草地 |\n| meadow grass | 草地草 |\n| across the meadow | 穿过草地 |\n\n**近义词辨析：**\n- **meadow**：开放草地，自然感、文学感强，多有野花\n- **field**：田地，可指农田或草地，范围广\n- **grassland / prairie** —— 大片草地、草原，面积通常更大\n- **pasture**：牧场，强调饲养动物的功能\n\n**例句：**\n- The **meadow** was full of colorful wildflowers in spring.（春天**草地**上开满了五彩缤纷的野花。）\n- We walked through the peaceful **meadow** at sunset.（我们在日落时穿过宁静的**草地**。）\n- The **alpine meadows** are home to rare plant species.（**高山草甸**是稀有植物物种的家园。）\n\n> **雅思备考提示：** Task 1 描写自然景观或草地环境时，用 **meadow** 比 \"grass area\" 更生动、更正式；Task 2 讨论生态保护、土地利用或乡村发展时，\"meadow conservation\" 和 \"wildlife in meadows\" 能体现词汇多样性。口语 Part 2 描写自然风景的地方时，用 meadow 比 \"field\" 更形象。"}, {"word": "immense", "body": "**词性：** 形容词  \n**含义：** 巨大的、浩瀚的、广阔的；（强度）极大的\n**语域：** 正式、书面、中性；可用于口语强调\n\n**用法说明：**\n\nimmense 是描写\"极其巨大或广阔\"的常用词，强调规模、范围或程度的显著性。可用于物理描写（大小、空间），也可用于抽象描写（影响、重要性）。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| immense size / scale | 巨大的规模 |\n| immense ocean / sky | 浩瀚的海洋/天空 |\n| immense power / energy | 巨大的力量 |\n| immense pressure / stress | 巨大的压力 |\n| immense popularity | 极大的受欢迎程度 |\n| an immense amount of | 巨大数量的 |\n\n**近义词辨析：**\n- **immense**：强调大到令人印象深刻的程度，较文学性\n- **huge / enormous**：通用词，表示体积/规模大\n- **vast**：强调范围广阔（如陆地、空间）\n- **massive**：强调质量/物质的巨大，较为物理化\n\n**例句：**\n- The **immense** ocean stretched endlessly before us.（**浩瀚的**海洋在我们面前无限延伸。）\n- Climate change has had an **immense** impact on the environment.（气候变化对环境产生了**巨大的**影响。）\n- She felt **immense** gratitude for his help.（她对他的帮助感到**极大的**感谢。）\n- The project required an **immense** amount of time and resources.（该项目需要**大量的**时间和资源。）\n\n> **雅思备考提示：** Task 2 写作中，用 **immense** 替换 \"very big\" 或 \"very important\" 能显著提升表达格调；特别是在讨论影响、意义、数量时，\"immense value/benefit/concern\" 比 \"great\" 更学术。口语 Part 3 强调程度时也是自然的加分表达。"}, {"word": "noxious", "body": "**词性：** 形容词  \n**含义：** 有害的、有毒的、令人不快的  \n**语域：** 正式、书面、中性；环保/化学/社会话题中常见\n\n**用法说明：**\n\nnoxious 是正式词汇，主要用于描述有害的物质、气体、影响或环境。强调\"有害于健康或环境\"的特性。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| noxious gases | 有毒气体 |\n| noxious fumes | 有害气体/烟气 |\n| noxious substances | 有害物质 |\n| noxious weed | 有害杂草 |\n| noxious influence | 有害影响 |\n| noxious emissions | 有害排放 |\n\n**近义词辨析：**\n- **noxious**：强调有害于健康或环境的特性，较为学术、正式\n- **toxic**：含毒的、有毒的，强调毒性本身\n- **poisonous**：有毒的，强调可导致中毒\n- **harmful**：有害的，范围更广，可指任何形式的伤害\n\n**例句：**\n- The factory emits **noxious** gases that pollute the air.（工厂排放有害气体污染空气。）\n- Long-term exposure to **noxious** fumes can cause respiratory problems.（长期接触有害气体可导致呼吸问题。）\n- **Noxious** weeds spread rapidly and threaten local biodiversity.（有害杂草快速蔓延并威胁当地生物多样性。）\n- Some insects have **noxious** effects on crops and soil fertility.（某些昆虫对庄稼和土壤肥力有有害影响。）\n\n> **雅思备考提示：** Task 2 讨论环保、污染或公共健康议题时，用 **noxious gases/substances** 比 \"bad pollution\" 更学术、更精确；特别是在描述环境污染的具体危害时是必备表达。口语 Part 3 讨论环境或健康问题时也是加分词汇。"}, {"word": "analogy", "body": "**词性：** 名词  \n**含义：** ①类比、比喻；②相似之处、相似的事物；③（逻辑）类推法\n**语域：** 正式、书面、中性；学术/写作中常见\n\n**用法说明：**\n\nanalogy 是学术用词，强调\"通过比较两个相似的事物来说明或论证\"。可作为修辞手法（比喻论证），也可指\"相似之处\"本身。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| draw an analogy | 进行类比 |\n| by analogy | 类推地、打比喻 |\n| analogy with / between | 与...的类比 |\n| a weak / false analogy | 不恰当的类比 |\n| in analogy to | 与...相似地 |\n| the human brain is analogous to a computer | 比喻用法（形容词形式） |\n\n**近义词辨析：**\n- **analogy**：系统的、逻辑的比较，强调相似性来论证或解释\n- **metaphor**：文学修辞，\"A is B\"（隐喻，不用 like）\n- **simile**：文学修辞，\"A is like B\"（明喻，用 like）\n- **similarity**：相似之处，范围更广，不一定是逻辑比较\n\n**例句：**\n- The teacher **drew an analogy** between the human heart and a pump.（老师将人心与泵进行了类比。）\n- **By analogy**, we can argue that internet security is like a lock on your house.（类推地，我们可以说网络安全就像房子上的锁。）\n- The **analogy between** animal and plant cells helps students understand biology.（动物细胞与植物细胞的类比帮助学生理解生物学。）\n- This **analogy** is **weak** because the two situations are fundamentally different.（这个类比不恰当，因为两种情况在根本上是不同的。）\n\n> **雅思备考提示：** Task 2 写作中，用 **draw an analogy** 或 **by analogy** 进行论证比简单列举更有说服力，特别是在解释复杂概念或论证观点时。口语 Part 3 解释抽象概念时，\"Let me use an analogy...\" 也是加分表达。阅读中 analogy 常出现于学术文章，用于论证结构。"}, {"word": "nobility", "body": "**词性：** 名词（不可数）  \n**含义：** ①贵族身份、贵族阶级；②（品质）高尚、崇高、优雅；③贵族的集合体\n**语域：** 正式、书面、中性；历史/社会/品质话题中常见\n\n**用法说明：**\n\nnobility 有两个主要含义：一是社会阶级意义上的\"贵族\"，二是品质意义上的\"高尚、崇高\"。前者多见于历史、政治语境；后者多见于品质、精神层面讨论。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| the nobility | 贵族阶级 |\n| nobility of character | 品格的高尚 |\n| nobility of purpose | 目标的崇高 |\n| social nobility | 社会贵族身份 |\n| moral nobility | 道德高尚 |\n| act with nobility | 以高尚的方式行动 |\n\n**近义词辨析：**\n- **nobility**（品质）：强调道德高尚、精神境界崇高，较文学化\n- **dignity**：尊严、庄严，强调自尊和尊重\n- **honor / virtue**：荣誉/美德，范围更广\n- **aristocracy**：贵族制度，社会学术语\n\n**例句：**\n- The **nobility** of ancient Rome held immense political power.（古罗马的**贵族**拥有巨大的政治权力。）\n- She carried herself with great **nobility** and grace.（她举止端庄、优雅高尚。）\n- The **nobility** of his sacrifice inspired the entire community.（他牺牲精神的**崇高**激励了整个社区。）\n- There is a certain **nobility** in standing up for what is right, even when it is difficult.（坚持正义的行为具有一种**高尚**，即使这很困难。）\n\n> **雅思备考提示：** Task 2 写作中，若讨论品质、精神或人生价值时，用 **nobility of...** （如\"nobility of sacrifice\"、\"nobility of character\"）比简单用 \"goodness\" 更显深度和格调。口语 Part 3 讨论人性、价值观或历史时，\"nobility\" 也是加分高级词汇。"}, {"word": "sober", "body": "**词性：** 形容词（可作动词：sober up）  \n**含义：** ①（人）没有醉酒的、清醒的；②（思想/态度）认真的、冷静的；③（颜色/风格）朴素的、低调的\n**语域：** 正式、书面、中性；可用于口语\n\n**用法说明：**\n\nsober 有多层含义：核心义是\"清醒的\"（相对于醉酒），引申为\"清醒理性的、认真的\"（思想状态），以及\"朴素沉稳的\"（外观风格）。常见搭配如下：\n\n| 搭配 | 含义 |\n|---|---|\n| sober thought / judgment | 冷静的思考/判断 |\n| sober reality | 严峻的现实 |\n| sober up | 酒醒、清醒过来 |\n| sober minded / sober person | 头脑清醒的、冷静的人 |\n| sober attire / style | 朴素的着装/风格 |\n| a sober assessment | 冷静理性的评估 |\n\n**近义词辨析：**\n- **sober**：强调清醒理性、冷静认真，或外形朴素低调\n- **serious**：严肃的，强调态度认真\n- **calm / composed**：冷静的、平静的\n- **modest**：谦虚的、朴素的（更强调谦逊）\n\n**例句：**\n- After the accident, he became **sober** and thoughtful.（事故后，他变得清醒和深思熟虑。）\n- We need a **sober** assessment of the situation, not emotional reactions.（我们需要对局势进行冷静的评估，而不是情绪化反应。）\n- The judge maintained a **sober** expression throughout the trial.（法官在整个审判期间保持着严肃认真的表情。）\n- He **sobered up** after a long walk in the cold air.（他在冷空气中走了很久后清醒了。）\n\n> **雅思备考提示：** Task 2 写作中，用 **sober assessment/judgment/reality** 替换 \"serious/realistic\" 能体现更高级的表达；特别是在讨论问题、现象或社会议题时，\"a sober look at...\" 显得更专业。口语 Part 3 讨论严肃话题时，\"We need a sober approach\" 也是自然加分的表达。"}, {"word": "flora和fauna", "body": "**词性：** 名词\n\n**含义：** \n- **flora** - 植物（特别是某一地区或时期的植物）\n- **fauna** - 动物（特别是某一地区或时期的野生动物）\n\n**语域：** 正式 / 书面 / 学术\n\n**用法说明：**\n\nFlora和fauna是一对相对的学术用语，常用于生态学、地理学、环保等正式文体中。两个词通常成对出现，用来指某一地区的整体生物群落。\n\n| 词汇 | 含义 | 常见搭配 |\n|------|------|---------|\n| flora | 植物、植被 | local flora、native flora、tropical flora |\n| fauna | 动物、野生动物 | local fauna、endangered fauna、unique fauna |\n\n**例句：**\n- The Amazon rainforest is known for its extraordinary flora and fauna. / 亚马逊热带雨林以其卓越的植物群和动物群而闻名。\n- The island's unique flora includes many endemic species found nowhere else. / 该岛屿独特的植物群包括许多仅在此地发现的特有物种。\n- Climate change poses a threat to the fragile fauna of the polar regions. / 气候变化对极地地区脆弱的动物群构成威胁。\n\n> **雅思备考提示：** Flora和fauna是高分写作中常见的学术词汇，尤其在环保、生态、地理等话题中使用频率高。使用这类正式词汇能提升表达的学术性和专业性，特别是在Task 1和Task 2的写作中。在口语考试中，掌握这两个词可以帮助考生在discussing nature或environmental topics时表达更准确、更具学术性。"}, {"word": "hibernation", "body": "**词性：** 名词\n\n**含义：** 冬眠；某些动物在冬季进入的休眠状态；也可引申为\"休眠、暂停活动\"的状态\n\n**语域：** 正式 / 书面 / 学术；可用于口语\n\n**用法说明：**\n\nHibernation原指生物学中某些动物（如熊、刺猬、蛇等）在冬季进入的深度休眠状态，此时代谢显著降低。现也常用于比喻义，表示某事物或组织暂时停止活动、进入\"沉睡\"状态。\n\n| 搭配 | 含义 |\n|------|------|\n| enter hibernation | 进入冬眠 |\n| hibernation period | 冬眠期 |\n| during hibernation | 在冬眠期间 |\n| come out of hibernation | 苏醒、结束休眠（引申：恢复活动） |\n| go into hibernation | 进入休眠状态 |\n\n**近义词辨析：**\n- **hibernation**：生物学术语，特指冬眠，引申为长期休止状态\n- **dormancy**：植物学术语，休眠、潜伏状态\n- **lethargy / torpor**：无力、迟钝状态（无生物学含义）\n\n**例句：**\n- Bears enter hibernation in late autumn and wake up in spring. / 熊在秋末进入冬眠，春天苏醒。\n- During hibernation, an animal's heart rate and body temperature drop significantly. / 在冬眠期间，动物的心率和体温显著下降。\n- The tech startup came out of hibernation with a new product launch. / 这家科技初创公司通过新产品发布从沉睡中苏醒。\n\n> **雅思备考提示：** Hibernation在Task 1（图表写作）中常见于动物/气候话题，用\"enter/go into hibernation\"表达比简单的\"sleep\"更学术、更精准。Task 2中若讨论经济衰退、产业暂停等话题，用\"go into hibernation\"表达暂时停顿比\"stop\"更形象有力。口语中讨论自然、气候话题时，掌握此词能显得专业。"}, {"word": "cram", "body": "**词性：** 动词（可作名词：cram session）\n\n**含义：** ①猛力塞进、塞满；②仓促学习、临时抱佛脚、考前突击复习\n\n**语域：** 非正式 / 口语 / 日常；在学术讨论中也常见\n\n**用法说明：**\n\nCram有两个主要含义：字面义是\"塞进、填满\"，常用于物理动作；引申义是\"临时抱佛脚、临时突击复习\"，特别常见于学生学习语境。在学术讨论中，常用于表达对仓促学习方式的批评。\n\n| 搭配 | 含义 |\n|------|------|\n| cram for an exam | 为考试临时抱佛脚 |\n| cram into | 挤进、塞进 |\n| cram study | 临时抱佛脚式学习 |\n| all-night cram session | 通宵临时复习 |\n| cram knowledge | 死记硬背知识 |\n\n**近义词辨析：**\n- **cram**：强调仓促、临时、集中地塞进信息，多有贬义\n- **study / revise**：正常、有计划的学习\n- **memorize**：记忆、背诵（不一定是临时的）\n- **stuff**：塞进、装进（更多物理含义）\n\n**例句：**\n- Students often cram the night before their exams instead of studying regularly. / 学生经常在考前一晚临时抱佛脚，而不是定期学习。\n- We managed to cram five people into the small car. / 我们硬生生地把五个人挤进了小车里。\n- Last-minute cramming is not an effective way to learn a language. / 临时抱佛脚不是学习语言的有效方式。\n\n> **雅思备考提示：** Cram在Task 2写作中常用于讨论教育话题，如\"Students should not rely on cramming\"（学生不应该依赖临时抱佛脚）。口语Part 3讨论学习方法时，\"cram for an exam\" 是自然表达。使用cram能精准表达\"临时突击\"这一含义，比generic的\"study hard\"更具体有力。"}, {"word": "coed", "body": "**词性：** 名词（可作形容词）\n\n**含义：** ①（名词）女学生，尤指在男校或混合学校中的女学生；②（形容词）男女同校的、男女混合的（coeducational的简称）\n\n**语域：** 非正式 / 书面 / 中性；美国英语中更常见\n\n**用法说明：**\n\nCoed是coeducational的缩写，既可作名词指女学生（尤其在历史语境中，当女性首次进入男校时），也可作形容词表示混合性别的教育环境。现代用法中，作为名词指女学生已相对不常用（较为过时），但作为形容词仍然广泛使用。\n\n| 用法 | 含义 | 示例 |\n|------|------|------|\n| coed (n.) | 女学生 | Several coeds attended the university. |\n| coed (adj.) | 男女同校的、混合的 | a coed dormitory / coed sports |\n| coeducational | 男女同校的（正式用法） | coeducational school |\n\n**近义词辨析：**\n- **coed** (adj.)：非正式、简洁，常见于美国英语\n- **coeducational**：正式、学术性强\n- **co-ed** (hyphenated)：有时使用连字符的拼写\n- **mixed** / **mixed-gender**：更通用的中性表达\n\n**例句：**\n- In the 1970s, many all-boys schools began admitting coeds. / 在1970年代，许多男校开始录取女学生。\n- The university has several coed dormitories on campus. / 该大学校园内有几栋男女混住宿舍。\n- Coed education became increasingly common in developed countries. / 男女同校教育在发达国家变得越来越普遍。\n\n> **雅思备考提示：** Coed在Task 1（教育统计图表）和Task 2（教育议题）中可能出现，尤其是讨论教育制度演变、性别平等等话题。掌握coed既能帮助理解题目中的表述，也能在写作中用\"coed schools/dormitories\"等自然表达。现代口语中更常用\"mixed\" 或 \"coeducational\"，但理解coed这个简写形式对阅读很有帮助。"}, {"word": "fraction", "body": "**词性：** 名词\n\n**含义：** ①数学中的分数（如1/2、3/4）；②一小部分、少量、片段\n\n**语域：** 正式 / 书面 / 中性；数学和日常语境都常见\n\n**用法说明：**\n\nFraction有两个主要含义：在数学中指分子分母的表示方式；在日常用语中表示\"某物的一小部分\"。常见搭配是\"a fraction of...\"，表示\"仅仅是...的一部分\"。\n\n| 含义 | 搭配 | 示例 |\n|------|------|------|\n| 分数（数学） | fraction bar / common fraction | 1/2 is a simple fraction. |\n| 一小部分 | a fraction of | at a fraction of the cost |\n| 极小的部分 | only a fraction | Only a fraction of students passed. |\n| 时间上的片段 | a fraction of a second | The entire process takes only a fraction of a second. |\n\n**近义词辨析：**\n- **fraction**：强调\"一个很小的部分、比例\"，常与\"of\"搭配\n- **portion**：\"部分、份量\"，更中立\n- **part**：\"部分\"，范围较广\n- **segment**：\"分段、部分\"，多用于数据或人群的划分\n\n**例句：**\n- Only a fraction of the population speaks English fluently. / 只有一小部分人口能流利说英语。\n- The new model costs only a fraction of the original price. / 新型号只需要原价的一小部分。\n- A fraction of a second can make the difference in a race. / 赛跑中相差零点几秒可能就决定胜负。\n\n> **雅思备考提示：** Fraction在Task 1（图表描述）和Task 2写作中频繁出现。用\"a fraction of\"表达数据对比比\"a small part of\"更精准学术，如\"a fraction of respondents\"（一小部分受访者）。在口语中也很自然，Part 3讨论比例时\"only a fraction of...\"是高分表达。掌握此词能精准表达数据中的相对少数。"}, {"word": "inert", "body": "**词性：** 形容词\n\n**含义：** ①（化学）惰性的、不活跃的；②没有活力的、懒散的、静止的\n\n**语域：** 正式 / 书面 / 学术；科学术语中常见，也用于文学描写\n\n**用法说明：**\n\nInert有两个重要含义：在科学领域指\"化学上不反应、惰性的\"（如氮气是inert gas）；在日常用语中表示\"缺乏活力、不活跃、懒散的\"。词源来自拉丁文，表示\"无技能、不活跃\"。\n\n| 含义 | 搭配 | 示例 |\n|------|------|------|\n| 惰性的（化学） | inert gas / inert element | Helium is an inert gas. |\n| 无活力的 | inert matter / inert state | The patient lay inert on the bed. |\n| 缺乏生气的 | remain inert | The government remained inert during the crisis. |\n| 静止不动的 | inert mass | The inert body showed no signs of life. |\n\n**近义词辨析：**\n- **inert**：强调化学上或精神上的\"不活跃、懒散\"，较正式\n- **inactive**：\"不活跃的\"，更通用\n- **sluggish**：缓慢的、迟钝的，强调反应慢\n- **dormant**：休眠的、潜伏的，强调暂时性\n- **motionless**：\"静止不动的\"，仅描述物理状态\n\n**例句：**\n- Inert gases like argon are used in welding. / 氩气等惰性气体用于焊接。\n- The old man sat inert in his chair, staring at nothing. / 老人呆呆地坐在椅子上，目光空洞。\n- The government's inert response to the disaster drew widespread criticism. / 政府对灾难的消极应对招致广泛批评。\n\n> **雅思备考提示：** Inert在Task 1（科学图表）和Task 2（环保/科学话题）中可能出现。科学语境中\"inert atmosphere\"（惰性气体环境）是常见表达。Task 2若讨论社会问题、政府政策时，\"remain inert\"或\"inert response\"比\"inactive\"更正式学术。口语中较少使用，但理解此词有助于阅读科技类文章。"}, {"word": "contaminate", "body": "**词性：** 动词\n\n**含义：** 污染、使受污染、沾污、破坏...的纯净\n\n**语域：** 正式 / 书面 / 中性；科学、环保、法律语境常见\n\n**用法说明：**\n\nContaminate是一个常见的学术用词，强调某物因接触不洁或有害物质而被污染或变坏。通常用于环保、食品安全、医疗等领域。相关名词是contamination，形容词是contaminated。\n\n| 搭配 | 含义 |\n|------|------|\n| contaminate water/soil/air | 污染水/土壤/空气 |\n| contaminate food | 食物受污染 |\n| contaminated with | 被...污染 |\n| prevent contamination | 防止污染 |\n| cross-contamination | 交叉污染 |\n\n**近义词辨析：**\n- **contaminate**：强调使某物被有害物质污染，较正式学术\n- **pollute**：污染，范围更广，更常见于环保话题\n- **taint**：使变坏、沾污，较偏文学\n- **poison**：下毒、毒害，更强调有毒性\n- **dirty**：弄脏，更口语化\n\n**例句：**\n- The chemical spill contaminated the groundwater supply. / 化学品泄漏污染了地下水供应。\n- Food can be easily contaminated if not stored properly. / 食物如果储存不当很容易被污染。\n- The scandal contaminated the company's reputation for years. / 这个丑闻多年来破坏了公司的声誉。\n\n> **雅思备考提示：** Contaminate在Task 1（环保/科学图表）和Task 2（环境、食品安全、健康等话题）中高频出现。用\"contaminate\"比\"pollute\"更学术精准，特别是讨论具体物质污染时。Task 2若谈论\"food contamination\"、\"water contamination\"是自然高分表达。口语Part 3讨论环保时\"contaminate\"也很常用。"}, {"word": "extent", "body": "**词性：** 名词\n\n**含义：** 范围、程度、规模、幅度\n\n**语域：** 正式 / 书面 / 中性；学术和日常语境都常见\n\n**用法说明：**\n\nExtent表示某事物的\"程度、范围或规模\"。最常见的搭配是\"to what extent\"（到什么程度）和\"to the extent that\"（在...程度上）。在学术写作中频繁出现，用于量化或描述事物的大小、影响范围等。\n\n| 搭配 | 含义 |\n|------|------|\n| to what extent | 到什么程度、在多大程度上 |\n| to the extent that | 在...程度上；以...为限 |\n| to a large extent | 在很大程度上 |\n| to some extent | 在某种程度上 |\n| the full extent of | ...的全部范围 |\n| extent of damage/impact | 损害/影响的程度 |\n\n**近义词辨析：**\n- **extent**：强调\"范围、程度、规模\"，较正式学术\n- **degree**：\"程度、等级\"，更中立通用\n- **scope**：\"范围、活动范围\"，强调活动或影响的范畴\n- **scale**：\"规模、尺度\"，强调大小\n- **level**：\"水平、层级\"，更口语化\n\n**例句：**\n- To what extent are government policies responsible for this problem? / 政府政策在多大程度上应对此问题负责？\n- The full extent of the environmental damage has not yet been assessed. / 环境损害的全部程度还未被评估。\n- To a large extent, the success depends on individual effort. / 在很大程度上，成功取决于个人努力。\n\n> **雅思备考提示：** Extent是Task 2写作中的高频词汇，特别是讨论问题程度或影响范围时。\"To what extent do you agree?\"这类题型中必然会用到。用\"to what extent\"比\"how much\"更学术。Task 1图表写作中\"the extent of increase/decrease\"也常见。口语Part 3讨论程度时\"to a large extent\"是自然高分表达，比\"very much\"更正式。"}, {"word": "hollow", "body": "**词性：** 形容词（可作名词、动词）\n\n**含义：** ①中空的、空心的；②（声音）沉闷的、空洞的；③（支持、承诺等）虚伪的、空洞的、无实质的\n\n**语域：** 正式 / 书面 / 中性；日常和文学语境都常见\n\n**用法说明：**\n\nHollow有多个含义：字面义是\"内部空的\"（如hollow tree），引申义是\"缺乏深度、毫无诚意的\"（如hollow promise）。动词形式\"hollow out\"表示\"挖空\"。\n\n| 含义 | 搭配 | 示例 |\n|------|------|------|\n| 空心的（物理） | hollow tube / hollow tree | a hollow chocolate egg |\n| 空洞的（声音） | hollow voice / hollow laugh | His laugh sounded hollow. |\n| 虚伪的（承诺） | hollow promise / hollow victory | a hollow victory（虚伪的胜利） |\n| 挖空 | hollow out | hollow out a log（挖空一根木头） |\n\n**近义词辨析：**\n- **hollow**：强调\"空心的、空洞的、毫无意义的\"，较文学\n- **empty**：\"空的、没有内容的\"，更通用\n- **void**：\"空虚的、无效的\"，较正式法律术语\n- **vacant**：\"空置的、无人的\"，多用于房间、地位\n- **insincere**：\"不真诚的\"，强调态度\n\n**例句：**\n- The old tree was hollow inside but still standing. / 老树内部是空心的，但仍然屹立。\n- Her promises rang hollow because she had broken them before. / 她的承诺听起来很空洞，因为她之前食过言。\n- A hollow victory achieved through dishonesty is not worth celebrating. / 通过不诚实手段获得的空洞胜利不值得庆祝。\n\n> **雅思备考提示：** Hollow在Task 2写作中常用于批评或讨论真实性，如\"hollow promises\"、\"hollow victory\"比simple\"fake\"或\"false\"更文雅学术。Task 1图表中\"hollow\"用于描述空心结构也偶有出现。口语Part 3讨论诚意或真实性时，\"That sounds rather hollow\"是高级表达。"}, {"word": "consensus", "body": "**词性：** 名词\n\n**含义：** 共识、一致意见、普遍同意\n\n**语域：** 正式 / 书面 / 中性；学术、政治、商业语境常见\n\n**用法说明：**\n\nConsensus表示\"大多数人或团体达成的共同意见或协议\"。强调通过讨论和协商达成的一致认可，而不是简单的多数投票。常搭配\"reach\"（达到）、\"build\"（建立）、\"lack of\"（缺乏）等动词。\n\n| 搭配 | 含义 |\n|------|------|\n| reach a consensus | 达成共识 |\n| build consensus | 建立共识 |\n| lack of consensus | 缺乏共识 |\n| broad consensus | 广泛共识 |\n| general consensus | 普遍共识 |\n| scientific consensus | 科学共识 |\n\n**近义词辨析：**\n- **consensus**：强调\"通过讨论达成的一致意见\"，较正式学术\n- **agreement**：\"协议、同意\"，范围更广\n- **accord**：\"一致、协议\"，较正式古典\n- **unanimity**：\"全体一致\"，更强调完全一致\n- **majority**：\"多数\"，只是数量上的优势，不一定共识\n\n**例句：**\n- The international scientific consensus is that climate change is caused by human activity. / 国际科学共识是气候变化由人类活动引起。\n- The committee reached a consensus after hours of discussion. / 经过数小时的讨论，委员会达成了共识。\n- There is no consensus among experts about the best solution to this problem. / 专家们对这个问题的最佳解决方案没有共识。\n\n> **雅思备考提示：** Consensus在Task 2写作中高频出现，特别是讨论社会观点、科学、政策等话题时。\"reach a consensus\"、\"build consensus\"是自然学术表达。Task 1若涉及调查数据或意见统计也可能出现。口语Part 3讨论观点统一或分歧时，\"There is a consensus that...\"或\"Lacking consensus\"都是高级表达，比\"most people agree\"更正式学术。"}, {"word": "inferior", "body": "**词性：** 形容词（可作名词）\n\n**含义：** ①（质量、等级）低等的、较差的、劣质的；②（位置）在下方的、下部的（解剖学术语）\n\n**语域：** 正式 / 书面 / 中性；学术和日常语境都常见\n\n**用法说明：**\n\nInferior主要表示\"质量或等级较低\"，常搭配\"to\"进行比较。也可用于医学解剖学术语。与superior（优越的）相反。\n\n| 搭配 | 含义 |\n|------|------|\n| inferior to | 不如...的、低于...的 |\n| inferior quality / goods | 低质量的、劣质商品 |\n| inferior court | 下级法院 |\n| inferior position | 下等位置、劣势 |\n| feel inferior | 感到自卑 |\n| inferior complex | 自卑情结 |\n\n**近义词辨析：**\n- **inferior**：强调质量、等级或能力较低，较正式\n- **poor / bad**：\"差的、糟糕的\"，更口语化\n- **substandard**：\"低于标准的\"，强调不符合标准\n- **lower**：\"较低的\"，仅指位置或级别\n- **subordinate**：\"从属的、下属的\"，强调等级关系\n\n**例句：**\n- This product is inferior to its competitors in terms of durability. / 这种产品在耐久性方面不如竞争对手的产品。\n- The court ruled that the defendant's claim was inferior and rejected it. / 法院裁定被告的诉求在法律上位置较低并予以驳回。\n- Many people develop an inferior complex due to repeated failures. / 许多人因反复失败而形成自卑情结。\n\n> **雅思备考提示：** Inferior在Task 2写作中常用于比较话题，\"inferior to\"是自然的对比表达。讨论产品质量、教育质量等时，\"inferior quality\"比\"bad quality\"更学术。口语Part 3讨论社会阶层或能力差异时，\"feel inferior\"是自然高级表达。Task 1若涉及数据或指标对比，\"inferior performance\"也是常见表述。"}, {"word": "cutlery", "body": "**词性：** 名词（不可数）\n\n**含义：** 刀叉勺等餐具（统称）；刀具（工具）\n\n**语域：** 正式 / 书面 / 中性；日常和商业语境都常见\n\n**用法说明：**\n\nCutlery主要指\"餐用刀叉勺\"等餐具的总称，是一个不可数名词。在英式英语中非常常见，美式英语通常用\"utensils\"或\"flatware\"代替。也可指一般的刀具工具。\n\n| 含义 | 搭配 | 示例 |\n|------|------|------|\n| 餐具（刀叉勺） | cutlery set / drawer | Plastic cutlery（塑料餐具） |\n| 刀具（工具） | cutlery shop / knife | kitchen cutlery（厨房刀具） |\n| 餐具摆放 | lay out cutlery | formal cutlery（正式餐具） |\n| 特定类别 | silver cutlery（银质餐具） | stainless steel cutlery（不锈钢餐具） |\n\n**近义词辨析：**\n- **cutlery**：英式英语，特指刀叉勺等餐具，较正式\n- **utensils**：\"用具、餐具\"，美式常用，范围更广\n- **flatware**：美式英语，特指餐刀叉勺（平的餐具）\n- **silverware**：\"银制餐具\"，强调材质\n- **crockery**：\"陶器、碗盘\"，不包括刀叉\n\n**例句：**\n- Please lay out the cutlery on both sides of the plate. / 请在盘子两侧摆放刀叉。\n- The restaurant provides plastic cutlery for takeout orders. / 这家餐厅为外卖提供塑料餐具。\n- We need to invest in high-quality cutlery for the new kitchen. / 我们需要为新厨房购置高质量的刀具。\n\n> **雅思备考提示：** Cutlery在Task 1（餐厅设施、用品描述）和Task 2（服务业、环保话题如\"plastic vs reusable cutlery\"）中可能出现。\"Lay out cutlery\"是正式餐饮表达。讨论环保或食品卫生时，\"cutlery management\"或\"reusable cutlery\"是自然学术用语。口语Part 1若涉及餐桌礼仪话题也可能用到。"}, {"word": "tunnel", "body": "**词性：** 名词（可作动词）\n\n**含义：** ①隧道、地道；②（引申）狭窄的通道；③动词：挖隧道、凿通\n\n**语域：** 正式 / 书面 / 中性；日常和学术语境都常见\n\n**用法说明：**\n\nTunnel最常用作名词，指\"通过山岭或地下的通道\"。也可作动词表示\"挖掘隧道\"或\"像隧道一样穿过\"。常见搭配是\"tunnel through\"（穿透）、\"tunnel vision\"（隧道视野，引申为片面思维）。\n\n| 搭配 | 含义 |\n|------|------|\n| railway/road tunnel | 铁路/公路隧道 |\n| tunnel through | 穿过、挖通 |\n| tunnel vision | 隧道视野；片面观点 |\n| tunnel under | 从...下面挖隧道 |\n| wind tunnel | 风洞（测试设施） |\n\n**近义词辨析：**\n- **tunnel**：强调\"为了通过而挖的地下通道\"，较常见\n- **passage**：\"通道、走廊\"，范围更广\n- **subway**：地铁（美式），特指城市地下铁路\n- **underpass**：\"地下通道\"，强调在地下\n- **cavern / cave**：\"洞穴\"，自然形成\n\n**例句：**\n- The Channel Tunnel connects England and France. / 英吉利海峡隧道连接了英国和法国。\n- Workers tunneled through the mountain to build the railway. / 工人们穿过山岭挖建铁路隧道。\n- He has tunnel vision about his goals and ignores other perspectives. / 他对目标有片面的看法，忽视了其他观点。\n\n> **雅思备考提示：** Tunnel在Task 1（基础设施描述）和Task 2（城市规划、交通话题）中可能出现。讨论基础设施或交通运输时，\"tunnel\"是自然术语。\"tunnel vision\"作为习语在Task 2讨论思维方式或决策偏见时很有用。口语中\"tunnel under/through\"描述地下通道建设也很常见。"}, {"word": "municipal", "body": "**词性：** 形容词\n\n**含义：** 市政的、城市的、市级的、城镇政府的\n\n**语域：** 正式 / 书面 / 中性；政治、行政、规划语境常见\n\n**用法说明：**\n\nMunicipal指\"与城市或城镇政府相关的\"。常用于描述由市级政府管理或提供的服务、设施、法规等。相关名词是\"municipality\"（市政府、城市）。\n\n| 搭配 | 含义 |\n|------|------|\n| municipal government / council | 市政府、市议会 |\n| municipal services | 市政服务 |\n| municipal bonds | 市政债券 |\n| municipal election | 市级选举 |\n| municipal waste / water | 城市垃圾/水 |\n| municipal regulations | 市政法规 |\n\n**近义词辨析：**\n- **municipal**：特指城市/城镇级的政府或管理，较正式学术\n- **urban**：\"城市的、城市中的\"，范围更广，描述城市特征\n- **civic**：\"市民的、公民的\"，强调公众参与\n- **local**：\"当地的、地方的\"，范围最广\n- **city / town**：名词，具体的城市或城镇\n\n**例句：**\n- The municipal government announced new plans for public transportation. / 市政府宣布了公共交通的新规划。\n- Municipal services include garbage collection, water supply, and street maintenance. / 市政服务包括垃圾收集、供水和街道维护。\n- Residents can participate in municipal elections to choose their representatives. / 居民可以参加市级选举来选择他们的代表。\n\n> **雅思备考提示：** Municipal在Task 1（城市规划、设施描述）和Task 2（城市治理、公共服务、环保话题）中高频出现。讨论城市基础设施、政府政策或城市管理时，\"municipal services\"、\"municipal government\"是自然学术表达。Task 2若涉及公共政策或城镇发展，\"municipal regulations\"或\"municipal planning\"是常见用语。"}, {"word": "bilateral", "body": "**词性：** 形容词\n\n**含义：** ①双边的、双方的；②（医学/解剖）两侧的、左右两侧的\n\n**语域：** 正式 / 书面 / 中性；政治、外交、医学语境常见\n\n**用法说明：**\n\nBilateral指\"涉及两个方面或两个国家的\"，最常用于国际关系、贸易、协议等正式语境。医学中也表示\"两侧的\"（如bilateral hearing loss）。词源自拉丁文\"bilateralis\"（两侧的）。\n\n| 搭配 | 含义 |\n|------|------|\n| bilateral agreement / treaty | 双边协议/条约 |\n| bilateral relations / trade | 双边关系/贸易 |\n| bilateral negotiation | 双边谈判 |\n| bilateral symmetry | 双侧对称 |\n| bilateral cooperation | 双边合作 |\n| bilateral contract | 双边合同 |\n\n**近义词辨析：**\n- **bilateral**：强调\"两方之间的、相互的\"，较正式学术\n- **mutual**：\"相互的、彼此的\"，更通用\n- **reciprocal**：\"互惠的、相互的\"，强调等价交换\n- **two-sided**：\"两边的\"，更口语化\n- **unilateral**：单边的（相反词）\n\n**例句：**\n- The two countries signed a bilateral trade agreement. / 两个国家签署了双边贸易协议。\n- Bilateral cooperation between the nations has increased significantly. / 两国之间的双边合作显著增加。\n- The patient was diagnosed with bilateral hearing loss. / 患者被诊断为双侧听力丧失。\n\n> **雅思备考提示：** Bilateral在Task 2（国际关系、政治、贸易话题）和Task 1（医学图表）中可能出现。讨论国际关系、外交政策或贸易协议时，\"bilateral agreement\"、\"bilateral relations\"是自然学术表达。与\"multilateral\"（多边的）、\"unilateral\"（单边的）对比使用能体现高级词汇水平。口语Part 3讨论国际合作时也很实用。"}, {"word": "egalitarian", "body": "**词性：** 形容词（可作名词）\n\n**含义：** ①平等主义的、倡导平等的；②支持或实践平等的人\n\n**语域：** 正式 / 书面 / 中性；政治、社会话题常见\n\n**用法说明：**\n\nEgalitarian指\"相信人人平等\"或\"倡导平等权利\"的理念。可作形容词修饰制度、社会、原则等，也可作名词指持平等主义观点的人。词源自法文\"égal\"（平等）。\n\n| 搭配 | 含义 |\n|------|------|\n| egalitarian society | 平等主义社会 |\n| egalitarian principles | 平等主义原则 |\n| egalitarian approach | 平等主义方法 |\n\n**近义词辨析：**\n- **egalitarian**：强调倡导\"人人平等\"的理想，较正式\n- **equal**：\"相等的、平等的\"，更中立描述事实\n- **democratic**：\"民主的\"，强调权力分配\n- **fair**：\"公平的、公正的\"，范围更广\n- **equitable**：\"公平的、合理分配的\"，侧重结果公正\n\n**例句：**\n- An egalitarian society aims to reduce inequality. / 平等主义社会旨在减少不平等。\n- The organization promotes egalitarian values. / 该组织倡导平等主义价值观。\n- Many egalitarians believe that wealth should be more fairly distributed. / 许多平等主义者认为财富应该更公平地分配。\n\n> **雅思备考提示：** Egalitarian在Task 2（社会平等、经济不平等、政治制度话题）中常见。讨论社会理想或政治制度时，\"egalitarian society\"或\"egalitarian principles\"是高级学术表达。与\"democratic\"、\"authoritarian\"对比使用能展现思辨能力。口语Part 3讨论社会公平或理想社会时也很实用。"}, {"word": "defer", "body": "**词性：** 动词\n\n**含义：** ①推迟、延迟；②遵从、顺从\n\n**语域：** 正式 / 书面 / 中性；正式文体和日常都常见\n\n**用法说明：**\n\nDefer有两个主要含义：推迟某事（defer sth.），或在某人面前表示尊重/顺从（defer to sb.）。两个含义虽不同但都很常用。\n\n| 搭配 | 含义 |\n|------|------|\n| defer payment | 延迟付款 |\n| defer a decision / meeting | 推迟决定/会议 |\n| defer to sb. | 尊重某人、顺从某人 |\n| defer judgment | 暂缓判断 |\n\n**近义词辨析：**\n- **defer**（推迟）：正式学术用语\n- **delay / postpone**：\"延迟、推迟\"，更通用\n- **put off**：\"推迟\"，更口语化\n- **defer to**（遵从）：强调对他人专业或权威的尊重\n\n**例句：**\n- We decided to defer the meeting until next week. / 我们决定把会议推迟到下周。\n- I defer to your expertise on this matter. / 在这件事上我尊重你的专业意见。\n- The company deferred payment due to cash flow issues. / 公司由于现金流问题延迟了付款。\n\n> **雅思备考提示：** Defer在Task 2（商业、政策、决策话题）中常见。\"defer payment\"或\"defer a decision\"是正式商业表达。\"defer to\"在讨论权力关系或尊重专业意见时很有用。比\"delay\"更正式学术，能提升表达水平。"}, {"word": "lull", "body": "**词性：** 动词（可作名词）\n\n**含义：** ①使安静、缓和、放松；②催眠、使入睡；③（名词）短暂的平静期\n\n**语域：** 正式 / 书面 / 中性；文学和日常都常见\n\n**用法说明：**\n\nLull主要表示\"使...安静或平静\"。常搭配\"into\"表示\"诱骗进入某状态\"。名词形式表示\"短暂的平静期\"（如lull before the storm）。\n\n| 搭配 | 含义 |\n|------|------|\n| lull sb. to sleep | 使某人入睡 |\n| lull into false security | 诱骗进入虚假安全感 |\n| lull before the storm | 暴风雨前的平静 |\n| lull into complacency | 使陷入自满 |\n\n**近义词辨析：**\n- **lull**：强调\"缓和、平息或用柔和方式安抚\"，较文学\n- **calm / soothe**：\"使平静、安抚\"，更通用\n- **rock / cradle**：\"摇晃使入睡\"，更具体动作\n- **tranquility / calm**（名词）：\"平静、宁静\"，强调状态\n\n**例句：**\n- The gentle music lulled the baby to sleep. / 温柔的音乐使婴儿入睡。\n- The calm market lulled investors into overconfidence. / 平静的市场诱骗投资者过度自信。\n- There was a brief lull in the fighting before it resumed. / 战斗暂时停止了，但随后又重新开始。\n\n> **雅思备考提示：** Lull在Task 2（商业、心理、警示话题）和文学描写中常见。\"lull into false security/complacency\"是讨论人们被愚弄或过度自信时的高级表达。\"lull before the storm\"作为习语在描述局势变化时很有用。比\"calm\"更文雅，能提升写作品质。"}, {"word": "consort", "body": "**词性：** 名词（可作动词）\n\n**含义：** ①配偶、伴侣（特别是君主的配偶）；②同伴、陪伴者；③动词：与...交往、陪伴\n\n**语域：** 正式 / 书面 / 中性；文学和正式语境常见\n\n**用法说明：**\n\nConsort最常用作名词，指\"君主的配偶\"（如queen consort女王配偶）或\"陪伴者\"。作动词时表示\"与...一起\"或\"交往\"，通常搭配\"with\"。词源自拉丁文\"consors\"（共同持有者）。\n\n| 搭配 | 含义 |\n|------|------|\n| royal consort | 王妃、王配 |\n| queen consort | 女王配偶 |\n| prince consort | 王夫 |\n| consort with | 与...交往、陪伴 |\n\n**近义词辨析：**\n- **consort**（名词）：强调\"配偶或同伴\"，较正式文学\n- **spouse**：\"配偶\"，更通用中立\n- **partner**：\"伴侣、合作者\"，更现代\n- **companion**：\"同伴、陪伴者\"，范围更广\n- **associate**（名词）：\"同伙、相关者\"，有时有贬义\n\n**例句：**\n- Queen Victoria's consort was Prince Albert. / 维多利亚女王的配偶是艾伯特王子。\n- He should not consort with people of questionable character. / 他不应该与品质可疑的人来往。\n- The king and his consort attended the ceremony together. / 国王和他的配偶一起参加了典礼。\n\n> **雅思备考提示：** Consort在Task 1（历史或皇室话题）和Task 2（文学、历史讨论）中可能出现。讨论君主制或皇室成员时，\"queen consort\"或\"royal consort\"是正式用语。作动词\"consort with\"在讨论人际关系或品德时很有用，比\"associate with\"更文雅。阅读文学类文章时常见此词。"}, {"word": "lease", "body": "**词性：** 名词（可作动词）\n\n**含义：** ①租赁协议、租约、租期；②动词：出租、租赁、租用\n\n**语域：** 正式 / 书面 / 中性；商业、房产、日常语境都常见\n\n**用法说明：**\n\nLease作名词指\"租赁协议或租期\"（房屋、车辆等长期使用），与\"rent\"（租赁）相关但更正式。作动词表示\"将...出租给\"或\"从...租赁\"。常搭配\"sign a lease\"（签租约）、\"lease out\"（出租）。\n\n| 搭配 | 含义 |\n|------|------|\n| sign a lease | 签署租赁协议 |\n| lease agreement / contract | 租赁协议 |\n| lease out | 出租、租赁给他人 |\n| lease term | 租期 |\n| long-term / short-term lease | 长期/短期租赁 |\n\n**近义词辨析：**\n- **lease**：正式的租赁协议，通常长期，较商业\n- **rent**：\"租赁、租金\"，更通用口语\n- **hire**：\"雇佣、租赁\"，通常指人工或临时\n- **let**（英式）：\"出租、租给他人\"\n- **sublease**：\"转租、二次出租\"\n\n**例句：**\n- I signed a one-year lease for the apartment. / 我签署了一份为期一年的公寓租赁协议。\n- The company leases office space in the city center. / 该公司在市中心租赁办公空间。\n- They leased out their house to a family while traveling abroad. / 他们在出国旅行期间把房子租给了一家人。\n\n> **雅思备考提示：** Lease在Task 1（房产、商业话题）和Task 2（房屋政策、商业经营话题）中常见。讨论房产或商业租赁时，\"lease agreement\"、\"sign a lease\"是自然正式表达。与\"rent\"对比：lease更正式学术，rent更日常口语。Task 2讨论住房问题或商业成本时，\"lease term\"或\"lease cost\"是常见用语。"}, {"word": "astrology", "body": "**词性：** 名词\n\n**含义：** 占星术、占星学（根据天体位置预测命运的信仰体系）\n\n**语域：** 正式 / 书面 / 中性；日常和文化语境都常见\n\n**用法说明：**\n\nAstrology是一种古老的信仰体系，认为天体的位置会影响人的性格和命运。与astronomy（天文学，科学）不同，占星术不被科学界认可，属于伪科学。常搭配\"believe in\"（相信）、\"horoscope\"（星座运势）。\n\n| 搭配 | 含义 |\n|------|------|\n| believe in astrology | 相信占星术 |\n| astrology sign / chart | 星座符号/出生图 |\n| Chinese astrology | 中国占星术 |\n| astrology reading | 占星预测 |\n\n**近义词辨析：**\n- **astrology**：占星术（伪科学、信仰体系）\n- **astronomy**：天文学（真科学）\n- **horoscope**：星座运势（占星术的产物）\n- **divination**：占卜（更广泛的预测体系）\n\n**例句：**\n- Many people believe in astrology, but it has no scientific basis. / 许多人相信占星术，但它没有科学依据。\n- She studies astrology as a hobby. / 她把占星术作为爱好来研究。\n- Astrology has been practiced for thousands of years across different cultures. / 占星术在不同文化中已被实践了数千年。\n\n> **雅思备考提示：** Astrology在Task 2（文化话题、科学与信仰讨论）和阅读中可能出现。讨论伪科学或文化信仰时，了解astrology与astronomy的区别很重要。能精准区分这两个词能展现对英文细微差别的理解。"}, {"word": "astronomy", "body": "**词性：** 名词\n\n**含义：** 天文学、天文科学（科学地研究天体和宇宙的学科）\n\n**语域：** 正式 / 书面 / 学术；科学和教育语境常见\n\n**用法说明：**\n\nAstronomy是一门真实的科学学科，研究星星、行星、星系等天体的物理特性和运动规律。与astrology（占星术）相反，astronomy是基于观察和科学方法的。常搭配\"study\"（研究）、\"telescope\"（望远镜）。\n\n| 搭配 | 含义 |\n|------|------|\n| study astronomy | 研究天文学 |\n| astronomy class / course | 天文学课程 |\n| observational astronomy | 观测天文学 |\n| modern astronomy | 现代天文学 |\n\n**近义词辨析：**\n- **astronomy**：天文学（科学学科）\n- **astrophysics**：天体物理学（更专门的分支）\n- **astrology**：占星术（伪科学）\n\n**例句：**\n- Astronomy is a branch of natural science. / 天文学是自然科学的一个分支。\n- The telescope is an important tool in astronomy. / 望远镜是天文学中的重要工具。\n- Modern astronomy has revealed the vastness of the universe. / 现代天文学揭示了宇宙的广阔。\n\n> **雅思备考提示：** Astronomy在Task 1（科学图表）和Task 2（科学技术话题）中常见。讨论科学研究或太空探索时是必用词。与astrology对比使用能体现对科学与非科学的批判性思维。"}, {"word": "astronaut", "body": "**词性：** 名词\n\n**含义：** 宇航员、太空人（受过训练进行太空飞行的人）\n\n**语域：** 正式 / 书面 / 中性；日常和新闻语境都常见\n\n**用法说明：**\n\nAstronaut指\"经过专业训练进行太空任务的人\"。美式英语通常用astronaut，英式英语有时用cosmonaut（苏联/俄罗斯用语）。相关词是\"astronaut training\"（宇航员培训）、\"space mission\"（太空任务）。\n\n| 搭配 | 含义 |\n|------|------|\n| astronaut training | 宇航员培训 |\n| space astronaut | 太空宇航员 |\n| astronaut in space | 在太空的宇航员 |\n| become an astronaut | 成为宇航员 |\n\n**近义词辨析：**\n- **astronaut**：宇航员（一般用法）\n- **cosmonaut**：宇航员（特指苏联/俄罗斯）\n- **spaceman**：太空人（较古老的说法）\n- **pilot**：飞行员（不一定是太空）\n\n**例句：**\n- Neil Armstrong was the first astronaut to walk on the moon. / 尼尔·阿姆斯特朗是第一个登月的宇航员。\n- Astronauts undergo years of rigorous training before their missions. / 宇航员在执行任务前要经历多年的严格训练。\n- The astronaut spent six months on the International Space Station. / 宇航员在国际空间站上停留了六个月。\n\n> **雅思备考提示：** Astronaut在Task 1（科学技术话题）和Task 2（探索、科技进步话题）中常见。讨论太空探索或科技成就时是自然用词。能准确使用astronaut vs cosmonaut的区别能展现对地理和历史的理解。"}, {"word": "comprehend", "body": "**词性：** 动词\n\n**含义：** 理解、明白、领会\n\n**语域：** 正式 / 书面 / 中性；学术和日常语境都常见\n\n**用法说明：**\n\nComprehend表示\"理解或掌握某个意思或概念\"，是understand的较正式同义词。强调对信息的深层理解而不仅仅是听懂。常用于学术或正式文体。相关名词是comprehension（理解）。\n\n| 搭配 | 含义 |\n|------|------|\n| comprehend the meaning | 理解含义 |\n| comprehend the concept | 掌握概念 |\n| comprehend fully | 完全理解 |\n| hard to comprehend | 难以理解 |\n| comprehend a text | 理解一篇文章 |\n\n**近义词辨析：**\n- **comprehend**：较正式、学术，强调深层理解，较书面\n- **understand**：\"理解\"，最通用，口语和书面都用\n- **grasp**：\"抓住、理解\"，较口语，强调抓住要点\n- **get**：\"明白、理解\"，最口语化\n- **fathom**：\"理解、测透\"，强调努力理解或彻底理解\n\n**例句：**\n- It is difficult to comprehend the complexity of quantum physics. / 很难理解量子物理学的复杂性。\n- She could not comprehend why he left without saying goodbye. / 她无法理解他为什么不告别就离开了。\n- Most students comprehend the basic concepts of the course. / 大多数学生理解了课程的基本概念。\n\n> **雅思备考提示：** Comprehend在Task 2写作和阅读理解中常见，特别是讨论理解或学习话题时。用\"comprehend\"比\"understand\"更显学术和正式，特别在讨论复杂概念时。相关词\"comprehension\"在阅读练习中频繁出现。口语中较少使用，书面表达中能体现更高的语言水平。"}, {"word": "anticipate", "body": "**词性：** 动词\n\n**含义：** ①预期、期待、预想；②提前做准备；③（事件等）即将发生\n\n**语域：** 正式 / 书面 / 中性；学术和日常语境都常见\n\n**用法说明：**\n\nAnticipate表示\"预料到某事会发生\"或\"期待某事\"。与expect（期望）相关但更强调主动的预见和准备。可搭配动名词（anticipate doing）或名词。相关名词是anticipation（期待、预期）。\n\n| 搭配 | 含义 |\n|------|------|\n| anticipate a problem | 预见问题 |\n| anticipate the future | 期待未来 |\n| anticipate that... | 预期...会发生 |\n| anticipate doing | 期待做某事 |\n| anticipate with pleasure | 期待地等待 |\n\n**近义词辨析：**\n- **anticipate**：强调预见、预料，通常有提前准备的含义\n- **expect**：\"期望、预期\"，更通用，可以是被动的期待\n- **foresee**：\"预见、看到未来\"，强调看到（见）\n- **predict**：\"预测、推断\"，较科学、客观\n- **look forward to**：\"期待、盼望\"，强调积极心态\n\n**例句：**\n- We anticipate significant changes in the market next year. / 我们预期明年市场会有重大变化。\n- She anticipated that he would arrive late. / 她预料到他会迟到。\n- I anticipate with great pleasure the opportunity to visit you. / 我期待着有机会来访你。\n\n> **雅思备考提示：** Anticipate在Task 2（预测、规划话题）和阅读中常见。讨论未来趋势或预期结果时，\"anticipate that/doing\"是自然学术表达。用\"anticipate\"比\"expect\"更显正式和学术性。相关名词\"anticipation\"也常在阅读理解中出现。口语中较少用，书面表达中能提升语言质量。"}, {"word": "smell", "body": "**词性：** 动词（可作名词）\n\n**含义：** ①嗅、闻到（气味）；②发散气味、有气味；③名词：气味、臭味\n\n**语域：** 非正式 / 书面 / 中性；日常和文学语境都常见\n\n**用法说明：**\n\nSmell既可作动词（嗅觉动作或发散气味），也可作名词（气味本身）。作动词时可以是及物动词（smell something）或不及物动词（it smells good）。可以用来描述各种气味，包括好的（pleasant smell）或坏的（bad smell）。\n\n| 搭配 | 含义 |\n|------|------|\n| smell good / bad | 闻起来好/坏 |\n| smell like | 闻起来像... |\n| sense of smell | 嗅觉 |\n| a pleasant / foul smell | 令人愉快/令人厌恶的气味 |\n| smell flowers | 闻花香 |\n| smell danger | 察觉到危险 |\n\n**近义词辨析：**\n- **smell**：嗅、闻到、气味，最通用\n- **scent**：\"香味、香气\"，较正式、通常指好闻的\n- **odor / odour**：\"气味、臭味\"，较正式，中立或贬义\n- **aroma**：\"香气、芳香\"，强调怡人的香气\n- **fragrance**：\"香气、芳香\"，较正式，指舒适的香气\n- **stench**：\"恶臭\"，强烈的坏味道\n\n**例句：**\n- I can smell fresh bread from the kitchen. / 我能从厨房闻到新鲜面包的香气。\n- This flower smells wonderful. / 这朵花闻起来很香。\n- He smelled danger in the air. / 他察觉到空中有危险。\n\n> **雅思备考提示：** Smell在Task 1（描写场景、食物）和Task 2（感官体验话题）中常见。讨论五感或环境描写时，\"smell good/bad\"或\"a pleasant smell\"是自然表达。能区分smell与scent、aroma等近义词能提升写作精准性。口语Part 1若涉及日常经历话题也可能用到。"}, {"word": "slender", "body": "**词性：** 形容词\n\n**含义：** ①（身材）苗条的、纤细的；②（物体）细长的、狭长的；③（数量、资源等）微薄的、有限的\n\n**语域：** 正式 / 书面 / 中性；文学和日常语境都常见\n\n**用法说明：**\n\nSlender主要描述\"身材或物体细长优美\"。作形容词修饰人时强调苗条而优雅的身材（通常是积极的评价）。也可用于描述物体的形状或数量的有限性。词源自中古英语，与\"瘦\"相关。\n\n| 搭配 | 含义 |\n|------|------|\n| slender figure / waist | 苗条的身材/腰部 |\n| slender build | 细长的身材 |\n| slender chance / hope | 微薄的机会/希望 |\n| slender resources | 有限的资源 |\n| slender neck | 细长的颈部 |\n\n**近义词辨析：**\n- **slender**：强调\"纤细、优雅\"，通常是积极评价\n- **thin**：\"瘦的、细的\"，更中立或可能消极\n- **slim**：\"苗条的、匀称的\"，接近但更通用\n- **lean**：\"精瘦的、紧实的\"，强调肌肉线条\n- **narrow**：\"狭窄的\"，多用于物体宽度\n\n**例句：**\n- She has a slender figure and elegant posture. / 她身材苗条，姿态优雅。\n- The slender branches of the willow tree swayed in the wind. / 柳树细长的枝条在风中摇曳。\n- They have only a slender chance of winning the match. / 他们只有微薄的赢得比赛的机会。\n\n> **雅思备考提示：** Slender在Task 1（人物描写）和Task 2（身材、外观话题）中可能出现。描写人的身材时，\"slender figure\"比\"thin\"更文雅、更正面。也可用于比喻\"微薄的希望\"等抽象概念。掌握此词能提升写作的优美程度，特别是在文学性描写中。"}, {"word": "edible", "body": "**词性：** 形容词\n\n**含义：** 可食用的、能吃的、适合食用的\n\n**语域：** 正式 / 书面 / 中性；科学、烹饪、日常语境都常见\n\n**用法说明：**\n\nEdible是形容词，表示\"适合吃、能安全食用\"。通常用来区分哪些东西可以吃，哪些不能吃。相反词是inedible（不能吃的、有毒的）。常搭配名词如plants、fruits、oils等。词源自拉丁文edibilis。\n\n| 搭配 | 含义 |\n|------|------|\n| edible plants / fruits | 可食用的植物/水果 |\n| edible oils | 食用油 |\n| edible flowers | 可食用的花 |\n| edible mushrooms | 可食用的蘑菇 |\n| edible seaweed | 可食用的海草 |\n| edibility | 可食用性 |\n\n**近义词辨析：**\n- **edible**：可食用的、安全可吃，较正式学术\n- **eatable**：\"能吃的、可口的\"，更通用但较少见\n- **consumable**：\"可消费的\"，范围更广\n- **fit for consumption**：\"适合食用\"，更正式表达\n- **safe to eat**：\"安全可吃\"，更口语化\n\n**例句：**\n- Are these mushrooms edible or poisonous? / 这些蘑菇能吃还是有毒的？\n- Many edible plants grow wild in the forest. / 许多可食用的植物在森林里野生生长。\n- The edible flowers add color and flavor to the dish. / 可食用的花为这道菜增添了颜色和风味。\n\n> **雅思备考提示：** Edible在Task 1（食物、自然话题）和Task 2（食品安全、营养话题）中可能出现。讨论食物安全或可持续食物来源时，\"edible plants\"或\"edible insects\"是自然学术表达。与inedible对比使用能展现词汇准确性。环保话题中\"edible packaging\"也是新兴用法。"}, {"word": "decent", "body": "**词性：** 形容词\n\n**含义：** 体面的、得体的、相当的、还不错的\n\n**语域：** 中性 / 口语 / 非正式；各类语境都常见\n\n**用法说明：**\n\nDecent是常见形容词，有两个主要含义。第一，表示\"体面的、得体的、合乎礼仪的\"，强调符合社会规范。第二，表示\"相当的、还不错的、满意的\"，用来评价事物质量或程度。在口语中，\"that's decent\"相当于\"还不错、很好\"。词源自拉丁文decens（得体的）。\n\n| 搭配 | 含义 |\n|------|------|\n| decent person | 体面的人、有操守的人 |\n| decent clothes / appearance | 得体的衣着/外表 |\n| decent income / salary | 相当可观的收入 |\n| decent food | 还不错的食物 |\n| a decent job | 一份不错的工作 |\n| decent standard of living | 相当不错的生活水平 |\n\n**近义词辨析：**\n- **decent**：\"体面的、相当的\"，强调符合规范或质量不错\n- **respectable**：\"值得尊敬的、可敬的\"，更强调名誉和社会地位\n- **acceptable**：\"可接受的\"，强调达到最低标准\n- **decent / fairly good**：\"相当好的\"，日常评价用语\n- **proper**：\"恰当的、得体的\"，更正式\n\n**例句：**\n- He comes from a decent family with good reputation. / 他出身于一个体面的、声誉良好的家庭。\n- She earns a decent salary as a project manager. / 作为项目经理，她的薪水相当可观。\n- We had a decent meal at that restaurant last night. / 我们昨晚在那家餐厅吃了顿不错的饭。\n- He wore decent clothes to the job interview. / 他穿得很体面去参加工作面试。\n\n> **雅思备考提示：** Decent在雅思写作和口语中频繁出现，用于评价生活水平、工作条件、物品质量等。在Task 2写作中，\"decent living standard\"、\"decent income\"等搭配可表达社会福利相关话题。在口语Part 2中描述地点或物品时，\"it's a decent place\"是自然的表达。掌握此词能使评价更自然贴切。"}, {"word": "descend", "body": "**词性：** 动词\n\n**含义：** 下降、下去、下沉、沿袭、出身于\n\n**语域：** 正式 / 书面 / 中性；学术和文学语境常见\n\n**用法说明：**\n\nDescend是正式动词，主要表示\"向下移动\"，强调从高到低的移动方向。可指人物的物理下降（下楼、下山），也可指飞机、太阳等的下降。引申义可表示\"社会地位或品德的堕落\"或\"代代相传、沿袭\"。词源自拉丁文descendere。与ascend（上升）相对。\n\n| 搭配 | 含义 |\n|------|------|\n| descend from | 出身于、源于 |\n| descend to | 堕落到、降低到 |\n| descend the stairs | 下楼 |\n| descend the mountain | 下山 |\n| descend into | 陷入、沦为 |\n| descendant | 后代、子孙 |\n| descending order | 降序、递减顺序 |\n\n**近义词辨析：**\n- **descend**：\"下降、下去\"，较正式，强调方向性\n- **go down**：\"下去\"，更口语化\n- **climb down**：\"爬下来\"，强调用力\n- **fall**：\"掉下、下落\"，强调速度和重力\n- **decline / deteriorate**：\"衰退、恶化\"，引申义\n\n**例句：**\n- The plane began to descend as it approached the airport. / 飞机接近机场时开始下降。\n- She descended the grand staircase in her wedding dress. / 她穿着婚纱沿着宏伟的楼梯走了下来。\n- The family descends from a long line of scholars. / 这个家族出身于长期的学者世系。\n- The situation descended into chaos and violence. / 局势陷入了混乱和暴力。\n- The sun was descending toward the horizon. / 太阳正向地平线下落。\n\n> **雅思备考提示：** Descend在雅思阅读和写作中常见，特别是在描写变化趋势、社会问题恶化等话题中。Task 1数据描写中，\"descending order\"（降序）是必须掌握的表达。在Task 2论证中，描述社会滑坡时\"descend into\"是有力的学术表达。与\"ascending\"相对使用能展现语言的精准性和对比能力。"}, {"word": "remuneration", "body": "**词性：** 名词\n\n**含义：** 报酬、酬劳、薪酬、赔偿\n\n**语域：** 正式 / 书面；商务、法律、学术语境常见\n\n**用法说明：**\n\nRemuneration是正式名词，指为工作或服务所得的报酬、薪水或赔偿。比\"salary\"和\"wage\"更正式、更书面，通常用于商务沟通、法律文件或学术讨论中。可指现金或其他形式的补偿。相关词包括remunerate（v. 给予报酬）、remunerative（adj. 报酬丰厚的）。词源自拉丁文remunerare（回报）。\n\n| 搭配 | 含义 |\n|------|------|\n| fair remuneration | 公平的报酬 |\n| adequate remuneration | 充分的酬劳 |\n| receive remuneration for | 因...获得报酬 |\n| remuneration package | 薪酬福利包 |\n| financial remuneration | 经济赔偿 |\n| reasonable remuneration | 合理的薪酬 |\n\n**近义词辨析：**\n- **remuneration**：\"报酬、酬劳\"，较正式，包括薪水、奖金等全面补偿\n- **salary**：\"薪水、月薪\"，通常指固定的月薪，较通用\n- **wage**：\"工资、报酬\"，通常指按时计酬（小时工资），更口语\n- **compensation**：\"补偿、赔偿\"，范围更广，可指经济赔偿\n- **payment**：\"付款、报酬\"，更通用，强调支付行为\n- **fee**：\"费用、酬金\"，通常指专业人士的报酬\n\n**例句：**\n- Employees are entitled to fair remuneration for their work. / 员工有权获得公平的工作报酬。\n- The company offers an attractive remuneration package including bonuses and benefits. / 公司提供具有吸引力的薪酬方案，包括奖金和福利。\n- She received substantial financial remuneration for her expertise and consultation. / 她因其专业知识和咨询意见获得了可观的经济报酬。\n- The agreement specifies the terms of remuneration for the contracted services. / 协议规定了承包服务的报酬条款。\n\n> **雅思备考提示：** Remuneration在Task 2写作中常见，特别是讨论工作、薪酬、职业发展、福利待遇等话题。\"fair remuneration\"、\"remuneration package\"等搭配是学术表达的亮点词汇。在讨论劳动权益、性别薪酬差异等社会问题时，此词比简单的\"salary\"更显正式和权威性。掌握此词能提升Task 2论文的学术质感。"}, {"word": "vocation", "body": "**词性：** 名词\n\n**含义：** 职业、使命、天职、呼召\n\n**语域：** 正式 / 书面；文学、宗教、职业话题常见\n\n**用法说明：**\n\nVocation是较为正式的名词，指一个人感到被\"召唤\"去从事的职业或工作，强调职业的使命感、热情和天职属性。不仅指工作本身，更强调与个人价值观、兴趣和天赋的契合。常用于描述教师、医生、社工等具有服务精神的职业。词源自拉丁文vocatio（召唤、职业）。与\"occupation\"相比，vocation更具精神层面和使命感。\n\n| 搭配 | 含义 |\n|------|------|\n| find one's vocation | 找到自己的天职 |\n| a true vocation | 真正的职业使命 |\n| teaching vocation | 教师职业（强调使命） |\n| vocational training | 职业培训 |\n| vocational school | 职业学校 |\n| sense of vocation | 职业使命感 |\n\n**近义词辨析：**\n- **vocation**：\"职业、天职\"，强调使命感和热情，较正式\n- **occupation**：\"职业、工作\"，更中立和通用\n- **profession**：\"专业、职业\"，通常指需要专业资格的工作\n- **job**：\"工作、职位\"，较口语化，泛指所有工作\n- **calling**：\"召唤、天职\"，更文学、强调精神使命\n\n**例句：**\n- She felt teaching was her true vocation, not just a job. / 她觉得教学是她真正的天职，而不仅仅是一份工作。\n- His vocation as a doctor allowed him to serve the community. / 作为医生的职业使命让他能服务社区。\n- Many young people struggle to find their vocations in life. / 许多年轻人苦于找不到人生的职业使命。\n- Vocational training programs help students develop practical skills. / 职业培训课程帮助学生发展实际技能。\n\n> **雅思备考提示：** Vocation在Task 2写作中用于讨论职业选择、工作意义、职业发展等话题时能体现更深层的思考。与\"occupation\"对比使用，\"vocation\"强调的是职业的意义和热情，而\"occupation\"更中立客观。在描述职业满足感、人生使命时，\"vocation\"是更有表达力的选择，能提升论文的文化品味。"}, {"word": "occupation", "body": "**词性：** 名词\n\n**含义：** 职业、工作、占领、占据\n\n**语域：** 中性 / 正式 / 口语；各类语境都常见\n\n**用法说明：**\n\nOccupation是常见名词，主要指一个人为获得生活来源而从事的工作或职业。相比vocation更加中立、客观，不强调使命感，更多强调工作本身的实际性质。可引申为\"占领、占据\"（尤指军事占领）。occupation通常是对工作的客观描述，不涉及个人的热情或价值观。词源自拉丁文occupatio（占有、职业）。\n\n| 搭配 | 含义 |\n|------|------|\n| current occupation | 目前职业 |\n| previous occupation | 以前的职业 |\n| occupation field / sector | 职业领域/部门 |\n| skilled occupation | 技能性职业 |\n| hazardous occupation | 危险职业 |\n| unemployment by occupation | 按职业分类的失业率 |\n\n**近义词辨析：**\n- **occupation**：\"职业、工作\"，中立、客观描述\n- **vocation**：\"职业、天职\"，强调使命感和热情\n- **profession**：\"专业、职业\"，通常指需要高等教育的专业工作\n- **job**：\"工作\"，更口语化，泛指任何工作\n- **career**：\"职业生涯、事业\"，强调长期发展过程\n\n**例句：**\n- Her occupation is listed as an engineer on the census form. / 在人口普查表上，她的职业被列为工程师。\n- The government surveys employment rates by occupation. / 政府按职业调查就业率。\n- After retirement, he had to find a new occupation to stay active. / 退休后，他不得不找到新的职业以保持活跃。\n- Dangerous occupations often require additional safety training. / 危险职业通常需要额外的安全培训。\n\n> **雅思备考提示：** Occupation在Task 1数据描写和Task 2论证中频繁出现，特别是讨论就业、失业、职业分类等话题。在正式的学术写作中，\"occupation\"用于客观描述职业类别，如\"healthcare occupation\"、\"skilled occupation\"等。与\"vocation\"对比，occupation适合用在数据分析、调查统计等较为客观的讨论中。掌握两者的区别能让表达更精准。"}, {"word": "profession", "body": "**词性：** 名词\n\n**含义：** 专业、职业、行业、公开的声明\n\n**语域：** 正式 / 书面；学术、职业、商务语境常见\n\n**用法说明：**\n\nProfession是正式名词，指需要特殊培训、高等教育或专业资格的工作，如医生、律师、工程师等。与occupation和vocation相比，profession强调的是**专业性和学术背景**。通常指那些要求专业知识、执业证书或行业认可的职业。也可指\"公开的声明\"或\"声称\"（如profession of faith）。词源自拉丁文professio（公开声明、职业）。\n\n| 搭配 | 含义 |\n|------|------|\n| medical profession | 医疗专业 |\n| legal profession | 法律专业 |\n| teaching profession | 教学专业 |\n| enter a profession | 从事某专业 |\n| professional qualification | 专业资格 |\n| accounting profession | 会计专业 |\n| health profession | 卫生专业 |\n\n**近义词辨析：**\n- **profession**：\"专业、职业\"，强调高等教育和专业资格，通常指医律工程等\n- **occupation**：\"职业、工作\"，中立客观，范围更广\n- **vocation**：\"职业、天职\"，强调个人使命感和热情\n- **job**：\"工作\"，最口语化，指任何工作\n- **career**：\"职业生涯、事业\"，强调长期发展和进步\n\n**例句：**\n- He chose to enter the medical profession after years of study. / 经过多年学习，他选择进入医疗专业。\n- The legal profession requires not only knowledge but also ethics and integrity. / 法律专业不仅需要知识，还需要伦理和诚信。\n- The teaching profession plays a crucial role in shaping society. / 教学专业在塑造社会中起着至关重要的作用。\n- Professional qualifications are mandatory in many regulated professions. / 在许多受管制的专业中，专业资格是强制性的。\n\n> **雅思备考提示：** Profession在Task 2写作中常见，特别是讨论职业发展、教育、社会角色等话题。\"the teaching/medical/legal profession\"等搭配是学术表达的常用形式。与occupation、vocation三者对比：profession强调专业性和资格，occupation强调工作本身，vocation强调个人使命感。在论述专业人士的责任、地位或教育要求时，使用profession能更准确地表达含义并提升论文学术水平。"}, {"word": "prosecute", "body": "**词性：** 动词\n\n**含义：** 起诉、控告；追诉；进行、继续（某项活动）\n\n**语域：** 正式 / 书面；法律、学术语境常见\n\n**用法说明：**\n\nProsecute有两个主要含义。第一，是法律动词，指以法律手段控告、起诉某人，尤其是在刑事案件中，多用被动语态\"be prosecuted\"。第二，是一般动词，指坚持不懈地进行或继续某项活动、计划或战争。词源自拉丁文prosecutus（追随、追诉）。\n\n| 搭配 | 含义 |\n|------|------|\n| be prosecuted for | 因...而被起诉 |\n| prosecute a case | 控告、起诉（案件） |\n| prosecute a war | 进行战争 |\n| prosecute a claim | 追诉索赔 |\n| prosecute an inquiry | 继续调查 |\n\n**近义词辨析：**\n- **prosecute**：\"起诉、追诉\"（法律用语），或\"继续进行\"\n- **persecute**：\"迫害、骚扰\"，强调不公正对待\n- **sue**：\"起诉、告状\"，通常指民事诉讼\n- **accuse**：\"指控、控告\"，但不一定采取法律行动\n\n**例句：**\n- The government decided to prosecute the company for environmental violations. / 政府决定因违反环保法规起诉该公司。\n- Anyone found guilty of the crime will be prosecuted to the fullest extent of the law. / 任何犯罪者都将被依法严惩。\n- The attorney general announced plans to prosecute multiple cases of financial fraud. / 司法部长宣布计划起诉多起金融欺诈案件。\n- They prosecuted the war for five years before signing a peace treaty. / 他们进行了五年战争后才签署和平条约。\n\n> **雅思备考提示：** Prosecute在Task 2或阅读中常见，特别是讨论犯罪、法律制度、司法程序等话题。\"be prosecuted for\"是法律英语中的常用搭配。在写作中，选用prosecute而非accuse或sue能显得表达更正式专业，尤其是在论述法律措施和制裁时。"}, {"word": "contradict", "body": "**词性：** 动词\n\n**含义：** 反驳、否认；与...相矛盾、自相矛盾\n\n**语域：** 正式 / 书面；学术、学术辩论语境常见\n\n**用法说明：**\n\nContradict是及物动词，指直接否定、反驳他人的陈述，或指两件事相互矛盾、不一致。可用于论证或陈述相反的观点。在被动语态中常表示\"被否认、被反驳\"。词源自拉丁文contradictus（说反话）。\n\n| 搭配 | 含义 |\n|------|------|\n| contradict sb. | 反驳某人 |\n| contradict sth. | 与某事相矛盾 |\n| be contradicted by | 被...所反驳 |\n| directly contradict | 直接反驳 |\n| seem to contradict | 似乎相矛盾 |\n| contradict oneself | 自相矛盾 |\n\n**近义词辨析：**\n- **contradict**：\"反驳、否定\"，指直接否定他人的说法或事物之间的矛盾\n- **dispute**：\"质疑、争辩\"，强调进行讨论或辩论\n- **deny**：\"否认\"，强调拒绝承认某事为真\n- **refute**：\"驳倒、反驳\"，更强调用论据推翻对方观点\n- **challenge**：\"挑战、质疑\"，强调提出异议或竞争\n\n**例句：**\n- The witness's testimony directly contradicts the defendant's statement. / 证人的证词直接反驳了被告的陈述。\n- The new research contradicts earlier findings on climate change. / 新研究与之前关于气候变化的发现相矛盾。\n- It's foolish to contradict your boss in front of clients. / 在客户面前反驳老板是不明智的。\n- The two reports contradict each other on several key points. / 两份报告在多个关键点上相互矛盾。\n\n> **雅思备考提示：** Contradict在Task 2论证和阅读理解中高频出现，特别是讨论不同观点、矛盾现象或论据对比时。\"contradict sth.\"和\"be contradicted by\"是常用搭配。在学术写作中，使用contradict能准确表达观点的对立和证据的矛盾，比笼统的\"different\"更具说服力。掌握该词能提升论证的精确性和学术性。"}, {"word": "controversy", "body": "**词性：** 名词\n\n**含义：** 争议、争论、论战、有争议的话题或事件\n\n**语域：** 正式 / 书面；新闻、学术、公众讨论语境常见\n\n**用法说明：**\n\nControversy是不可数名词，指关于某个话题或事件的公开争论、辩论或分歧，通常涉及对立的观点和强烈的讨论。可指某个引发争议的话题或事件本身。在英语中常与 \"surround\"、\"spark\"、\"fuel\" 等动词搭配。词源自拉丁文controversia（争议、辩论）。\n\n| 搭配 | 含义 |\n|------|------|\n| surround in controversy | 陷入争议 |\n| spark controversy | 引发争议 |\n| fuel controversy | 加剧争议 |\n| amid controversy | 在争议中 |\n| the controversy over | 关于...的争议 |\n| public controversy | 公众争议 |\n| political controversy | 政治争议 |\n\n**近义词辨析：**\n- **controversy**：\"争议、论战\"，指公众关注的议论和对立观点\n- **dispute**：\"争端、分歧\"，强调双方的对立或不同意见\n- **argument**：\"论证、争论\"，可指一般性的讨论或辩论\n- **debate**：\"辩论、讨论\"，强调有组织、有理有据的交换观点\n- **conflict**：\"冲突、矛盾\"，范围更广，可指任何类型的对立\n\n**例句：**\n- The proposed development plan has sparked considerable controversy among local residents. / 提议的开发计划在当地居民中引发了相当大的争议。\n- The politician's comments surrounding the controversy only made things worse. / 该政治人物围绕争议的评论只是让事情变得更糟。\n- There is ongoing controversy about the environmental impact of the project. / 关于该项目的环境影响存在持续的争议。\n- Despite the controversy, the government decided to proceed with the policy. / 尽管存在争议，政府仍决定继续推行该政策。\n\n> **雅思备考提示：** Controversy在Task 2论证和阅读理解中高频出现，特别是讨论社会热点、争议话题或政策争议时。\"spark/fuel controversy\"、\"amid controversy\"、\"the controversy over/around\"都是常用搭配。在学术写作中，合理使用controversy能准确表达公众关注度高的议题，提升文章的时代感和话题相关性。注意其作为不可数名词的用法。"}, {"word": "justify doing", "body": "**词性：** 短语（动词 + 动名词）\n\n**含义：** 证明...的正当性、为...辩护、说明...的合理原因、论证...是正确的\n\n**语域：** 正式 / 书面；学术、论证、商务语境常见\n\n**用法说明：**\n\n\"Justify doing\" 是动词justify与动名词(gerund)的搭配，意指提供令人信服的理由来证明某个行为、决定或观点的合理性。Justify通常后跟名词或动名词，表示\"为...提供充分理由\"。在学术写作和论证中广泛使用。词源自拉丁文justificere（证明...是公正的）。\n\n| 搭配 | 含义 |\n|------|------|\n| justify doing sth. | 证明做某事的正当性 |\n| be justified in doing | 有理由做某事 |\n| fully justify | 充分证明 |\n| can hardly justify | 难以为...辩护 |\n| justify one's actions | 为自己的行为辩护 |\n| justify spending | 证明支出的合理性 |\n\n**近义词辨析：**\n- **justify doing**：\"证明...的正当性\"，强调用合理的理由为某事辩护\n- **excuse**：\"原谅、为...找借口\"，通常指找一个可接受但不一定有力的理由\n- **defend**：\"为...辩护\"，强调反驳批评或指控\n- **explain**：\"解释\"，提供信息和原因但不一定是为了辩护\n- **rationalize**：\"为...合理化\"，通常暗示理由可能不够真实或充分\n\n**例句：**\n- The high cost of the project can be justified by its long-term benefits. / 该项目的高成本可以通过其长期效益得到证明。\n- It's hard to justify spending so much money on advertising when sales are declining. / 当销售下滑时，很难为花费这么多钱做广告辩护。\n- The government's decision to raise taxes was justified by the need for public investment. / 政府提高税收的决定是由公共投资的必要性证明的。\n- The company struggled to justify cutting employee benefits during profitable years. / 该公司在盈利年份削减员工福利的理由很难成立。\n\n> **雅思备考提示：** \"justify doing\"在Task 2论证写作中高频出现，特别是在讨论政策、决定或行为的合理性时。能够熟练使用该搭配表示\"为...提供充分理由\"能大大提升论证的学术性和说服力。常见搭配如\"cannot justify doing\"、\"be justified in doing\"、\"fully justify\"等也是写作中的关键表达。掌握该短语能帮助你更精准地进行论证和批判性思维。"}, {"word": "trial class", "body": "**词性：** 名词短语\n\n**含义：** 试听课、体验课、免费试课、试上课程\n\n**语域：** 非正式 / 口语；教育、培训、商务语境常见\n\n**用法说明：**\n\n\"Trial class\" 是教育和培训机构常用的短语，指学生在正式报名付费课程之前，可以先参加一节免费或优惠的课程以体验教学质量、教师水平和课程内容。\"Trial\" 表示试验、尝试，\"class\" 表示课程。在互联网教育、外语培训、在线课程等领域广泛使用。\n\n| 搭配 | 含义 |\n|------|------|\n| attend a trial class | 参加试听课 |\n| offer trial classes | 提供试听课 |\n| free trial class | 免费试听课 |\n| trial class session | 试课课程 |\n| sign up for a trial class | 报名参加试听课 |\n| one-on-one trial class | 一对一试听课 |\n\n**近义词辨析：**\n- **trial class**：\"试听课、体验课\"，指正式学习前的试验课程\n- **demo class**：\"演示课、展示课\"，强调教师展示教学内容和方法\n- **free class**：\"免费课\"，强调不付费，可能是完整课程或试听\n- **sample class**：\"样本课、示范课\"，强调展示课程风格\n- **introductory class**：\"入门课、介绍课\"，强调课程内容的入门级别\n\n**例句：**\n- Our language school offers a free trial class for all new students. / 我们的语言学校为所有新生提供免费试听课。\n- Before enrolling in the course, students are encouraged to attend a trial class. / 在报名课程前，学生被鼓励先参加试听课。\n- The trial class helped me determine whether this teacher's style suited me. / 试听课帮助我确定这位老师的教学风格是否适合我。\n- Many online platforms now offer trial classes to reduce the risk for students. / 许多在线平台现在提供试听课以降低学生的风险。\n\n> **雅思备考提示：** \"Trial class\"在雅思口语中可能出现于讨论教育经历、课程选择等话题。在写作中不是常用的学术词汇，但在讨论教育产业、在线学习等现代话题时可能用到。了解该短语能帮助你更自然地讨论个人学习经验和教育选择，特别是在Part 1和Part 2的个人话题中。"}, {"word": "suspect", "body": "**词性：** 动词 / 名词 / 形容词（多词性）\n\n**含义：** \n- (动词) 怀疑、猜测、推测\n- (名词) 嫌疑人、被怀疑的人\n- (形容词) 可疑的、值得怀疑的\n\n**语域：** 正式 / 书面；法律、学术、新闻语境常见\n\n**用法说明：**\n\nSuspect是多词性词汇，最常用的是动词\"怀疑、猜测\"，指有理由相信某事可能是真的但不确定。作为名词指被怀疑犯罪的人。作为形容词表示\"可疑的\"。在法律、新闻报道和日常用语中广泛使用。词源自拉丁文suspectus（被看作有疑虑的）。\n\n| 词性 | 搭配 | 含义 |\n|------|------|------|\n| 动词 | suspect that... | 怀疑...（认为...可能） |\n| 动词 | suspect sb. of | 怀疑某人做... |\n| 名词 | prime suspect | 主要嫌疑人 |\n| 名词 | terrorist suspect | 恐怖分子嫌疑人 |\n| 形容词 | suspect motive | 可疑的动机 |\n| 形容词 | suspect quality | 质量可疑 |\n\n**近义词辨析：**\n- **suspect**：\"怀疑、猜测\"，通常基于证据或直觉\n- **doubt**：\"怀疑、不相信\"，强调不确定或不信任\n- **distrust**：\"不信任、怀疑\"，强调缺乏信心\n- **guess**：\"猜测\"，可能更随意，不一定有根据\n- **presume**：\"推测、假定\"，通常基于逻辑或经验\n\n**例句：**\n- I suspect that the new policy will face resistance from employees. / 我怀疑新政策会遭到员工的反抗。\n- The police suspect him of being involved in the robbery. / 警察怀疑他参与了抢劫。\n- The suspect was arrested at the scene of the crime. / 嫌疑人在犯罪现场被逮捕。\n- The company's financial practices seem highly suspect to auditors. / 该公司的财务做法在审计员看来非常可疑。\n\n> **雅思备考提示：** Suspect在阅读理解和听力中高频出现，特别是讨论犯罪、调查或怀疑某事真实性的话题。\"suspect that\"和\"suspect sb. of\"是写作中的常用搭配，能帮助你更准确地表达推测和怀疑。在Task 2论证中，使用suspect能灵活地表达对某个观点或事实的疑虑，如\"Some scholars suspect that...\"。掌握多词性用法能提升表达的灵活性和学术性。"}, {"word": "confine", "body": "**词性：** 动词\n\n**含义：** 限制、束缚、局限于、把...关在...内；限定、界定\n\n**语域：** 正式 / 书面；学术、法律、新闻语境常见\n\n**用法说明：**\n\nConfine是及物动词，主要有两个含义：第一，指限制某人的自由、活动或范围，如将某人关在某处；第二，指将某事限制或局限于特定范围或话题。常用被动语态\"be confined to\"。在学术写作和新闻报道中广泛使用。词源自拉丁文confinis（有共同边界的）。\n\n| 搭配 | 含义 |\n|------|------|\n| confine to | 限制于、局限于 |\n| be confined to | 被限制在... |\n| confined space | 密闭空间 |\n| confine oneself to | 限制自己只... |\n| strictly confined | 严格限制 |\n| confine sb. in/to | 把某人关在... |\n\n**近义词辨析：**\n- **confine**：\"限制、束缚\"，强调对自由、范围或活动的限制\n- **restrict**：\"限制、约束\"，强调设定界限或限制\n- **limit**：\"限制、限定\"，最常用，范围广泛\n- **restrain**：\"抑制、约束\"，强调控制或阻止\n- **bound**：\"限定、界定\"，强调边界限制\n\n**例句：**\n- The new regulations confine the use of social media in schools. / 新规定限制了学校内社交媒体的使用。\n- The patient is confined to bed due to serious injuries. / 由于受伤严重，该患者被限制卧床休养。\n- Let's not confine our discussion to this single issue. / 我们不要把讨论局限于这一个问题。\n- The damage from the flood was confined to the eastern district. / 洪水造成的损害仅限于东部地区。\n\n> **雅思备考提示：** Confine在Task 2论证写作中高频出现，特别是讨论限制、范围、约束等话题。\"be confined to\"是最常用的搭配，能准确表达\"被限制在...范围内\"的含义。在讨论社会限制、自由约束、地理范围等话题时，使用confine能显得表达更正式专业。与restrict、limit对比，confine通常强调对自由或活动的较强束缚。"}, {"word": "commit suicide", "body": "**词性：** 动词短语\n\n**含义：** 自杀、结束自己的生命\n\n**语域：** 正式 / 书面；新闻、学术、法律语境常见\n\n**用法说明：**\n\n\"Commit suicide\" 是动词commit与名词suicide的搭配，指有意识地结束自己的生命。在正式英文中常见，特别是在新闻报道、学术讨论、法律文件中。需要注意的是，现代心理健康领域倾向于使用更人道的表达方式，如\"die by suicide\"或\"take one's own life\"以避免将自杀视为一个\"犯罪行为\"。\n\n| 搭配 | 含义 |\n|------|------|\n| commit suicide | 自杀 |\n| attempt suicide | 自杀未遂 |\n| die by suicide | 因自杀身亡 |\n| suicide attempt | 自杀尝试 |\n| suicide rate | 自杀率 |\n\n**例句：**\n- The documentary explores why suicide rates have increased in recent years. / 这部纪录片探讨了近年来自杀率上升的原因。\n- Mental health services are crucial in preventing suicide among teenagers. / 心理健康服务对于预防青少年自杀至关重要。\n- Studies show that social isolation can increase the risk of suicide. / 研究表明社会孤立可能增加自杀风险。\n\n> **雅思备考提示：** 在讨论心理健康、社会问题或统计数据时可能出现。使用该表达时要尊重敏感话题，可根据语境选择\"commit suicide\"（书面正式）、\"die by suicide\"（更人道的现代用法）或\"take one's own life\"（委婉表达）。"}, {"word": "commit murder", "body": "**词性：** 动词短语\n\n**含义：** 犯谋杀罪、杀害他人、谋杀\n\n**语域：** 正式 / 书面；法律、新闻、学术语境常见\n\n**用法说明：**\n\n\"Commit murder\" 是动词commit与名词murder的搭配，指有意识地、非法地杀害他人。在法律、新闻报道和学术讨论中广泛使用。\"Murder\"强调的是有预谋、故意的杀害行为，与无意的\"kill\"或冲动的\"manslaughter\"不同。\n\n| 搭配 | 含义 |\n|------|------|\n| commit murder | 谋杀、犯谋杀罪 |\n| murder suspect | 谋杀嫌疑人 |\n| murder charge | 谋杀指控 |\n| murder trial | 谋杀审判 |\n| murder rate | 谋杀率 |\n| premeditated murder | 预谋谋杀 |\n\n**近义词辨析：**\n- **commit murder**：\"谋杀\"，强调有计划、故意的杀害行为\n- **kill**：\"杀死\"，较为中立，可指有意或无意\n- **assassinate**：\"暗杀\"，强调对重要人物的有组织的杀害\n- **commit manslaughter**：\"过失杀人\"，强调无预谋、过失导致的死亡\n\n**例句：**\n- The suspect was arrested on charges of committing murder. / 嫌疑人因谋杀罪被逮捕。\n- Statistics show that urban areas have higher murder rates than rural areas. / 统计数据显示城市地区的谋杀率高于农村地区。\n- The detective worked tirelessly to solve the murder case. / 侦探不懈地工作以破获这起谋杀案。\n- Evidence suggests that the crime was a premeditated murder, not a crime of passion. / 证据表明这是一起预谋的谋杀案，而非激情犯罪。\n\n> **雅思备考提示：** \"Commit murder\"在讨论犯罪率、法律制度、社会问题时出现。在学术写作中，使用该表达能准确表达\"故意杀害他人\"的含义。与\"kill\"对比，murder强调的是有意和非法性；与\"manslaughter\"对比，murder强调有预谋。掌握这些区别能帮助你在讨论法律问题时更精准地表达。"}, {"word": "hundred thousand", "body": "**词性：** 名词短语 / 数词\n\n**含义：** 十万、100,000\n\n**语域：** 正式 / 书面；数据统计、学术、新闻语境常见\n\n**用法说明：**\n\n\"Hundred thousand\" 是一个复合数词，表示100,000这个数字。在英语中，数字的表达需要注意：\n- 单数形式：**one hundred thousand** 或 **a hundred thousand**\n- 复数形式：**hundreds of thousands** (表示多个十万，约数)\n- 注意：当hundred前有具体数字时，hundred不加s；当表示\"好几个十万\"时用 \"hundreds of thousands\"\n\n| 表达方式 | 含义 |\n|---------|------|\n| a hundred thousand | 一个十万、十万 |\n| one hundred thousand | 一个十万（更正式） |\n| hundreds of thousands | 好几个十万、数十万 |\n| 100,000 | 数字形式 |\n| 100K | 简写形式（非正式） |\n\n**例句：**\n- The city has a population of over a hundred thousand people. / 这座城市的人口超过十万。\n- Hundreds of thousands of people attended the protest. / 数十万人参加了抗议活动。\n- The company's revenue increased by a hundred thousand dollars last year. / 该公司去年收入增加了十万美元。\n- The rare book is worth several hundred thousand pounds. / 这本稀有书籍价值数十万英镑。\n\n> **雅思备考提示：** \"Hundred thousand\"在Task 1数据描写、Task 2论证（涉及统计数据）和阅读中高频出现。在描述人口、金额、数量等数据时需要掌握正确的表达。注意 \"a/one hundred thousand\" 用单数，而 \"hundreds of thousands\"表示约数用复数。在学术写作中准确表达数字能增强论证的可信度。"}, {"word": "brilliant", "body": "**词性：** 形容词\n\n**含义：** \n- (描写亮度) 耀眼的、闪闪发光的、明亮的\n- (描写才能) 杰出的、出色的、聪慧的、才华横溢的\n- (描写表现) 出众的、精彩的、卓越的\n\n**语域：** 正式 / 书面；学术、评价、新闻语境常见\n\n**用法说明：**\n\nBrilliant是多义形容词，最常见的是表示\"杰出的、出色的\"，用来赞扬某人的才能、思想或表现。其次是表示\"光线明亮的、耀眼的\"。在学术写作和口语评价中广泛使用。词源自拉丁文brillare（闪闪发光）。\n\n| 用法 | 搭配 | 含义 |\n|------|------|------|\n| 才能/思想 | brilliant idea | 杰出的主意 |\n| 才能/思想 | brilliant student | 聪慧的学生 |\n| 才能/思想 | brilliant performance | 精彩的表演 |\n| 亮度 | brilliant light | 耀眼的光 |\n| 亮度 | brilliant color | 鲜艳的颜色 |\n\n**近义词辨析：**\n- **brilliant**：\"杰出的、出色的\"，强调才智或表现的卓越\n- **excellent**：\"优秀的、杰出的\"，更客观、正式的评价\n- **outstanding**：\"杰出的、突出的\"，强调超越一般标准\n- **intelligent**：\"聪慧的、智慧的\"，强调智力本身\n- **bright**：\"聪慧的、明亮的\"，较为日常，范围更广\n\n**例句：**\n- She is a brilliant mathematician with innovative ideas. / 她是一位才华横溢的数学家，思想创新。\n- The research team came up with a brilliant solution to the problem. / 研究团队想到了一个杰出的解决方案。\n- The sunset painted the sky in brilliant shades of orange and red. / 夕阳把天空染成了耀眼的橙色和红色。\n- His brilliant performance in the exam impressed all the teachers. / 他在考试中的出色表现给所有教师留下了深刻印象。\n\n> **雅思备考提示：** Brilliant在Task 2论证和口语Part 3评价中高频出现。用来描写创意、表现或观点时，比excellent、good更生动、更有说服力。在学术写作中，使用brilliant能准确表达\"杰出的\"含义并增强表达的学术性。与intelligent对比，brilliant强调表现或成就的卓越性，而不仅仅是智力。掌握该词能提升评价和论证的表达质量。"}, {"word": "rob", "body": "**词性：** 动词\n\n**含义：** 抢劫、盗取、剥夺\n\n**语域：** 正式 / 书面；法律、新闻、学术语境常见\n\n**用法说明：**\n\nRob是及物动词，主要有两个用法：第一，指通过暴力或威胁从某人身上盗取金钱或财物，通常用\"rob sb. of sth.\"的形式；第二，引申含义指\"夺取、剥夺\"某人拥有的权利或机会。注意与steal（偷）的区别：rob强调有人的参与和暴力/威胁，steal强调取走东西本身。词源自古法语rober（掠夺）。\n\n| 搭配 | 含义 |\n|------|------|\n| rob sb. of sth. | 从某人那里抢夺... |\n| rob a bank | 抢劫银行 |\n| be robbed of | 被夺去... |\n| rob sb. of the opportunity | 夺去某人的机会 |\n| armed robbery | 武装抢劫 |\n| robbery victim | 抢劫受害者 |\n\n**近义词辨析：**\n- **rob**：\"抢劫、盗取\"，强调有人参与、通常伴随暴力或威胁\n- **steal**：\"偷窃、盗取\"，强调秘密取走东西，不一定涉及人\n- **burgle**：\"入室盗窃\"，强调非法进入建筑物盗取\n- **mug**：\"抢劫（行人）\"，强调在街道上用暴力抢劫\n- **loot**：\"掠夺、抢掠\"，强调大规模的掠夺或混乱中的抢劫\n\n**例句：**\n- The gang robbed a convenience store last night. / 这帮人昨晚抢劫了一家便利店。\n- She was robbed of her purse while walking in the park. / 她在公园里散步时被人抢走了钱包。\n- The new policy robbed young people of job opportunities. / 新政策夺去了年轻人的就业机会。\n- Three armed robbers were arrested near the bank. / 三名武装抢劫犯在银行附近被逮捕。\n\n> **雅思备考提示：** Rob在讨论犯罪、社会问题或权利问题时出现。\"rob sb. of sth.\"是最常用的搭配，能准确表达\"从某人身上夺取...\"的含义。在Task 2论证中，当讨论权利被剥夺（如\"rob people of freedom\"）时，使用rob能增强表达的学术性和说服力。与steal对比，rob强调暴力和有人参与，应根据具体语境选择。"}, {"word": "fraud", "body": "**词性：** 名词\n\n**含义：** 欺诈、诈骗、骗局、骗子\n\n**语域：** 正式 / 书面；法律、新闻、学术语境常见\n\n**用法说明：**\n\nFraud是可数和不可数名词，主要指**有计划、有目的的欺骗行为，目的是非法获取金钱或其他利益**。强调故意性和欺骗的系统性。常用于法律、商业和新闻语境中。与cheat相比，fraud更加正式、法律性更强，通常涉及更大规模的欺骗和经济损失。词源自拉丁文fraus（欺骗、欺诈）。\n\n| 搭配 | 含义 |\n|------|----

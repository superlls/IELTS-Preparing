占据</p>\n<p><strong>语域：</strong> 中性 / 正式 / 口语；各类语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Occupation是常见名词，主要指一个人为获得生活来源而从事的工作或职业。相比vocation更加中立、客观，不强调使命感，更多强调工作本身的实际性质。可引申为&quot;占领、占据&quot;（尤指军事占领）。occupation通常是对工作的客观描述，不涉及个人的热情或价值观。词源自拉丁文occupatio（占有、职业）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>current occupation</td><td>目前职业</td></tr>\n<tr><td>previous occupation</td><td>以前的职业</td></tr>\n<tr><td>occupation field / sector</td><td>职业领域/部门</td></tr>\n<tr><td>skilled occupation</td><td>技能性职业</td></tr>\n<tr><td>hazardous occupation</td><td>危险职业</td></tr>\n<tr><td>unemployment by occupation</td><td>按职业分类的失业率</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>occupation</strong>：&quot;职业、工作&quot;，中立、客观描述</li>\n<li><strong>vocation</strong>：&quot;职业、天职&quot;，强调使命感和热情</li>\n<li><strong>profession</strong>：&quot;专业、职业&quot;，通常指需要高等教育的专业工作</li>\n<li><strong>job</strong>：&quot;工作&quot;，更口语化，泛指任何工作</li>\n<li><strong>career</strong>：&quot;职业生涯、事业&quot;，强调长期发展过程</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Her occupation is listed as an engineer on the census form. / 在人口普查表上，她的职业被列为工程师。</li>\n<li>The government surveys employment rates by occupation. / 政府按职业调查就业率。</li>\n<li>After retirement, he had to find a new occupation to stay active. / 退休后，他不得不找到新的职业以保持活跃。</li>\n<li>Dangerous occupations often require additional safety training. / 危险职业通常需要额外的安全培训。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Occupation在Task 1数据描写和Task 2论证中频繁出现，特别是讨论就业、失业、职业分类等话题。在正式的学术写作中，&quot;occupation&quot;用于客观描述职业类别，如&quot;healthcare occupation&quot;、&quot;skilled occupation&quot;等。与&quot;vocation&quot;对比，occupation适合用在数据分析、调查统计等较为客观的讨论中。掌握两者的区别能让表达更精准。</blockquote>", "profession": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 专业、职业、行业、公开的声明</p>\n<p><strong>语域：</strong> 正式 / 书面；学术、职业、商务语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Profession是正式名词，指需要特殊培训、高等教育或专业资格的工作，如医生、律师、工程师等。与occupation和vocation相比，profession强调的是<strong>专业性和学术背景</strong>。通常指那些要求专业知识、执业证书或行业认可的职业。也可指&quot;公开的声明&quot;或&quot;声称&quot;（如profession of faith）。词源自拉丁文professio（公开声明、职业）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>medical profession</td><td>医疗专业</td></tr>\n<tr><td>legal profession</td><td>法律专业</td></tr>\n<tr><td>teaching profession</td><td>教学专业</td></tr>\n<tr><td>enter a profession</td><td>从事某专业</td></tr>\n<tr><td>professional qualification</td><td>专业资格</td></tr>\n<tr><td>accounting profession</td><td>会计专业</td></tr>\n<tr><td>health profession</td><td>卫生专业</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>profession</strong>：&quot;专业、职业&quot;，强调高等教育和专业资格，通常指医律工程等</li>\n<li><strong>occupation</strong>：&quot;职业、工作&quot;，中立客观，范围更广</li>\n<li><strong>vocation</strong>：&quot;职业、天职&quot;，强调个人使命感和热情</li>\n<li><strong>job</strong>：&quot;工作&quot;，最口语化，指任何工作</li>\n<li><strong>career</strong>：&quot;职业生涯、事业&quot;，强调长期发展和进步</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>He chose to enter the medical profession after years of study. / 经过多年学习，他选择进入医疗专业。</li>\n<li>The legal profession requires not only knowledge but also ethics and integrity. / 法律专业不仅需要知识，还需要伦理和诚信。</li>\n<li>The teaching profession plays a crucial role in shaping society. / 教学专业在塑造社会中起着至关重要的作用。</li>\n<li>Professional qualifications are mandatory in many regulated professions. / 在许多受管制的专业中，专业资格是强制性的。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Profession在Task 2写作中常见，特别是讨论职业发展、教育、社会角色等话题。&quot;the teaching/medical/legal profession&quot;等搭配是学术表达的常用形式。与occupation、vocation三者对比：profession强调专业性和资格，occupation强调工作本身，vocation强调个人使命感。在论述专业人士的责任、地位或教育要求时，使用profession能更准确地表达含义并提升论文学术水平。</blockquote>", "prosecute": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 起诉、控告；追诉；进行、继续（某项活动）</p>\n<p><strong>语域：</strong> 正式 / 书面；法律、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Prosecute有两个主要含义。第一，是法律动词，指以法律手段控告、起诉某人，尤其是在刑事案件中，多用被动语态&quot;be prosecuted&quot;。第二，是一般动词，指坚持不懈地进行或继续某项活动、计划或战争。词源自拉丁文prosecutus（追随、追诉）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>be prosecuted for</td><td>因...而被起诉</td></tr>\n<tr><td>prosecute a case</td><td>控告、起诉（案件）</td></tr>\n<tr><td>prosecute a war</td><td>进行战争</td></tr>\n<tr><td>prosecute a claim</td><td>追诉索赔</td></tr>\n<tr><td>prosecute an inquiry</td><td>继续调查</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>prosecute</strong>：&quot;起诉、追诉&quot;（法律用语），或&quot;继续进行&quot;</li>\n<li><strong>persecute</strong>：&quot;迫害、骚扰&quot;，强调不公正对待</li>\n<li><strong>sue</strong>：&quot;起诉、告状&quot;，通常指民事诉讼</li>\n<li><strong>accuse</strong>：&quot;指控、控告&quot;，但不一定采取法律行动</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The government decided to prosecute the company for environmental violations. / 政府决定因违反环保法规起诉该公司。</li>\n<li>Anyone found guilty of the crime will be prosecuted to the fullest extent of the law. / 任何犯罪者都将被依法严惩。</li>\n<li>The attorney general announced plans to prosecute multiple cases of financial fraud. / 司法部长宣布计划起诉多起金融欺诈案件。</li>\n<li>They prosecuted the war for five years before signing a peace treaty. / 他们进行了五年战争后才签署和平条约。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Prosecute在Task 2或阅读中常见，特别是讨论犯罪、法律制度、司法程序等话题。&quot;be prosecuted for&quot;是法律英语中的常用搭配。在写作中，选用prosecute而非accuse或sue能显得表达更正式专业，尤其是在论述法律措施和制裁时。</blockquote>", "contradict": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 反驳、否认；与...相矛盾、自相矛盾</p>\n<p><strong>语域：</strong> 正式 / 书面；学术、学术辩论语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Contradict是及物动词，指直接否定、反驳他人的陈述，或指两件事相互矛盾、不一致。可用于论证或陈述相反的观点。在被动语态中常表示&quot;被否认、被反驳&quot;。词源自拉丁文contradictus（说反话）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>contradict sb.</td><td>反驳某人</td></tr>\n<tr><td>contradict sth.</td><td>与某事相矛盾</td></tr>\n<tr><td>be contradicted by</td><td>被...所反驳</td></tr>\n<tr><td>directly contradict</td><td>直接反驳</td></tr>\n<tr><td>seem to contradict</td><td>似乎相矛盾</td></tr>\n<tr><td>contradict oneself</td><td>自相矛盾</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>contradict</strong>：&quot;反驳、否定&quot;，指直接否定他人的说法或事物之间的矛盾</li>\n<li><strong>dispute</strong>：&quot;质疑、争辩&quot;，强调进行讨论或辩论</li>\n<li><strong>deny</strong>：&quot;否认&quot;，强调拒绝承认某事为真</li>\n<li><strong>refute</strong>：&quot;驳倒、反驳&quot;，更强调用论据推翻对方观点</li>\n<li><strong>challenge</strong>：&quot;挑战、质疑&quot;，强调提出异议或竞争</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The witness&#x27;s testimony directly contradicts the defendant&#x27;s statement. / 证人的证词直接反驳了被告的陈述。</li>\n<li>The new research contradicts earlier findings on climate change. / 新研究与之前关于气候变化的发现相矛盾。</li>\n<li>It&#x27;s foolish to contradict your boss in front of clients. / 在客户面前反驳老板是不明智的。</li>\n<li>The two reports contradict each other on several key points. / 两份报告在多个关键点上相互矛盾。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Contradict在Task 2论证和阅读理解中高频出现，特别是讨论不同观点、矛盾现象或论据对比时。&quot;contradict sth.&quot;和&quot;be contradicted by&quot;是常用搭配。在学术写作中，使用contradict能准确表达观点的对立和证据的矛盾，比笼统的&quot;different&quot;更具说服力。掌握该词能提升论证的精确性和学术性。</blockquote>", "controversy": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 争议、争论、论战、有争议的话题或事件</p>\n<p><strong>语域：</strong> 正式 / 书面；新闻、学术、公众讨论语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Controversy是不可数名词，指关于某个话题或事件的公开争论、辩论或分歧，通常涉及对立的观点和强烈的讨论。可指某个引发争议的话题或事件本身。在英语中常与 &quot;surround&quot;、&quot;spark&quot;、&quot;fuel&quot; 等动词搭配。词源自拉丁文controversia（争议、辩论）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>surround in controversy</td><td>陷入争议</td></tr>\n<tr><td>spark controversy</td><td>引发争议</td></tr>\n<tr><td>fuel controversy</td><td>加剧争议</td></tr>\n<tr><td>amid controversy</td><td>在争议中</td></tr>\n<tr><td>the controversy over</td><td>关于...的争议</td></tr>\n<tr><td>public controversy</td><td>公众争议</td></tr>\n<tr><td>political controversy</td><td>政治争议</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>controversy</strong>：&quot;争议、论战&quot;，指公众关注的议论和对立观点</li>\n<li><strong>dispute</strong>：&quot;争端、分歧&quot;，强调双方的对立或不同意见</li>\n<li><strong>argument</strong>：&quot;论证、争论&quot;，可指一般性的讨论或辩论</li>\n<li><strong>debate</strong>：&quot;辩论、讨论&quot;，强调有组织、有理有据的交换观点</li>\n<li><strong>conflict</strong>：&quot;冲突、矛盾&quot;，范围更广，可指任何类型的对立</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The proposed development plan has sparked considerable controversy among local residents. / 提议的开发计划在当地居民中引发了相当大的争议。</li>\n<li>The politician&#x27;s comments surrounding the controversy only made things worse. / 该政治人物围绕争议的评论只是让事情变得更糟。</li>\n<li>There is ongoing controversy about the environmental impact of the project. / 关于该项目的环境影响存在持续的争议。</li>\n<li>Despite the controversy, the government decided to proceed with the policy. / 尽管存在争议，政府仍决定继续推行该政策。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Controversy在Task 2论证和阅读理解中高频出现，特别是讨论社会热点、争议话题或政策争议时。&quot;spark/fuel controversy&quot;、&quot;amid controversy&quot;、&quot;the controversy over/around&quot;都是常用搭配。在学术写作中，合理使用controversy能准确表达公众关注度高的议题，提升文章的时代感和话题相关性。注意其作为不可数名词的用法。</blockquote>", "justify doing": "<p><strong>词性：</strong> 短语（动词 + 动名词）</p>\n<p><strong>含义：</strong> 证明...的正当性、为...辩护、说明...的合理原因、论证...是正确的</p>\n<p><strong>语域：</strong> 正式 / 书面；学术、论证、商务语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;Justify doing&quot; 是动词justify与动名词(gerund)的搭配，意指提供令人信服的理由来证明某个行为、决定或观点的合理性。Justify通常后跟名词或动名词，表示&quot;为...提供充分理由&quot;。在学术写作和论证中广泛使用。词源自拉丁文justificere（证明...是公正的）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>justify doing sth.</td><td>证明做某事的正当性</td></tr>\n<tr><td>be justified in doing</td><td>有理由做某事</td></tr>\n<tr><td>fully justify</td><td>充分证明</td></tr>\n<tr><td>can hardly justify</td><td>难以为...辩护</td></tr>\n<tr><td>justify one&#x27;s actions</td><td>为自己的行为辩护</td></tr>\n<tr><td>justify spending</td><td>证明支出的合理性</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>justify doing</strong>：&quot;证明...的正当性&quot;，强调用合理的理由为某事辩护</li>\n<li><strong>excuse</strong>：&quot;原谅、为...找借口&quot;，通常指找一个可接受但不一定有力的理由</li>\n<li><strong>defend</strong>：&quot;为...辩护&quot;，强调反驳批评或指控</li>\n<li><strong>explain</strong>：&quot;解释&quot;，提供信息和原因但不一定是为了辩护</li>\n<li><strong>rationalize</strong>：&quot;为...合理化&quot;，通常暗示理由可能不够真实或充分</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The high cost of the project can be justified by its long-term benefits. / 该项目的高成本可以通过其长期效益得到证明。</li>\n<li>It&#x27;s hard to justify spending so much money on advertising when sales are declining. / 当销售下滑时，很难为花费这么多钱做广告辩护。</li>\n<li>The government&#x27;s decision to raise taxes was justified by the need for public investment. / 政府提高税收的决定是由公共投资的必要性证明的。</li>\n<li>The company struggled to justify cutting employee benefits during profitable years. / 该公司在盈利年份削减员工福利的理由很难成立。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> &quot;justify doing&quot;在Task 2论证写作中高频出现，特别是在讨论政策、决定或行为的合理性时。能够熟练使用该搭配表示&quot;为...提供充分理由&quot;能大大提升论证的学术性和说服力。常见搭配如&quot;cannot justify doing&quot;、&quot;be justified in doing&quot;、&quot;fully justify&quot;等也是写作中的关键表达。掌握该短语能帮助你更精准地进行论证和批判性思维。</blockquote>", "trial class": "<p><strong>词性：</strong> 名词短语</p>\n<p><strong>含义：</strong> 试听课、体验课、免费试课、试上课程</p>\n<p><strong>语域：</strong> 非正式 / 口语；教育、培训、商务语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;Trial class&quot; 是教育和培训机构常用的短语，指学生在正式报名付费课程之前，可以先参加一节免费或优惠的课程以体验教学质量、教师水平和课程内容。&quot;Trial&quot; 表示试验、尝试，&quot;class&quot; 表示课程。在互联网教育、外语培训、在线课程等领域广泛使用。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>attend a trial class</td><td>参加试听课</td></tr>\n<tr><td>offer trial classes</td><td>提供试听课</td></tr>\n<tr><td>free trial class</td><td>免费试听课</td></tr>\n<tr><td>trial class session</td><td>试课课程</td></tr>\n<tr><td>sign up for a trial class</td><td>报名参加试听课</td></tr>\n<tr><td>one-on-one trial class</td><td>一对一试听课</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>trial class</strong>：&quot;试听课、体验课&quot;，指正式学习前的试验课程</li>\n<li><strong>demo class</strong>：&quot;演示课、展示课&quot;，强调教师展示教学内容和方法</li>\n<li><strong>free class</strong>：&quot;免费课&quot;，强调不付费，可能是完整课程或试听</li>\n<li><strong>sample class</strong>：&quot;样本课、示范课&quot;，强调展示课程风格</li>\n<li><strong>introductory class</strong>：&quot;入门课、介绍课&quot;，强调课程内容的入门级别</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Our language school offers a free trial class for all new students. / 我们的语言学校为所有新生提供免费试听课。</li>\n<li>Before enrolling in the course, students are encouraged to attend a trial class. / 在报名课程前，学生被鼓励先参加试听课。</li>\n<li>The trial class helped me determine whether this teacher&#x27;s style suited me. / 试听课帮助我确定这位老师的教学风格是否适合我。</li>\n<li>Many online platforms now offer trial classes to reduce the risk for students. / 许多在线平台现在提供试听课以降低学生的风险。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> &quot;Trial class&quot;在雅思口语中可能出现于讨论教育经历、课程选择等话题。在写作中不是常用的学术词汇，但在讨论教育产业、在线学习等现代话题时可能用到。了解该短语能帮助你更自然地讨论个人学习经验和教育选择，特别是在Part 1和Part 2的个人话题中。</blockquote>", "suspect": "<p><strong>词性：</strong> 动词 / 名词 / 形容词（多词性）</p>\n<p><strong>含义：</strong> </p>\n<ul>\n<li>(动词) 怀疑、猜测、推测</li>\n<li>(名词) 嫌疑人、被怀疑的人</li>\n<li>(形容词) 可疑的、值得怀疑的</li>\n</ul>\n<p><strong>语域：</strong> 正式 / 书面；法律、学术、新闻语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Suspect是多词性词汇，最常用的是动词&quot;怀疑、猜测&quot;，指有理由相信某事可能是真的但不确定。作为名词指被怀疑犯罪的人。作为形容词表示&quot;可疑的&quot;。在法律、新闻报道和日常用语中广泛使用。词源自拉丁文suspectus（被看作有疑虑的）。</p>\n<table>\n<tr><th>词性</th><th>搭配</th><th>含义</th></tr>\n<tr><td>动词</td><td>suspect that...</td><td>怀疑...（认为...可能）</td></tr>\n<tr><td>动词</td><td>suspect sb. of</td><td>怀疑某人做...</td></tr>\n<tr><td>名词</td><td>prime suspect</td><td>主要嫌疑人</td></tr>\n<tr><td>名词</td><td>terrorist suspect</td><td>恐怖分子嫌疑人</td></tr>\n<tr><td>形容词</td><td>suspect motive</td><td>可疑的动机</td></tr>\n<tr><td>形容词</td><td>suspect quality</td><td>质量可疑</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>suspect</strong>：&quot;怀疑、猜测&quot;，通常基于证据或直觉</li>\n<li><strong>doubt</strong>：&quot;怀疑、不相信&quot;，强调不确定或不信任</li>\n<li><strong>distrust</strong>：&quot;不信任、怀疑&quot;，强调缺乏信心</li>\n<li><strong>guess</strong>：&quot;猜测&quot;，可能更随意，不一定有根据</li>\n<li><strong>presume</strong>：&quot;推测、假定&quot;，通常基于逻辑或经验</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>I suspect that the new policy will face resistance from employees. / 我怀疑新政策会遭到员工的反抗。</li>\n<li>The police suspect him of being involved in the robbery. / 警察怀疑他参与了抢劫。</li>\n<li>The suspect was arrested at the scene of the crime. / 嫌疑人在犯罪现场被逮捕。</li>\n<li>The company&#x27;s financial practices seem highly suspect to auditors. / 该公司的财务做法在审计员看来非常可疑。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Suspect在阅读理解和听力中高频出现，特别是讨论犯罪、调查或怀疑某事真实性的话题。&quot;suspect that&quot;和&quot;suspect sb. of&quot;是写作中的常用搭配，能帮助你更准确地表达推测和怀疑。在Task 2论证中，使用suspect能灵活地表达对某个观点或事实的疑虑，如&quot;Some scholars suspect that...&quot;。掌握多词性用法能提升表达的灵活性和学术性。</blockquote>", "confine": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 限制、束缚、局限于、把...关在...内；限定、界定</p>\n<p><strong>语域：</strong> 正式 / 书面；学术、法律、新闻语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Confine是及物动词，主要有两个含义：第一，指限制某人的自由、活动或范围，如将某人关在某处；第二，指将某事限制或局限于特定范围或话题。常用被动语态&quot;be confined to&quot;。在学术写作和新闻报道中广泛使用。词源自拉丁文confinis（有共同边界的）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>confine to</td><td>限制于、局限于</td></tr>\n<tr><td>be confined to</td><td>被限制在...</td></tr>\n<tr><td>confined space</td><td>密闭空间</td></tr>\n<tr><td>confine oneself to</td><td>限制自己只...</td></tr>\n<tr><td>strictly confined</td><td>严格限制</td></tr>\n<tr><td>confine sb. in/to</td><td>把某人关在...</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>confine</strong>：&quot;限制、束缚&quot;，强调对自由、范围或活动的限制</li>\n<li><strong>restrict</strong>：&quot;限制、约束&quot;，强调设定界限或限制</li>\n<li><strong>limit</strong>：&quot;限制、限定&quot;，最常用，范围广泛</li>\n<li><strong>restrain</strong>：&quot;抑制、约束&quot;，强调控制或阻止</li>\n<li><strong>bound</strong>：&quot;限定、界定&quot;，强调边界限制</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The new regulations confine the use of social media in schools. / 新规定限制了学校内社交媒体的使用。</li>\n<li>The patient is confined to bed due to serious injuries. / 由于受伤严重，该患者被限制卧床休养。</li>\n<li>Let&#x27;s not confine our discussion to this single issue. / 我们不要把讨论局限于这一个问题。</li>\n<li>The damage from the flood was confined to the eastern district. / 洪水造成的损害仅限于东部地区。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Confine在Task 2论证写作中高频出现，特别是讨论限制、范围、约束等话题。&quot;be confined to&quot;是最常用的搭配，能准确表达&quot;被限制在...范围内&quot;的含义。在讨论社会限制、自由约束、地理范围等话题时，使用confine能显得表达更正式专业。与restrict、limit对比，confine通常强调对自由或活动的较强束缚。</blockquote>", "commit suicide": "<p><strong>词性：</strong> 动词短语</p>\n<p><strong>含义：</strong> 自杀、结束自己的生命</p>\n<p><strong>语域：</strong> 正式 / 书面；新闻、学术、法律语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;Commit suicide&quot; 是动词commit与名词suicide的搭配，指有意识地结束自己的生命。在正式英文中常见，特别是在新闻报道、学术讨论、法律文件中。需要注意的是，现代心理健康领域倾向于使用更人道的表达方式，如&quot;die by suicide&quot;或&quot;take one&#x27;s own life&quot;以避免将自杀视为一个&quot;犯罪行为&quot;。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>commit suicide</td><td>自杀</td></tr>\n<tr><td>attempt suicide</td><td>自杀未遂</td></tr>\n<tr><td>die by suicide</td><td>因自杀身亡</td></tr>\n<tr><td>suicide attempt</td><td>自杀尝试</td></tr>\n<tr><td>suicide rate</td><td>自杀率</td></tr>\n</table>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The documentary explores why suicide rates have increased in recent years. / 这部纪录片探讨了近年来自杀率上升的原因。</li>\n<li>Mental health services are crucial in preventing suicide among teenagers. / 心理健康服务对于预防青少年自杀至关重要。</li>\n<li>Studies show that social isolation can increase the risk of suicide. / 研究表明社会孤立可能增加自杀风险。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> 在讨论心理健康、社会问题或统计数据时可能出现。使用该表达时要尊重敏感话题，可根据语境选择&quot;commit suicide&quot;（书面正式）、&quot;die by suicide&quot;（更人道的现代用法）或&quot;take one&#x27;s own life&quot;（委婉表达）。</blockquote>", "commit murder": "<p><strong>词性：</strong> 动词短语</p>\n<p><strong>含义：</strong> 犯谋杀罪、杀害他人、谋杀</p>\n<p><strong>语域：</strong> 正式 / 书面；法律、新闻、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;Commit murder&quot; 是动词commit与名词murder的搭配，指有意识地、非法地杀害他人。在法律、新闻报道和学术讨论中广泛使用。&quot;Murder&quot;强调的是有预谋、故意的杀害行为，与无意的&quot;kill&quot;或冲动的&quot;manslaughter&quot;不同。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>commit murder</td><td>谋杀、犯谋杀罪</td></tr>\n<tr><td>murder suspect</td><td>谋杀嫌疑人</td></tr>\n<tr><td>murder charge</td><td>谋杀指控</td></tr>\n<tr><td>murder trial</td><td>谋杀审判</td></tr>\n<tr><td>murder rate</td><td>谋杀率</td></tr>\n<tr><td>premeditated murder</td><td>预谋谋杀</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>commit murder</strong>：&quot;谋杀&quot;，强调有计划、故意的杀害行为</li>\n<li><strong>kill</strong>：&quot;杀死&quot;，较为中立，可指有意或无意</li>\n<li><strong>assassinate</strong>：&quot;暗杀&quot;，强调对重要人物的有组织的杀害</li>\n<li><strong>commit manslaughter</strong>：&quot;过失杀人&quot;，强调无预谋、过失导致的死亡</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The suspect was arrested on charges of committing murder. / 嫌疑人因谋杀罪被逮捕。</li>\n<li>Statistics show that urban areas have higher murder rates than rural areas. / 统计数据显示城市地区的谋杀率高于农村地区。</li>\n<li>The detective worked tirelessly to solve the murder case. / 侦探不懈地工作以破获这起谋杀案。</li>\n<li>Evidence suggests that the crime was a premeditated murder, not a crime of passion. / 证据表明这是一起预谋的谋杀案，而非激情犯罪。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> &quot;Commit murder&quot;在讨论犯罪率、法律制度、社会问题时出现。在学术写作中，使用该表达能准确表达&quot;故意杀害他人&quot;的含义。与&quot;kill&quot;对比，murder强调的是有意和非法性；与&quot;manslaughter&quot;对比，murder强调有预谋。掌握这些区别能帮助你在讨论法律问题时更精准地表达。</blockquote>", "hundred thousand": "<p><strong>词性：</strong> 名词短语 / 数词</p>\n<p><strong>含义：</strong> 十万、100,000</p>\n<p><strong>语域：</strong> 正式 / 书面；数据统计、学术、新闻语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;Hundred thousand&quot; 是一个复合数词，表示100,000这个数字。在英语中，数字的表达需要注意：</p>\n<ul>\n<li>单数形式：<strong>one hundred thousand</strong> 或 <strong>a hundred thousand</strong></li>\n<li>复数形式：<strong>hundreds of thousands</strong> (表示多个十万，约数)</li>\n<li>注意：当hundred前有具体数字时，hundred不加s；当表示&quot;好几个十万&quot;时用 &quot;hundreds of thousands&quot;</li>\n</ul>\n<table>\n<tr><th>表达方式</th><th>含义</th></tr>\n<tr><td>a hundred thousand</td><td>一个十万、十万</td></tr>\n<tr><td>one hundred thousand</td><td>一个十万（更正式）</td></tr>\n<tr><td>hundreds of thousands</td><td>好几个十万、数十万</td></tr>\n<tr><td>100,000</td><td>数字形式</td></tr>\n<tr><td>100K</td><td>简写形式（非正式）</td></tr>\n</table>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The city has a population of over a hundred thousand people. / 这座城市的人口超过十万。</li>\n<li>Hundreds of thousands of people attended the protest. / 数十万人参加了抗议活动。</li>\n<li>The company&#x27;s revenue increased by a hundred thousand dollars last year. / 该公司去年收入增加了十万美元。</li>\n<li>The rare book is worth several hundred thousand pounds. / 这本稀有书籍价值数十万英镑。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> &quot;Hundred thousand&quot;在Task 1数据描写、Task 2论证（涉及统计数据）和阅读中高频出现。在描述人口、金额、数量等数据时需要掌握正确的表达。注意 &quot;a/one hundred thousand&quot; 用单数，而 &quot;hundreds of thousands&quot;表示约数用复数。在学术写作中准确表达数字能增强论证的可信度。</blockquote>", "brilliant": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> </p>\n<ul>\n<li>(描写亮度) 耀眼的、闪闪发光的、明亮的</li>\n<li>(描写才能) 杰出的、出色的、聪慧的、才华横溢的</li>\n<li>(描写表现) 出众的、精彩的、卓越的</li>\n</ul>\n<p><strong>语域：</strong> 正式 / 书面；学术、评价、新闻语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Brilliant是多义形容词，最常见的是表示&quot;杰出的、出色的&quot;，用来赞扬某人的才能、思想或表现。其次是表示&quot;光线明亮的、耀眼的&quot;。在学术写作和口语评价中广泛使用。词源自拉丁文brillare（闪闪发光）。</p>\n<table>\n<tr><th>用法</th><th>搭配</th><th>含义</th></tr>\n<tr><td>才能/思想</td><td>brilliant idea</td><td>杰出的主意</td></tr>\n<tr><td>才能/思想</td><td>brilliant student</td><td>聪慧的学生</td></tr>\n<tr><td>才能/思想</td><td>brilliant performance</td><td>精彩的表演</td></tr>\n<tr><td>亮度</td><td>brilliant light</td><td>耀眼的光</td></tr>\n<tr><td>亮度</td><td>brilliant color</td><td>鲜艳的颜色</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>brilliant</strong>：&quot;杰出的、出色的&quot;，强调才智或表现的卓越</li>\n<li><strong>excellent</strong>：&quot;优秀的、杰出的&quot;，更客观、正式的评价</li>\n<li><strong>outstanding</strong>：&quot;杰出的、突出的&quot;，强调超越一般标准</li>\n<li><strong>intelligent</strong>：&quot;聪慧的、智慧的&quot;，强调智力本身</li>\n<li><strong>bright</strong>：&quot;聪慧的、明亮的&quot;，较为日常，范围更广</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>She is a brilliant mathematician with innovative ideas. / 她是一位才华横溢的数学家，思想创新。</li>\n<li>The research team came up with a brilliant solution to the problem. / 研究团队想到了一个杰出的解决方案。</li>\n<li>The sunset painted the sky in brilliant shades of orange and red. / 夕阳把天空染成了耀眼的橙色和红色。</li>\n<li>His brilliant performance in the exam impressed all the teachers. / 他在考试中的出色表现给所有教师留下了深刻印象。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Brilliant在Task 2论证和口语Part 3评价中高频出现。用来描写创意、表现或观点时，比excellent、good更生动、更有说服力。在学术写作中，使用brilliant能准确表达&quot;杰出的&quot;含义并增强表达的学术性。与intelligent对比，brilliant强调表现或成就的卓越性，而不仅仅是智力。掌握该词能提升评价和论证的表达质量。</blockquote>", "rob": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 抢劫、盗取、剥夺</p>\n<p><strong>语域：</strong> 正式 / 书面；法律、新闻、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Rob是及物动词，主要有两个用法：第一，指通过暴力或威胁从某人身上盗取金钱或财物，通常用&quot;rob sb. of sth.&quot;的形式；第二，引申含义指&quot;夺取、剥夺&quot;某人拥有的权利或机会。注意与steal（偷）的区别：rob强调有人的参与和暴力/威胁，steal强调取走东西本身。词源自古法语rober（掠夺）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>rob sb. of sth.</td><td>从某人那里抢夺...</td></tr>\n<tr><td>rob a bank</td><td>抢劫银行</td></tr>\n<tr><td>be robbed of</td><td>被夺去...</td></tr>\n<tr><td>rob sb. of the opportunity</td><td>夺去某人的机会</td></tr>\n<tr><td>armed robbery</td><td>武装抢劫</td></tr>\n<tr><td>robbery victim</td><td>抢劫受害者</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>rob</strong>：&quot;抢劫、盗取&quot;，强调有人参与、通常伴随暴力或威胁</li>\n<li><strong>steal</strong>：&quot;偷窃、盗取&quot;，强调秘密取走东西，不一定涉及人</li>\n<li><strong>burgle</strong>：&quot;入室盗窃&quot;，强调非法进入建筑物盗取</li>\n<li><strong>mug</strong>：&quot;抢劫（行人）&quot;，强调在街道上用暴力抢劫</li>\n<li><strong>loot</strong>：&quot;掠夺、抢掠&quot;，强调大规模的掠夺或混乱中的抢劫</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The gang robbed a convenience store last night. / 这帮人昨晚抢劫了一家便利店。</li>\n<li>She was robbed of her purse while walking in the park. / 她在公园里散步时被人抢走了钱包。</li>\n<li>The new policy robbed young people of job opportunities. / 新政策夺去了年轻人的就业机会。</li>\n<li>Three armed robbers were arrested near the bank. / 三名武装抢劫犯在银行附近被逮捕。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Rob在讨论犯罪、社会问题或权利问题时出现。&quot;rob sb. of sth.&quot;是最常用的搭配，能准确表达&quot;从某人身上夺取...&quot;的含义。在Task 2论证中，当讨论权利被剥夺（如&quot;rob people of freedom&quot;）时，使用rob能增强表达的学术性和说服力。与steal对比，rob强调暴力和有人参与，应根据具体语境选择。</blockquote>", "fraud": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 欺诈、诈骗、骗局、骗子</p>\n<p><strong>语域：</strong> 正式 / 书面；法律、新闻、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Fraud是可数和不可数名词，主要指<strong>有计划、有目的的欺骗行为，目的是非法获取金钱或其他利益</strong>。强调故意性和欺骗的系统性。常用于法律、商业和新闻语境中。与cheat相比，fraud更加正式、法律性更强，通常涉及更大规模的欺骗和经济损失。词源自拉丁文fraus（欺骗、欺诈）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>financial fraud</td><td>金融欺诈</td></tr>\n<tr><td>identity fraud</td><td>身份欺诈</td></tr>\n<tr><td>commit fraud</td><td>实施欺诈</td></tr>\n<tr><td>tax fraud</td><td>税务欺诈</td></tr>\n<tr><td>fraud victim</td><td>欺诈受害者</td></tr>\n<tr><td>fraud charge</td><td>欺诈指控</td></tr>\n<tr><td>fraudulent</td><td>欺诈的、虚假的（形容词）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>fraud</strong>：&quot;欺诈、诈骗&quot;，强调有计划、法律性强的大规模欺骗</li>\n<li><strong>cheat</strong>：&quot;作弊、欺骗&quot;，较口语化，范围更广</li>\n<li><strong>scam</strong>：&quot;诈骗、骗局&quot;，强调骗局设计，通常针对受害者</li>\n<li><strong>deceive</strong>：&quot;欺骗、蒙骗&quot;，强调给人虚假信息，范围广</li>\n<li><strong>swindle</strong>：&quot;诈骗、骗取&quot;，强调通过欺骗骗取金钱</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The investigation revealed massive <strong>fraud</strong> in the company&#x27;s accounting practices. / 调查发现该公司的会计行为存在大规模欺诈。</li>\n<li>Victims of <strong>identity fraud</strong> should report the crime immediately. / 身份欺诈的受害者应立即报警。</li>\n<li>The CEO was charged with <strong>fraud</strong> and money laundering. / 首席执行官被指控欺诈和洗钱。</li>\n<li>Banks implement strict measures to prevent <strong>financial fraud</strong>. / 银行采取严格措施防止金融欺诈。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Fraud在讨论犯罪、商业道德、法律制度等话题时高频出现。&quot;financial fraud&quot;、&quot;identity fraud&quot;、&quot;commit fraud&quot;等搭配是常见表达。在Task 2论证中，当讨论欺诈问题或商业伦理时，使用fraud能准确表达更有组织的、更严重的欺骗行为。与cheat对比，fraud更加正式、法律性更强，适合学术和正式写作。</blockquote>", "council": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> </p>\n<ul>\n<li>(组织机构) 委员会、理事会、议会</li>\n<li>(地方政府) 地方议会、市议会、乡镇理事会</li>\n</ul>\n<p><strong>语域：</strong> 正式 / 书面；政治、行政、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Council是可数名词，指<strong>由选定或任命的成员组成的正式决策机构或组织</strong>。主要用于政治、行政、学术等正式语境。与 counsel（律师、建议）的拼写相似但含义完全不同。常见搭配包括 local council（地方议会）、city council（市议会）、student council（学生会）等。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>local council</td><td>地方议会</td></tr>\n<tr><td>city council</td><td>市议会</td></tr>\n<tr><td>student council</td><td>学生会</td></tr>\n<tr><td>council member</td><td>议员</td></tr>\n<tr><td>town council</td><td>镇议会</td></tr>\n<tr><td>council meeting</td><td>理事会会议</td></tr>\n<tr><td>council chamber</td><td>议会厅</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>council</strong>：&quot;委员会、议会&quot;，强调正式决策机构</li>\n<li><strong>committee</strong>：&quot;委员会&quot;，指特定目的的小型工作小组</li>\n<li><strong>board</strong>：&quot;董事会、理事会&quot;，多用于企业和组织</li>\n<li><strong>assembly</strong>：&quot;议会、大会&quot;，强调大型正式集会</li>\n<li><strong>parliament</strong>：&quot;议会、国会&quot;，特指国家级立法机构</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The local council has approved the new housing project. / 地方议会批准了新的住房项目。</li>\n<li>She was elected as a member of the city council. / 她当选为市议会成员。</li>\n<li>The student council organized a charity event last month. / 学生会上个月组织了一场慈善活动。</li>\n<li>The council meeting will be held next Tuesday at the town hall. / 理事会会议将于下周二在市政厅举行。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Council在讨论政治制度、地方治理、社区组织等话题时常见。掌握&quot;local council&quot;、&quot;city council&quot;、&quot;student council&quot;等常见搭配对Task 1书信和Task 2论证很有帮助。在口语Part 3讨论社区、政府或组织时，council是高频表达。注意区分council（委员会）和counsel（律师、建议），避免拼写错误。</blockquote>\n<p>*最后更新：2026-04-08*</p>"};

let filtered = [...ALL_CARDS];
let idx = 0;
let listMode = false;

const $ = s => document.querySelector(s);

function render() {
  if (!filtered.length) {
    $('#frontWord').textContent = '没有匹配的单词';
    $('#backWord').textContent = '';
    $('#backBody').innerHTML = '';
    $('#progress').textContent = '0 / 0';
    return;
  }
  const c = filtered[idx];
  $('#frontWord').textContent = c.word;
  $('#backWord').textContent = c.word;
  $('#backBody').innerHTML = BODY_PRE[c.word] || '';
  $('#progress').textContent = `${idx + 1} / ${filtered.length}`;
  $('#card').classList.remove('flipped');
}

function go(delta) {
  if (!filtered.length) return;
  idx = (idx + delta + filtered.length) % filtered.length;
  render();
}

// 翻转
$('#cardWrapper').addEventListener('click', e => {
  // 如果点击背面的可滚动区域内的链接等，不翻转
  if (e.target.closest('.card-back') && e.target !== $('#card') && e.target.closest('a')) return;
  $('#card').classList.toggle('flipped');
});

// 背面滚动时阻止翻转
let scrolling = false;
const backFace = document.querySelector('.card-back');
backFace.addEventListener('scroll', () => { scrolling = true; });
backFace.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });

// 导航
$('#prevBtn').addEventListener('click', () => go(-1));
$('#nextBtn').addEventListener('click', () => go(1));

// 键盘
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') go(-1);
  else if (e.key === 'ArrowRight') go(1);
  else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    $('#card').classList.toggle('flipped');
  }
});

// 触摸滑动
let tx = 0;
$('#cardArea').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
$('#cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
});

// 搜索
$('#search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  filtered = q ? ALL_CARDS.filter(c => c.word.toLowerCase().includes(q) || c.body.toLowerCase().includes(q)) : [...ALL_CARDS];
  idx = 0;
  render();
  if (listMode) renderList();
  $('#total').textContent = `共 ${filtered.length} 词`;
});

// 随机
$('#btnShuffle').addEventListener('click', () => {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0;
  render();
  if (listMode) renderList();
});

// 列表模式
function renderList() {
  const area = $('#listArea');
  area.innerHTML = filtered.map((c, i) => `
    <div class="list-item" data-i="${i}">
      <div class="list-item-header">
        <span class="word">${esc(c.word)}</span>
        <span class="arrow">&#9654;</span>
      </div>
      <div class="list-item-body">${BODY_PRE[c.word] || ''}</div>
    </div>
  `).join('');
  area.querySelectorAll('.list-item-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

$('#btnList').addEventListener('click', () => {
  listMode = !listMode;
  $('#btnList').classList.toggle('active', listMode);
  $('#cardArea').classList.toggle('hidden', listMode);
  $('#navBar').classList.toggle('hidden', listMode);
  $('#listArea').classList.toggle('active', listMode);
  if (listMode) renderList();
});

// 初始化
$('#total').textContent = `共 ${ALL_CARDS.length} 词`;
render();
</script>
</body>
</html>

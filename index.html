--|\n| financial fraud | 金融欺诈 |\n| identity fraud | 身份欺诈 |\n| commit fraud | 实施欺诈 |\n| tax fraud | 税务欺诈 |\n| fraud victim | 欺诈受害者 |\n| fraud charge | 欺诈指控 |\n| fraudulent | 欺诈的、虚假的（形容词） |\n\n**近义词辨析：**\n- **fraud**：\"欺诈、诈骗\"，强调有计划、法律性强的大规模欺骗\n- **cheat**：\"作弊、欺骗\"，较口语化，范围更广\n- **scam**：\"诈骗、骗局\"，强调骗局设计，通常针对受害者\n- **deceive**：\"欺骗、蒙骗\"，强调给人虚假信息，范围广\n- **swindle**：\"诈骗、骗取\"，强调通过欺骗骗取金钱\n\n**例句：**\n- The investigation revealed massive **fraud** in the company's accounting practices. / 调查发现该公司的会计行为存在大规模欺诈。\n- Victims of **identity fraud** should report the crime immediately. / 身份欺诈的受害者应立即报警。\n- The CEO was charged with **fraud** and money laundering. / 首席执行官被指控欺诈和洗钱。\n- Banks implement strict measures to prevent **financial fraud**. / 银行采取严格措施防止金融欺诈。\n\n> **雅思备考提示：** Fraud在讨论犯罪、商业道德、法律制度等话题时高频出现。\"financial fraud\"、\"identity fraud\"、\"commit fraud\"等搭配是常见表达。在Task 2论证中，当讨论欺诈问题或商业伦理时，使用fraud能准确表达更有组织的、更严重的欺骗行为。与cheat对比，fraud更加正式、法律性更强，适合学术和正式写作。"}, {"word": "council", "body": "**词性：** 名词\n\n**含义：** \n- (组织机构) 委员会、理事会、议会\n- (地方政府) 地方议会、市议会、乡镇理事会\n\n**语域：** 正式 / 书面；政治、行政、学术语境常见\n\n**用法说明：**\n\nCouncil是可数名词，指**由选定或任命的成员组成的正式决策机构或组织**。主要用于政治、行政、学术等正式语境。与 counsel（律师、建议）的拼写相似但含义完全不同。常见搭配包括 local council（地方议会）、city council（市议会）、student council（学生会）等。\n\n| 搭配 | 含义 |\n|------|------|\n| local council | 地方议会 |\n| city council | 市议会 |\n| student council | 学生会 |\n| council member | 议员 |\n| town council | 镇议会 |\n| council meeting | 理事会会议 |\n| council chamber | 议会厅 |\n\n**近义词辨析：**\n- **council**：\"委员会、议会\"，强调正式决策机构\n- **committee**：\"委员会\"，指特定目的的小型工作小组\n- **board**：\"董事会、理事会\"，多用于企业和组织\n- **assembly**：\"议会、大会\"，强调大型正式集会\n- **parliament**：\"议会、国会\"，特指国家级立法机构\n\n**例句：**\n- The local council has approved the new housing project. / 地方议会批准了新的住房项目。\n- She was elected as a member of the city council. / 她当选为市议会成员。\n- The student council organized a charity event last month. / 学生会上个月组织了一场慈善活动。\n- The council meeting will be held next Tuesday at the town hall. / 理事会会议将于下周二在市政厅举行。\n\n> **雅思备考提示：** Council在讨论政治制度、地方治理、社区组织等话题时常见。掌握\"local council\"、\"city council\"、\"student council\"等常见搭配对Task 1书信和Task 2论证很有帮助。在口语Part 3讨论社区、政府或组织时，council是高频表达。注意区分council（委员会）和counsel（律师、建议），避免拼写错误。\n\n*最后更新：2026-04-08*"}];

const BODY_PRE = {"premier": "<p><strong>词性：</strong> 形容词  </p>\n<p><strong>含义：</strong> 排名第一的、地位最高的  </p>\n<p><strong>语域：</strong> 正式、书面</p>\n<p><strong>vs. best 的区别：</strong></p>\n<table>\n<tr><th></th><th>premier</th><th>best</th></tr>\n<tr><td>语域</td><td>正式、书面</td><td>正式/口语均可</td></tr>\n<tr><td>含义侧重</td><td>地位/排名第一</td><td>质量/程度最好</td></tr>\n<tr><td>常见搭配</td><td>机构、职位、赛事</td><td>几乎任何名词</td></tr>\n<tr><td>IELTS写作</td><td>加分词汇</td><td>过于基础</td></tr>\n</table>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Singapore&#x27;s <strong>premier</strong> medical institution（书面，强调地位）</li>\n<li>Singapore&#x27;s <strong>best</strong> hospital（口语，主观评价）</li>\n<li>the <strong>Premier</strong> League</li>\n</ul>\n<blockquote><strong>备考提示：</strong> 写作中描述机构、城市、国家地位时，用 premier 替换 best/top，更有书面感。</blockquote>", "would like (to do)": "<p><strong>结构：</strong> would like sb. to do sth.  </p>\n<p><strong>含义：</strong> 希望某人做某事（礼貌表达，≠ will like）</p>\n<p><strong>语气对比：</strong></p>\n<ul>\n<li>I <strong>want</strong> to go → 直接，略显粗鲁</li>\n<li>I <strong>would like</strong> to go → 礼貌、正式</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>They <strong>would like</strong> the college administration to exert more control...</li>\n</ul>\n<p>  （他们希望学校行政部门加强管控）</p>\n<ul>\n<li>She <strong>would like</strong> you to call her.</li>\n<li>They <strong>would like</strong> him to resign.</li>\n</ul>\n<blockquote><strong>注意：</strong> would like 是固定短语，与 will 的过去式无关，表示当下的委婉愿望。</blockquote>", "have/has come to do": "<p><strong>结构：</strong> have/has come to + 动词原形  </p>\n<p><strong>含义：</strong> 渐渐地……、慢慢演变成……（强调过程的积累性）</p>\n<p><strong>与普通完成时的区别：</strong></p>\n<ul>\n<li>Humans <strong>have dominated</strong> the planet. → 强调结果</li>\n<li>Humans <strong>have come to dominate</strong> the planet. → 强调逐渐演变的过程</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>I <strong>have come to</strong> realize that I was wrong.（渐渐意识到）</li>\n<li>She <strong>has come to</strong> accept the situation.（慢慢接受）</li>\n<li>We <strong>have come to</strong> depend on smartphones.（越来越依赖）</li>\n</ul>\n<blockquote><strong>规律：</strong> 后接认知/感受/状态类动词：realize, understand, believe, accept, dominate, depend on 等。</blockquote>", "out of my league": "<p><strong>词性：</strong> 习语  </p>\n<p><strong>含义：</strong> 我配不上（你）/ 不在同一档次 / 超出我的能力范围</p>\n<p><strong>来源：</strong> 体育概念——不同水平的队伍分在不同 league（联赛），引申为档次/水平差距。</p>\n<p><strong>例句：</strong></p>\n<ul>\n<li>She&#x27;s <strong>out of my league</strong>.（她我配不上）</li>\n<li>That job is <strong>out of my league</strong>.（那份工作我还不够格）</li>\n<li>This project is <strong>out of my league</strong>.（这个项目超出我能力范围）</li>\n</ul>\n<p><strong>相关表达：</strong></p>\n<ul>\n<li>in the same league = 同一水平，势均力敌</li>\n<li>major league / minor league = 大联盟/小联盟，引申为大人物/小角色</li>\n</ul>", "puppet": "<p><strong>词性：</strong> 名词（可作定语）</p>\n<p><strong>含义：</strong> ①木偶，玩偶；②傀儡（受人操控的人或政权）</p>\n<p><strong>语域：</strong> 中性；比喻义多见于正式书面语（政治、新闻语境）</p>\n<p><strong>用法说明：</strong></p>\n<p>&quot;puppet&quot; 的核心隐喻是&quot;被操控者&quot;。字面义指手偶或木偶；引申义指缺乏自主权、受幕后势力摆布的人、政府或组织。常见搭配：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>puppet government / regime</td><td>傀儡政府/政权</td></tr>\n<tr><td>puppet state</td><td>傀儡国家</td></tr>\n<tr><td>puppet leader</td><td>受人摆布的领导人</td></tr>\n<tr><td>mere puppet</td><td>纯粹的傀儡（强调毫无自主权）</td></tr>\n<tr><td>pull the strings of a puppet</td><td>在幕后操控傀儡</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>puppet</strong>：强调被外部力量控制，多用于政治语境</li>\n<li><strong>pawn</strong>：国际象棋中的&quot;兵&quot;，强调被牺牲或利用</li>\n<li><strong>figurehead</strong>：有名无实的领袖，不一定受外部控制</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The installed government was widely condemned as a <strong>puppet regime</strong> controlled by foreign powers.（这届政府被广泛谴责为受外国势力操控的傀儡政权。）</li>\n<li>He may hold the title of CEO, but he is little more than a <strong>puppet</strong>—all major decisions are made by the board.（他虽顶着CEO头衔，但不过是个傀儡，所有重大决策均由董事会拍板。）</li>\n<li>Children&#x27;s <strong>puppet</strong> shows have long been used as a tool for moral education.（儿童木偶剧长期被用作道德教育的工具。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> 在 Task 2 政治、国际关系或权力类议题中，用 <strong>puppet government/regime</strong> 替换&quot;controlled government&quot;可显著提升词汇分；口语 Part 3 讨论领导力或权力时，&quot;a mere puppet&quot;也是亮眼表达。</blockquote>", "I am having trouble getting ... vs I have been having trouble getting": "<p><strong>词性：</strong> 句型对比（动词时态结构）</p>\n<p><strong>含义：</strong> 两者都表示&quot;在做某事时遇到困难&quot;，前者强调&quot;此刻正遇到困难&quot;，后者强调&quot;一段时间以来持续遇到困难&quot;</p>\n<p><strong>语域：</strong> 中性，口语、书面均可</p>\n<p><strong>用法说明：</strong></p>\n<table>\n<tr><th>结构</th><th>时态</th><th>强调重点</th><th>潜台词</th></tr>\n<tr><td>I <strong>am</strong> having trouble getting...</td><td>现在进行时</td><td>此刻正在发生</td><td>当下的困境，刚遇到</td></tr>\n<tr><td>I <strong>have been</strong> having trouble getting...</td><td>现在完成进行时</td><td>从过去持续到现在</td><td>已经困扰我一段时间了</td></tr>\n</table>\n<p><strong>have been having</strong> 暗含&quot;不是刚开始，已经这样一段时间了&quot;，比 <strong>am having</strong> 更有纵深感。</p>\n<p><strong>例句：</strong></p>\n<ul>\n<li>I <strong>am having trouble getting</strong> this file to open—can you help me right now?（我现在打不开这个文件，你能帮我看看吗？——此刻的困难）</li>\n<li>I <strong>have been having trouble getting</strong> enough sleep lately.（我最近一段时间都睡不好。——持续了一段时间）</li>\n<li>She <strong>has been having trouble getting</strong> her visa approved for weeks.（她申请签证好几周了一直卡着。——强调持续时长）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> 口语 Part 2/3 描述个人经历时，用 <strong>have been having trouble doing</strong> 比 <strong>am having trouble</strong> 更有深度，体现对时态的精准掌控——这正是 Band 7+ 考官关注的语法多样性指标。写作中描述社会问题持续性时也可套用此结构，如 &quot;Many students have been having trouble getting access to quality education.&quot;</blockquote>", "as well as": "<p><strong>词性：</strong> 连接短语 / 介词短语</p>\n<p><strong>含义：</strong> ①和...一样好（比较）；②除了...还有、既...又...（列举）</p>\n<p><strong>语域：</strong> 正式、书面，中性</p>\n<p><strong>用法说明：</strong></p>\n<p>虽然形式相似，但两个含义用法差异很大：</p>\n<table>\n<tr><th>用法</th><th>含义</th><th>句子结构</th><th>单复数规则</th></tr>\n<tr><td>比较型</td><td>和...一样好</td><td>A + <strong>as well as</strong> + B（两者平行）</td><td>通常单数</td></tr>\n<tr><td>列举型（更常见）</td><td>除了...还有、既...又...</td><td>A, <strong>as well as</strong> B（B 是补充信息）</td><td>谓语跟 A 的数</td></tr>\n</table>\n<p><strong>列举型关键点：as well as 后的内容不影响前面主语的单复数</strong>：</p>\n<ul>\n<li>&quot;The teacher, <strong>as well as</strong> the students, <strong>was</strong> happy.&quot;（主语是 teacher，用 was，不是 were）</li>\n<li>对比：&quot;The teacher <strong>and</strong> the students <strong>were</strong> happy.&quot;（and 则两个都算主语）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>She plays tennis <strong>as well as</strong> her brother.（她网球和她哥哥打得一样好。——比较型）</li>\n<li>The university offers scholarships <strong>as well as</strong> loans.（这所大学既提供奖学金，也提供贷款。——列举型）</li>\n<li>China, <strong>as well as</strong> India, <strong>is</strong> experiencing rapid economic growth.（中国和印度一样，都在经历快速的经济增长。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 写作中，用 <strong>as well as</strong> 列举因素/观点比 and 更显正式感，特别是在&quot;列举多个事物&quot;的段落中频繁使用——这正是 Band 7+ 的语法复杂度体现。口语 Part 3 讨论时也能加分：&quot;Education <strong>as well as</strong> healthcare plays a crucial role...&quot; 关键记住：<strong>as well as 后的信息不改变前面主语的动词数</strong>，这是常见错误点。</blockquote>", "fence": "<p><strong>词性：</strong> 名词（可作动词）  </p>\n<p><strong>含义：</strong> ①栅栏、围栏；②（动词）用栅栏围住</p>\n<p><strong>语域：</strong> 中性，口语、书面均可</p>\n<p><strong>用法说明：</strong></p>\n<p>fence 的基础义是&quot;围墙或栏杆&quot;，可指学校、监狱、住宅周围的围栏结构。作动词时意为&quot;用围栏围住&quot;。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>prison fence / jail fence</td><td>监狱栅栏</td></tr>\n<tr><td>school fence</td><td>学校围栏</td></tr>\n<tr><td>wooden fence / metal fence</td><td>木制/金属围栏</td></tr>\n<tr><td>barbed wire fence</td><td>铁丝网围栏</td></tr>\n<tr><td>fence in / fence off</td><td>用围栏围住 / 隔离</td></tr>\n<tr><td>sit on the fence</td><td>骑墙（中立、不表态）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>fence</strong>：通用概念，各种栏杆都可以用</li>\n<li><strong>barrier</strong>：强调&quot;阻挡&quot;功能，较为抽象</li>\n<li><strong>wall</strong>：通常指砖石等实心结构</li>\n<li><strong>railing / rail</strong>：扶手、栏杆，多见于楼梯或阳台</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>prison fence</strong> was topped with barbed wire.（监狱栅栏顶部缠着铁丝网。）</li>\n<li>Children played near the <strong>school fence</strong> during recess.（孩子们在课间休息时在学校围栏附近玩耍。）</li>\n<li>They <strong>fenced in</strong> the garden to protect it from wild animals.（他们用栅栏围住花园以防野生动物。）</li>\n<li>Some countries <strong>fence off</strong> disputed territories with military barriers.（一些国家用军事屏障隔离争议领土。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 1 地理描述中描写场景时（如公园、校园平面图），用 fence 比 barrier 更具体、更自然。口语 Part 2 描述地点或人物特征时也能用上，如&quot;a house surrounded by a wooden fence&quot;。短语 <strong>sit on the fence</strong> 在 Task 2 讨论立场时可当习语使用。</blockquote>", "barren": "<p><strong>词性：</strong> 形容词  </p>\n<p><strong>含义：</strong> ①（土地）贫瘠的、荒芜的、不毛的；②（人/动物）不能生育的、无生育能力的；③（生活）单调的、乏味的</p>\n<p><strong>语域：</strong> 正式、书面、中性</p>\n<p><strong>用法说明：</strong></p>\n<p>barren 的核心含义是&quot;缺乏生产力或创造力&quot;。作地理/环境用语时，强调土壤贫瘠、不能生长植物；作生物学用语时，指无法生育；引申义可指生活枯燥乏味。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>barren land / soil</td><td>贫瘠的土地/土壤</td></tr>\n<tr><td>barren desert</td><td>荒漠</td></tr>\n<tr><td>barren woman / animal</td><td>不能生育的女性/动物</td></tr>\n<tr><td>barren landscape</td><td>光秃秃的景观</td></tr>\n<tr><td>barren of...</td><td>缺乏...</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>barren</strong>：强调生产力缺乏（土地不毛、无生育能力），相对技术性、中性</li>\n<li><strong>desolate</strong>：强调荒凉感和孤独感（废墟、冷清），感情色彩更悲凉</li>\n<li><strong>arid</strong>：强调干旱（气候缺水），较为专业</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>barren</strong> desert stretches endlessly under the scorching sun.（贫瘠的沙漠在烈日骄阳下无限延伸。）</li>\n<li>The couple longed for a child after years of <strong>barren</strong> marriage.（这对夫妻多年无法生育，渴望拥有孩子。）</li>\n<li>The region&#x27;s economy is <strong>barren</strong> of new opportunities.（该地区经济缺乏新的机遇。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 1 地理描述中用 <strong>barren land</strong> 比 &quot;empty land&quot; 更学术；Task 2 环境议题中可用 &quot;barren soil/fields&quot; 替换 &quot;bad soil&quot;。口语 Part 1/2 描述不适宜居住的地方时也适用。</blockquote>", "desolate": "<p><strong>词性：</strong> 形容词（可作动词，较少）  </p>\n<p><strong>含义：</strong> ①（地方）荒凉的、冷清的、人迹罕至的；②（感受）凄凉的、孤独的</p>\n<p><strong>语域：</strong> 正式、书面、带有悲凉的感情色彩</p>\n<p><strong>用法说明：</strong></p>\n<p>desolate 既描写外在的&quot;荒凉景象&quot;，也传达内在的&quot;孤独感受&quot;。与 barren 不同，desolate 更强调地点的&quot;废弃感&quot;和&quot;冷清感&quot;，常见于描写城镇废墟、荒废建筑等场景。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>desolate landscape / place</td><td>荒凉的景观/地方</td></tr>\n<tr><td>desolate ruins</td><td>凄凉的废墟</td></tr>\n<tr><td>desolate town / street</td><td>冷清的城镇/街道</td></tr>\n<tr><td>feel desolate</td><td>感到孤独/凄凉</td></tr>\n<tr><td>desolate mood / feeling</td><td>凄凉的心情/感受</td></tr>\n</table>\n<p><strong>与 barren 的对比：</strong></p>\n<ul>\n<li><strong>barren</strong>：强调&quot;无生产力&quot;（土地不生长、不能生育）——更客观、技术性</li>\n<li><strong>desolate</strong>：强调&quot;被遗弃感&quot;和&quot;孤独感&quot;——更文学性、感伤性</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>desolate</strong> ruins of the ancient city echoed with silence.（古城凄凉的废墟回荡着沉寂。）</li>\n<li>After the war, many towns lay <strong>desolate</strong> and abandoned.（战争过后，许多城镇被遗弃，荒凉一片。）</li>\n<li>She felt <strong>desolate</strong> sitting alone in the empty house.（她独自坐在空荡荡的房子里，感到凄凉。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 1 描写衰退的城镇或荒废场景时，用 <strong>desolate</strong> 比 &quot;empty&quot; 更生动；Task 2 社会议题中，&quot;desolate communities&quot; 能强调地区被边缘化的现象。口语 Part 3 讨论城市发展或环境问题时也是出彩表达。</blockquote>", "mutation": "<p><strong>词性：</strong> 名词  </p>\n<p><strong>含义：</strong> ①（生物学）突变、基因突变；②（广义）变化、改变、蜕变</p>\n<p><strong>语域：</strong> 正式、书面、中性；科技/学术环境中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>mutation 在学术语境中主要用于生物学/遗传学，指 DNA 序列的变化导致生物性状改变。在更广泛的用法中，可指任何形式的重大变化。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>genetic mutation</td><td>遗传突变</td></tr>\n<tr><td>viral mutation</td><td>病毒突变</td></tr>\n<tr><td>mutation rate</td><td>突变率</td></tr>\n<tr><td>undergo mutation</td><td>发生突变</td></tr>\n<tr><td>social / cultural mutation</td><td>社会/文化变迁</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>mutation</strong>：强调遗传/生物学层面的突然改变，或重大的蜕变</li>\n<li><strong>change / alteration</strong>：通用词，指任何形式的改变</li>\n<li><strong>evolution</strong>：强调渐进式、长期的演化过程</li>\n<li><strong>transformation</strong>：强调彻底的、根本的改变</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Scientists discovered a <strong>mutation</strong> in the COVID-19 virus that made it more transmissible.（科学家们发现COVID-19病毒的一种<strong>突变</strong>使其传染性更强。）</li>\n<li>The <strong>mutations</strong> in the DNA sequence led to the development of the disease.（DNA序列中的<strong>突变</strong>导致了疾病的发展。）</li>\n<li>The rapid technological advances have caused a <strong>mutation</strong> in human work patterns.（快速的技术进步引发了人类工作模式的重大<strong>变化</strong>。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 讨论科技/医学/社会变化议题时，用 <strong>mutation</strong> 比 &quot;change&quot; 更显学术性和专业度。特别是在生物医学背景的写作中（如疫病传播、遗传研究），这是必备表达。口语 Part 3 讨论环境演化或物种适应时也能体现词汇广度。</blockquote>", "thermal": "<p><strong>词性：</strong> 形容词  </p>\n<p><strong>含义：</strong> ①与热量/温度有关的；②由热引起的</p>\n<p><strong>语域：</strong> 正式、书面、中性；科技/学术环境中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>thermal 是科技/环境类词汇，主要用于描述与热、温度、热能相关的事物或现象。常见于环保、物理、气象等领域。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>thermal energy / power</td><td>热能 / 火力发电</td></tr>\n<tr><td>thermal pollution</td><td>热污染</td></tr>\n<tr><td>thermal insulation</td><td>隔热 / 保温</td></tr>\n<tr><td>thermal imaging / camera</td><td>热成像 / 热像仪</td></tr>\n<tr><td>geothermal energy</td><td>地热能</td></tr>\n<tr><td>thermal conductivity</td><td>导热率</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>thermal</strong>：强调与热有关的性质或能量，较为学术、正式</li>\n<li><strong>hot</strong>：日常用词，指温度高</li>\n<li><strong>heat</strong>：名词或动词，指热或加热的过程</li>\n<li><strong>temperature</strong>：强调温度数值本身</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li><strong>Thermal</strong> power plants are major sources of air pollution.（<strong>火力</strong>发电厂是空气污染的主要来源。）</li>\n<li>The building uses <strong>thermal</strong> insulation to reduce energy consumption.（该建筑采用<strong>保温</strong>材料以降低能源消耗。）</li>\n<li><strong>Geothermal</strong> energy is a renewable and clean power source.（<strong>地热能</strong>是一种可再生的清洁能源。）</li>\n<li><strong>Thermal</strong> imaging technology helps detect heat loss in buildings.（<strong>热成像</strong>技术帮助检测建筑物的热损失。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 讨论环境/能源议题时，用 <strong>thermal energy</strong> 或 <strong>thermal pollution</strong> 等搭配能显著提升学术感；Task 1 若涉及建筑或能源流程图，&quot;thermal insulation&quot; 和 &quot;thermal efficiency&quot; 是关键表达。口语 Part 3 讨论可持续能源或气候变化时也是加分词汇。</blockquote>", "pollen": "<p><strong>词性：</strong> 名词（通常不可数）  </p>\n<p><strong>含义：</strong> 花粉（花或树上的细粉状物质，含有雄性生殖细胞）</p>\n<p><strong>语域：</strong> 正式、书面、中性；生物学/环保话题中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>pollen 是植物生殖的关键，指花或树木释放的微小粉状物质。常见于生物学、环保、过敏症等语境。重要的是 pollen 通常作不可数名词使用。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>pollen grain</td><td>花粉粒</td></tr>\n<tr><td>pollen count</td><td>花粉数量（空气中的）</td></tr>\n<tr><td>bee-pollinated / wind-pollinated</td><td>蜜蜂传播 / 风力传播的</td></tr>\n<tr><td>pollen allergy / hay fever</td><td>花粉过敏 / 花粉症</td></tr>\n<tr><td>pollination</td><td>传粉（动词形式：pollinate）</td></tr>\n<tr><td>tree pollen / flower pollen</td><td>树花粉 / 花卉花粉</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>pollen</strong>：植物的生殖性微粒，强调生物学意义</li>\n<li><strong>dust</strong>：灰尘，范围更广</li>\n<li><strong>spore</strong>：孢子，真菌/蕨类繁殖体</li>\n<li><strong>seed</strong>：种子，已成熟的生殖体</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>High <strong>pollen</strong> counts in spring trigger allergies in many people.（春天<strong>花粉</strong>数量高会引发许多人的过敏。）</li>\n<li>Bees collect <strong>pollen</strong> from flowers and transfer it to other plants.（蜜蜂从花朵采集<strong>花粉</strong>，并将其传递到其他植物。）</li>\n<li><strong>Pollen</strong> is dispersed by wind or insects to ensure plant reproduction.（<strong>花粉</strong>通过风或昆虫传播以确保植物繁殖。）</li>\n<li>Many people suffer from <strong>pollen</strong> allergies during the spring season.（许多人在春季遭受<strong>花粉</strong>过敏。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 1 描写植物生长或生态系统时，用 <strong>pollen</strong> 和 <strong>pollination</strong> 比通用词更学术；Task 2 讨论环保或气候议题时，&quot;pollen levels&quot; 和 &quot;wind-pollinated plants&quot; 能体现科学素养。口语 Part 1/2 若涉及季节、植物或过敏话题，这是自然的表达。</blockquote>", "meadow": "<p><strong>词性：</strong> 名词  </p>\n<p><strong>含义：</strong> （开放的）草地、草甸、牧场</p>\n<p><strong>语域：</strong> 正式、书面、中性；描写自然景观时常见</p>\n<p><strong>用法说明：</strong></p>\n<p>meadow 是具有文学气质的词，指由草覆盖的开放地带，通常有野花、很少有树木。与简单的 &quot;grass field&quot; 不同，meadow 带有更诗意、自然的意象，常见于环保、乡村描写等语境。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>wild meadow</td><td>野生草甸</td></tr>\n<tr><td>alpine meadow</td><td>高山草甸</td></tr>\n<tr><td>wet meadow</td><td>湿地草甸</td></tr>\n<tr><td>flower meadow</td><td>花草地</td></tr>\n<tr><td>meadow grass</td><td>草地草</td></tr>\n<tr><td>across the meadow</td><td>穿过草地</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>meadow</strong>：开放草地，自然感、文学感强，多有野花</li>\n<li><strong>field</strong>：田地，可指农田或草地，范围广</li>\n<li><strong>grassland / prairie</strong> —— 大片草地、草原，面积通常更大</li>\n<li><strong>pasture</strong>：牧场，强调饲养动物的功能</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>meadow</strong> was full of colorful wildflowers in spring.（春天<strong>草地</strong>上开满了五彩缤纷的野花。）</li>\n<li>We walked through the peaceful <strong>meadow</strong> at sunset.（我们在日落时穿过宁静的<strong>草地</strong>。）</li>\n<li>The <strong>alpine meadows</strong> are home to rare plant species.（<strong>高山草甸</strong>是稀有植物物种的家园。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 1 描写自然景观或草地环境时，用 <strong>meadow</strong> 比 &quot;grass area&quot; 更生动、更正式；Task 2 讨论生态保护、土地利用或乡村发展时，&quot;meadow conservation&quot; 和 &quot;wildlife in meadows&quot; 能体现词汇多样性。口语 Part 2 描写自然风景的地方时，用 meadow 比 &quot;field&quot; 更形象。</blockquote>", "immense": "<p><strong>词性：</strong> 形容词  </p>\n<p><strong>含义：</strong> 巨大的、浩瀚的、广阔的；（强度）极大的</p>\n<p><strong>语域：</strong> 正式、书面、中性；可用于口语强调</p>\n<p><strong>用法说明：</strong></p>\n<p>immense 是描写&quot;极其巨大或广阔&quot;的常用词，强调规模、范围或程度的显著性。可用于物理描写（大小、空间），也可用于抽象描写（影响、重要性）。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>immense size / scale</td><td>巨大的规模</td></tr>\n<tr><td>immense ocean / sky</td><td>浩瀚的海洋/天空</td></tr>\n<tr><td>immense power / energy</td><td>巨大的力量</td></tr>\n<tr><td>immense pressure / stress</td><td>巨大的压力</td></tr>\n<tr><td>immense popularity</td><td>极大的受欢迎程度</td></tr>\n<tr><td>an immense amount of</td><td>巨大数量的</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>immense</strong>：强调大到令人印象深刻的程度，较文学性</li>\n<li><strong>huge / enormous</strong>：通用词，表示体积/规模大</li>\n<li><strong>vast</strong>：强调范围广阔（如陆地、空间）</li>\n<li><strong>massive</strong>：强调质量/物质的巨大，较为物理化</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>immense</strong> ocean stretched endlessly before us.（<strong>浩瀚的</strong>海洋在我们面前无限延伸。）</li>\n<li>Climate change has had an <strong>immense</strong> impact on the environment.（气候变化对环境产生了<strong>巨大的</strong>影响。）</li>\n<li>She felt <strong>immense</strong> gratitude for his help.（她对他的帮助感到<strong>极大的</strong>感谢。）</li>\n<li>The project required an <strong>immense</strong> amount of time and resources.（该项目需要<strong>大量的</strong>时间和资源。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 写作中，用 <strong>immense</strong> 替换 &quot;very big&quot; 或 &quot;very important&quot; 能显著提升表达格调；特别是在讨论影响、意义、数量时，&quot;immense value/benefit/concern&quot; 比 &quot;great&quot; 更学术。口语 Part 3 强调程度时也是自然的加分表达。</blockquote>", "noxious": "<p><strong>词性：</strong> 形容词  </p>\n<p><strong>含义：</strong> 有害的、有毒的、令人不快的  </p>\n<p><strong>语域：</strong> 正式、书面、中性；环保/化学/社会话题中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>noxious 是正式词汇，主要用于描述有害的物质、气体、影响或环境。强调&quot;有害于健康或环境&quot;的特性。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>noxious gases</td><td>有毒气体</td></tr>\n<tr><td>noxious fumes</td><td>有害气体/烟气</td></tr>\n<tr><td>noxious substances</td><td>有害物质</td></tr>\n<tr><td>noxious weed</td><td>有害杂草</td></tr>\n<tr><td>noxious influence</td><td>有害影响</td></tr>\n<tr><td>noxious emissions</td><td>有害排放</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>noxious</strong>：强调有害于健康或环境的特性，较为学术、正式</li>\n<li><strong>toxic</strong>：含毒的、有毒的，强调毒性本身</li>\n<li><strong>poisonous</strong>：有毒的，强调可导致中毒</li>\n<li><strong>harmful</strong>：有害的，范围更广，可指任何形式的伤害</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The factory emits <strong>noxious</strong> gases that pollute the air.（工厂排放有害气体污染空气。）</li>\n<li>Long-term exposure to <strong>noxious</strong> fumes can cause respiratory problems.（长期接触有害气体可导致呼吸问题。）</li>\n<li><strong>Noxious</strong> weeds spread rapidly and threaten local biodiversity.（有害杂草快速蔓延并威胁当地生物多样性。）</li>\n<li>Some insects have <strong>noxious</strong> effects on crops and soil fertility.（某些昆虫对庄稼和土壤肥力有有害影响。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 讨论环保、污染或公共健康议题时，用 <strong>noxious gases/substances</strong> 比 &quot;bad pollution&quot; 更学术、更精确；特别是在描述环境污染的具体危害时是必备表达。口语 Part 3 讨论环境或健康问题时也是加分词汇。</blockquote>", "analogy": "<p><strong>词性：</strong> 名词  </p>\n<p><strong>含义：</strong> ①类比、比喻；②相似之处、相似的事物；③（逻辑）类推法</p>\n<p><strong>语域：</strong> 正式、书面、中性；学术/写作中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>analogy 是学术用词，强调&quot;通过比较两个相似的事物来说明或论证&quot;。可作为修辞手法（比喻论证），也可指&quot;相似之处&quot;本身。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>draw an analogy</td><td>进行类比</td></tr>\n<tr><td>by analogy</td><td>类推地、打比喻</td></tr>\n<tr><td>analogy with / between</td><td>与...的类比</td></tr>\n<tr><td>a weak / false analogy</td><td>不恰当的类比</td></tr>\n<tr><td>in analogy to</td><td>与...相似地</td></tr>\n<tr><td>the human brain is analogous to a computer</td><td>比喻用法（形容词形式）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>analogy</strong>：系统的、逻辑的比较，强调相似性来论证或解释</li>\n<li><strong>metaphor</strong>：文学修辞，&quot;A is B&quot;（隐喻，不用 like）</li>\n<li><strong>simile</strong>：文学修辞，&quot;A is like B&quot;（明喻，用 like）</li>\n<li><strong>similarity</strong>：相似之处，范围更广，不一定是逻辑比较</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The teacher <strong>drew an analogy</strong> between the human heart and a pump.（老师将人心与泵进行了类比。）</li>\n<li><strong>By analogy</strong>, we can argue that internet security is like a lock on your house.（类推地，我们可以说网络安全就像房子上的锁。）</li>\n<li>The <strong>analogy between</strong> animal and plant cells helps students understand biology.（动物细胞与植物细胞的类比帮助学生理解生物学。）</li>\n<li>This <strong>analogy</strong> is <strong>weak</strong> because the two situations are fundamentally different.（这个类比不恰当，因为两种情况在根本上是不同的。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 写作中，用 <strong>draw an analogy</strong> 或 <strong>by analogy</strong> 进行论证比简单列举更有说服力，特别是在解释复杂概念或论证观点时。口语 Part 3 解释抽象概念时，&quot;Let me use an analogy...&quot; 也是加分表达。阅读中 analogy 常出现于学术文章，用于论证结构。</blockquote>", "nobility": "<p><strong>词性：</strong> 名词（不可数）  </p>\n<p><strong>含义：</strong> ①贵族身份、贵族阶级；②（品质）高尚、崇高、优雅；③贵族的集合体</p>\n<p><strong>语域：</strong> 正式、书面、中性；历史/社会/品质话题中常见</p>\n<p><strong>用法说明：</strong></p>\n<p>nobility 有两个主要含义：一是社会阶级意义上的&quot;贵族&quot;，二是品质意义上的&quot;高尚、崇高&quot;。前者多见于历史、政治语境；后者多见于品质、精神层面讨论。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>the nobility</td><td>贵族阶级</td></tr>\n<tr><td>nobility of character</td><td>品格的高尚</td></tr>\n<tr><td>nobility of purpose</td><td>目标的崇高</td></tr>\n<tr><td>social nobility</td><td>社会贵族身份</td></tr>\n<tr><td>moral nobility</td><td>道德高尚</td></tr>\n<tr><td>act with nobility</td><td>以高尚的方式行动</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>nobility</strong>（品质）：强调道德高尚、精神境界崇高，较文学化</li>\n<li><strong>dignity</strong>：尊严、庄严，强调自尊和尊重</li>\n<li><strong>honor / virtue</strong>：荣誉/美德，范围更广</li>\n<li><strong>aristocracy</strong>：贵族制度，社会学术语</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The <strong>nobility</strong> of ancient Rome held immense political power.（古罗马的<strong>贵族</strong>拥有巨大的政治权力。）</li>\n<li>She carried herself with great <strong>nobility</strong> and grace.（她举止端庄、优雅高尚。）</li>\n<li>The <strong>nobility</strong> of his sacrifice inspired the entire community.（他牺牲精神的<strong>崇高</strong>激励了整个社区。）</li>\n<li>There is a certain <strong>nobility</strong> in standing up for what is right, even when it is difficult.（坚持正义的行为具有一种<strong>高尚</strong>，即使这很困难。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 写作中，若讨论品质、精神或人生价值时，用 <strong>nobility of...</strong> （如&quot;nobility of sacrifice&quot;、&quot;nobility of character&quot;）比简单用 &quot;goodness&quot; 更显深度和格调。口语 Part 3 讨论人性、价值观或历史时，&quot;nobility&quot; 也是加分高级词汇。</blockquote>", "sober": "<p><strong>词性：</strong> 形容词（可作动词：sober up）  </p>\n<p><strong>含义：</strong> ①（人）没有醉酒的、清醒的；②（思想/态度）认真的、冷静的；③（颜色/风格）朴素的、低调的</p>\n<p><strong>语域：</strong> 正式、书面、中性；可用于口语</p>\n<p><strong>用法说明：</strong></p>\n<p>sober 有多层含义：核心义是&quot;清醒的&quot;（相对于醉酒），引申为&quot;清醒理性的、认真的&quot;（思想状态），以及&quot;朴素沉稳的&quot;（外观风格）。常见搭配如下：</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>sober thought / judgment</td><td>冷静的思考/判断</td></tr>\n<tr><td>sober reality</td><td>严峻的现实</td></tr>\n<tr><td>sober up</td><td>酒醒、清醒过来</td></tr>\n<tr><td>sober minded / sober person</td><td>头脑清醒的、冷静的人</td></tr>\n<tr><td>sober attire / style</td><td>朴素的着装/风格</td></tr>\n<tr><td>a sober assessment</td><td>冷静理性的评估</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>sober</strong>：强调清醒理性、冷静认真，或外形朴素低调</li>\n<li><strong>serious</strong>：严肃的，强调态度认真</li>\n<li><strong>calm / composed</strong>：冷静的、平静的</li>\n<li><strong>modest</strong>：谦虚的、朴素的（更强调谦逊）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>After the accident, he became <strong>sober</strong> and thoughtful.（事故后，他变得清醒和深思熟虑。）</li>\n<li>We need a <strong>sober</strong> assessment of the situation, not emotional reactions.（我们需要对局势进行冷静的评估，而不是情绪化反应。）</li>\n<li>The judge maintained a <strong>sober</strong> expression throughout the trial.（法官在整个审判期间保持着严肃认真的表情。）</li>\n<li>He <strong>sobered up</strong> after a long walk in the cold air.（他在冷空气中走了很久后清醒了。）</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Task 2 写作中，用 <strong>sober assessment/judgment/reality</strong> 替换 &quot;serious/realistic&quot; 能体现更高级的表达；特别是在讨论问题、现象或社会议题时，&quot;a sober look at...&quot; 显得更专业。口语 Part 3 讨论严肃话题时，&quot;We need a sober approach&quot; 也是自然加分的表达。</blockquote>", "flora和fauna": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> </p>\n<ul>\n<li><strong>flora</strong> - 植物（特别是某一地区或时期的植物）</li>\n<li><strong>fauna</strong> - 动物（特别是某一地区或时期的野生动物）</li>\n</ul>\n<p><strong>语域：</strong> 正式 / 书面 / 学术</p>\n<p><strong>用法说明：</strong></p>\n<p>Flora和fauna是一对相对的学术用语，常用于生态学、地理学、环保等正式文体中。两个词通常成对出现，用来指某一地区的整体生物群落。</p>\n<table>\n<tr><th>词汇</th><th>含义</th><th>常见搭配</th></tr>\n<tr><td>flora</td><td>植物、植被</td><td>local flora、native flora、tropical flora</td></tr>\n<tr><td>fauna</td><td>动物、野生动物</td><td>local fauna、endangered fauna、unique fauna</td></tr>\n</table>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The Amazon rainforest is known for its extraordinary flora and fauna. / 亚马逊热带雨林以其卓越的植物群和动物群而闻名。</li>\n<li>The island&#x27;s unique flora includes many endemic species found nowhere else. / 该岛屿独特的植物群包括许多仅在此地发现的特有物种。</li>\n<li>Climate change poses a threat to the fragile fauna of the polar regions. / 气候变化对极地地区脆弱的动物群构成威胁。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Flora和fauna是高分写作中常见的学术词汇，尤其在环保、生态、地理等话题中使用频率高。使用这类正式词汇能提升表达的学术性和专业性，特别是在Task 1和Task 2的写作中。在口语考试中，掌握这两个词可以帮助考生在discussing nature或environmental topics时表达更准确、更具学术性。</blockquote>", "hibernation": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 冬眠；某些动物在冬季进入的休眠状态；也可引申为&quot;休眠、暂停活动&quot;的状态</p>\n<p><strong>语域：</strong> 正式 / 书面 / 学术；可用于口语</p>\n<p><strong>用法说明：</strong></p>\n<p>Hibernation原指生物学中某些动物（如熊、刺猬、蛇等）在冬季进入的深度休眠状态，此时代谢显著降低。现也常用于比喻义，表示某事物或组织暂时停止活动、进入&quot;沉睡&quot;状态。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>enter hibernation</td><td>进入冬眠</td></tr>\n<tr><td>hibernation period</td><td>冬眠期</td></tr>\n<tr><td>during hibernation</td><td>在冬眠期间</td></tr>\n<tr><td>come out of hibernation</td><td>苏醒、结束休眠（引申：恢复活动）</td></tr>\n<tr><td>go into hibernation</td><td>进入休眠状态</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>hibernation</strong>：生物学术语，特指冬眠，引申为长期休止状态</li>\n<li><strong>dormancy</strong>：植物学术语，休眠、潜伏状态</li>\n<li><strong>lethargy / torpor</strong>：无力、迟钝状态（无生物学含义）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Bears enter hibernation in late autumn and wake up in spring. / 熊在秋末进入冬眠，春天苏醒。</li>\n<li>During hibernation, an animal&#x27;s heart rate and body temperature drop significantly. / 在冬眠期间，动物的心率和体温显著下降。</li>\n<li>The tech startup came out of hibernation with a new product launch. / 这家科技初创公司通过新产品发布从沉睡中苏醒。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Hibernation在Task 1（图表写作）中常见于动物/气候话题，用&quot;enter/go into hibernation&quot;表达比简单的&quot;sleep&quot;更学术、更精准。Task 2中若讨论经济衰退、产业暂停等话题，用&quot;go into hibernation&quot;表达暂时停顿比&quot;stop&quot;更形象有力。口语中讨论自然、气候话题时，掌握此词能显得专业。</blockquote>", "cram": "<p><strong>词性：</strong> 动词（可作名词：cram session）</p>\n<p><strong>含义：</strong> ①猛力塞进、塞满；②仓促学习、临时抱佛脚、考前突击复习</p>\n<p><strong>语域：</strong> 非正式 / 口语 / 日常；在学术讨论中也常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Cram有两个主要含义：字面义是&quot;塞进、填满&quot;，常用于物理动作；引申义是&quot;临时抱佛脚、临时突击复习&quot;，特别常见于学生学习语境。在学术讨论中，常用于表达对仓促学习方式的批评。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>cram for an exam</td><td>为考试临时抱佛脚</td></tr>\n<tr><td>cram into</td><td>挤进、塞进</td></tr>\n<tr><td>cram study</td><td>临时抱佛脚式学习</td></tr>\n<tr><td>all-night cram session</td><td>通宵临时复习</td></tr>\n<tr><td>cram knowledge</td><td>死记硬背知识</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>cram</strong>：强调仓促、临时、集中地塞进信息，多有贬义</li>\n<li><strong>study / revise</strong>：正常、有计划的学习</li>\n<li><strong>memorize</strong>：记忆、背诵（不一定是临时的）</li>\n<li><strong>stuff</strong>：塞进、装进（更多物理含义）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Students often cram the night before their exams instead of studying regularly. / 学生经常在考前一晚临时抱佛脚，而不是定期学习。</li>\n<li>We managed to cram five people into the small car. / 我们硬生生地把五个人挤进了小车里。</li>\n<li>Last-minute cramming is not an effective way to learn a language. / 临时抱佛脚不是学习语言的有效方式。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Cram在Task 2写作中常用于讨论教育话题，如&quot;Students should not rely on cramming&quot;（学生不应该依赖临时抱佛脚）。口语Part 3讨论学习方法时，&quot;cram for an exam&quot; 是自然表达。使用cram能精准表达&quot;临时突击&quot;这一含义，比generic的&quot;study hard&quot;更具体有力。</blockquote>", "coed": "<p><strong>词性：</strong> 名词（可作形容词）</p>\n<p><strong>含义：</strong> ①（名词）女学生，尤指在男校或混合学校中的女学生；②（形容词）男女同校的、男女混合的（coeducational的简称）</p>\n<p><strong>语域：</strong> 非正式 / 书面 / 中性；美国英语中更常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Coed是coeducational的缩写，既可作名词指女学生（尤其在历史语境中，当女性首次进入男校时），也可作形容词表示混合性别的教育环境。现代用法中，作为名词指女学生已相对不常用（较为过时），但作为形容词仍然广泛使用。</p>\n<table>\n<tr><th>用法</th><th>含义</th><th>示例</th></tr>\n<tr><td>coed (n.)</td><td>女学生</td><td>Several coeds attended the university.</td></tr>\n<tr><td>coed (adj.)</td><td>男女同校的、混合的</td><td>a coed dormitory / coed sports</td></tr>\n<tr><td>coeducational</td><td>男女同校的（正式用法）</td><td>coeducational school</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>coed</strong> (adj.)：非正式、简洁，常见于美国英语</li>\n<li><strong>coeducational</strong>：正式、学术性强</li>\n<li><strong>co-ed</strong> (hyphenated)：有时使用连字符的拼写</li>\n<li><strong>mixed</strong> / <strong>mixed-gender</strong>：更通用的中性表达</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>In the 1970s, many all-boys schools began admitting coeds. / 在1970年代，许多男校开始录取女学生。</li>\n<li>The university has several coed dormitories on campus. / 该大学校园内有几栋男女混住宿舍。</li>\n<li>Coed education became increasingly common in developed countries. / 男女同校教育在发达国家变得越来越普遍。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Coed在Task 1（教育统计图表）和Task 2（教育议题）中可能出现，尤其是讨论教育制度演变、性别平等等话题。掌握coed既能帮助理解题目中的表述，也能在写作中用&quot;coed schools/dormitories&quot;等自然表达。现代口语中更常用&quot;mixed&quot; 或 &quot;coeducational&quot;，但理解coed这个简写形式对阅读很有帮助。</blockquote>", "fraction": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> ①数学中的分数（如1/2、3/4）；②一小部分、少量、片段</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；数学和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Fraction有两个主要含义：在数学中指分子分母的表示方式；在日常用语中表示&quot;某物的一小部分&quot;。常见搭配是&quot;a fraction of...&quot;，表示&quot;仅仅是...的一部分&quot;。</p>\n<table>\n<tr><th>含义</th><th>搭配</th><th>示例</th></tr>\n<tr><td>分数（数学）</td><td>fraction bar / common fraction</td><td>1/2 is a simple fraction.</td></tr>\n<tr><td>一小部分</td><td>a fraction of</td><td>at a fraction of the cost</td></tr>\n<tr><td>极小的部分</td><td>only a fraction</td><td>Only a fraction of students passed.</td></tr>\n<tr><td>时间上的片段</td><td>a fraction of a second</td><td>The entire process takes only a fraction of a second.</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>fraction</strong>：强调&quot;一个很小的部分、比例&quot;，常与&quot;of&quot;搭配</li>\n<li><strong>portion</strong>：&quot;部分、份量&quot;，更中立</li>\n<li><strong>part</strong>：&quot;部分&quot;，范围较广</li>\n<li><strong>segment</strong>：&quot;分段、部分&quot;，多用于数据或人群的划分</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Only a fraction of the population speaks English fluently. / 只有一小部分人口能流利说英语。</li>\n<li>The new model costs only a fraction of the original price. / 新型号只需要原价的一小部分。</li>\n<li>A fraction of a second can make the difference in a race. / 赛跑中相差零点几秒可能就决定胜负。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Fraction在Task 1（图表描述）和Task 2写作中频繁出现。用&quot;a fraction of&quot;表达数据对比比&quot;a small part of&quot;更精准学术，如&quot;a fraction of respondents&quot;（一小部分受访者）。在口语中也很自然，Part 3讨论比例时&quot;only a fraction of...&quot;是高分表达。掌握此词能精准表达数据中的相对少数。</blockquote>", "inert": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> ①（化学）惰性的、不活跃的；②没有活力的、懒散的、静止的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 学术；科学术语中常见，也用于文学描写</p>\n<p><strong>用法说明：</strong></p>\n<p>Inert有两个重要含义：在科学领域指&quot;化学上不反应、惰性的&quot;（如氮气是inert gas）；在日常用语中表示&quot;缺乏活力、不活跃、懒散的&quot;。词源来自拉丁文，表示&quot;无技能、不活跃&quot;。</p>\n<table>\n<tr><th>含义</th><th>搭配</th><th>示例</th></tr>\n<tr><td>惰性的（化学）</td><td>inert gas / inert element</td><td>Helium is an inert gas.</td></tr>\n<tr><td>无活力的</td><td>inert matter / inert state</td><td>The patient lay inert on the bed.</td></tr>\n<tr><td>缺乏生气的</td><td>remain inert</td><td>The government remained inert during the crisis.</td></tr>\n<tr><td>静止不动的</td><td>inert mass</td><td>The inert body showed no signs of life.</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>inert</strong>：强调化学上或精神上的&quot;不活跃、懒散&quot;，较正式</li>\n<li><strong>inactive</strong>：&quot;不活跃的&quot;，更通用</li>\n<li><strong>sluggish</strong>：缓慢的、迟钝的，强调反应慢</li>\n<li><strong>dormant</strong>：休眠的、潜伏的，强调暂时性</li>\n<li><strong>motionless</strong>：&quot;静止不动的&quot;，仅描述物理状态</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Inert gases like argon are used in welding. / 氩气等惰性气体用于焊接。</li>\n<li>The old man sat inert in his chair, staring at nothing. / 老人呆呆地坐在椅子上，目光空洞。</li>\n<li>The government&#x27;s inert response to the disaster drew widespread criticism. / 政府对灾难的消极应对招致广泛批评。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Inert在Task 1（科学图表）和Task 2（环保/科学话题）中可能出现。科学语境中&quot;inert atmosphere&quot;（惰性气体环境）是常见表达。Task 2若讨论社会问题、政府政策时，&quot;remain inert&quot;或&quot;inert response&quot;比&quot;inactive&quot;更正式学术。口语中较少使用，但理解此词有助于阅读科技类文章。</blockquote>", "contaminate": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 污染、使受污染、沾污、破坏...的纯净</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；科学、环保、法律语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Contaminate是一个常见的学术用词，强调某物因接触不洁或有害物质而被污染或变坏。通常用于环保、食品安全、医疗等领域。相关名词是contamination，形容词是contaminated。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>contaminate water/soil/air</td><td>污染水/土壤/空气</td></tr>\n<tr><td>contaminate food</td><td>食物受污染</td></tr>\n<tr><td>contaminated with</td><td>被...污染</td></tr>\n<tr><td>prevent contamination</td><td>防止污染</td></tr>\n<tr><td>cross-contamination</td><td>交叉污染</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>contaminate</strong>：强调使某物被有害物质污染，较正式学术</li>\n<li><strong>pollute</strong>：污染，范围更广，更常见于环保话题</li>\n<li><strong>taint</strong>：使变坏、沾污，较偏文学</li>\n<li><strong>poison</strong>：下毒、毒害，更强调有毒性</li>\n<li><strong>dirty</strong>：弄脏，更口语化</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The chemical spill contaminated the groundwater supply. / 化学品泄漏污染了地下水供应。</li>\n<li>Food can be easily contaminated if not stored properly. / 食物如果储存不当很容易被污染。</li>\n<li>The scandal contaminated the company&#x27;s reputation for years. / 这个丑闻多年来破坏了公司的声誉。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Contaminate在Task 1（环保/科学图表）和Task 2（环境、食品安全、健康等话题）中高频出现。用&quot;contaminate&quot;比&quot;pollute&quot;更学术精准，特别是讨论具体物质污染时。Task 2若谈论&quot;food contamination&quot;、&quot;water contamination&quot;是自然高分表达。口语Part 3讨论环保时&quot;contaminate&quot;也很常用。</blockquote>", "extent": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 范围、程度、规模、幅度</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Extent表示某事物的&quot;程度、范围或规模&quot;。最常见的搭配是&quot;to what extent&quot;（到什么程度）和&quot;to the extent that&quot;（在...程度上）。在学术写作中频繁出现，用于量化或描述事物的大小、影响范围等。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>to what extent</td><td>到什么程度、在多大程度上</td></tr>\n<tr><td>to the extent that</td><td>在...程度上；以...为限</td></tr>\n<tr><td>to a large extent</td><td>在很大程度上</td></tr>\n<tr><td>to some extent</td><td>在某种程度上</td></tr>\n<tr><td>the full extent of</td><td>...的全部范围</td></tr>\n<tr><td>extent of damage/impact</td><td>损害/影响的程度</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>extent</strong>：强调&quot;范围、程度、规模&quot;，较正式学术</li>\n<li><strong>degree</strong>：&quot;程度、等级&quot;，更中立通用</li>\n<li><strong>scope</strong>：&quot;范围、活动范围&quot;，强调活动或影响的范畴</li>\n<li><strong>scale</strong>：&quot;规模、尺度&quot;，强调大小</li>\n<li><strong>level</strong>：&quot;水平、层级&quot;，更口语化</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>To what extent are government policies responsible for this problem? / 政府政策在多大程度上应对此问题负责？</li>\n<li>The full extent of the environmental damage has not yet been assessed. / 环境损害的全部程度还未被评估。</li>\n<li>To a large extent, the success depends on individual effort. / 在很大程度上，成功取决于个人努力。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Extent是Task 2写作中的高频词汇，特别是讨论问题程度或影响范围时。&quot;To what extent do you agree?&quot;这类题型中必然会用到。用&quot;to what extent&quot;比&quot;how much&quot;更学术。Task 1图表写作中&quot;the extent of increase/decrease&quot;也常见。口语Part 3讨论程度时&quot;to a large extent&quot;是自然高分表达，比&quot;very much&quot;更正式。</blockquote>", "hollow": "<p><strong>词性：</strong> 形容词（可作名词、动词）</p>\n<p><strong>含义：</strong> ①中空的、空心的；②（声音）沉闷的、空洞的；③（支持、承诺等）虚伪的、空洞的、无实质的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；日常和文学语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Hollow有多个含义：字面义是&quot;内部空的&quot;（如hollow tree），引申义是&quot;缺乏深度、毫无诚意的&quot;（如hollow promise）。动词形式&quot;hollow out&quot;表示&quot;挖空&quot;。</p>\n<table>\n<tr><th>含义</th><th>搭配</th><th>示例</th></tr>\n<tr><td>空心的（物理）</td><td>hollow tube / hollow tree</td><td>a hollow chocolate egg</td></tr>\n<tr><td>空洞的（声音）</td><td>hollow voice / hollow laugh</td><td>His laugh sounded hollow.</td></tr>\n<tr><td>虚伪的（承诺）</td><td>hollow promise / hollow victory</td><td>a hollow victory（虚伪的胜利）</td></tr>\n<tr><td>挖空</td><td>hollow out</td><td>hollow out a log（挖空一根木头）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>hollow</strong>：强调&quot;空心的、空洞的、毫无意义的&quot;，较文学</li>\n<li><strong>empty</strong>：&quot;空的、没有内容的&quot;，更通用</li>\n<li><strong>void</strong>：&quot;空虚的、无效的&quot;，较正式法律术语</li>\n<li><strong>vacant</strong>：&quot;空置的、无人的&quot;，多用于房间、地位</li>\n<li><strong>insincere</strong>：&quot;不真诚的&quot;，强调态度</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The old tree was hollow inside but still standing. / 老树内部是空心的，但仍然屹立。</li>\n<li>Her promises rang hollow because she had broken them before. / 她的承诺听起来很空洞，因为她之前食过言。</li>\n<li>A hollow victory achieved through dishonesty is not worth celebrating. / 通过不诚实手段获得的空洞胜利不值得庆祝。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Hollow在Task 2写作中常用于批评或讨论真实性，如&quot;hollow promises&quot;、&quot;hollow victory&quot;比simple&quot;fake&quot;或&quot;false&quot;更文雅学术。Task 1图表中&quot;hollow&quot;用于描述空心结构也偶有出现。口语Part 3讨论诚意或真实性时，&quot;That sounds rather hollow&quot;是高级表达。</blockquote>", "consensus": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 共识、一致意见、普遍同意</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术、政治、商业语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Consensus表示&quot;大多数人或团体达成的共同意见或协议&quot;。强调通过讨论和协商达成的一致认可，而不是简单的多数投票。常搭配&quot;reach&quot;（达到）、&quot;build&quot;（建立）、&quot;lack of&quot;（缺乏）等动词。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>reach a consensus</td><td>达成共识</td></tr>\n<tr><td>build consensus</td><td>建立共识</td></tr>\n<tr><td>lack of consensus</td><td>缺乏共识</td></tr>\n<tr><td>broad consensus</td><td>广泛共识</td></tr>\n<tr><td>general consensus</td><td>普遍共识</td></tr>\n<tr><td>scientific consensus</td><td>科学共识</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>consensus</strong>：强调&quot;通过讨论达成的一致意见&quot;，较正式学术</li>\n<li><strong>agreement</strong>：&quot;协议、同意&quot;，范围更广</li>\n<li><strong>accord</strong>：&quot;一致、协议&quot;，较正式古典</li>\n<li><strong>unanimity</strong>：&quot;全体一致&quot;，更强调完全一致</li>\n<li><strong>majority</strong>：&quot;多数&quot;，只是数量上的优势，不一定共识</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The international scientific consensus is that climate change is caused by human activity. / 国际科学共识是气候变化由人类活动引起。</li>\n<li>The committee reached a consensus after hours of discussion. / 经过数小时的讨论，委员会达成了共识。</li>\n<li>There is no consensus among experts about the best solution to this problem. / 专家们对这个问题的最佳解决方案没有共识。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Consensus在Task 2写作中高频出现，特别是讨论社会观点、科学、政策等话题时。&quot;reach a consensus&quot;、&quot;build consensus&quot;是自然学术表达。Task 1若涉及调查数据或意见统计也可能出现。口语Part 3讨论观点统一或分歧时，&quot;There is a consensus that...&quot;或&quot;Lacking consensus&quot;都是高级表达，比&quot;most people agree&quot;更正式学术。</blockquote>", "inferior": "<p><strong>词性：</strong> 形容词（可作名词）</p>\n<p><strong>含义：</strong> ①（质量、等级）低等的、较差的、劣质的；②（位置）在下方的、下部的（解剖学术语）</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Inferior主要表示&quot;质量或等级较低&quot;，常搭配&quot;to&quot;进行比较。也可用于医学解剖学术语。与superior（优越的）相反。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>inferior to</td><td>不如...的、低于...的</td></tr>\n<tr><td>inferior quality / goods</td><td>低质量的、劣质商品</td></tr>\n<tr><td>inferior court</td><td>下级法院</td></tr>\n<tr><td>inferior position</td><td>下等位置、劣势</td></tr>\n<tr><td>feel inferior</td><td>感到自卑</td></tr>\n<tr><td>inferior complex</td><td>自卑情结</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>inferior</strong>：强调质量、等级或能力较低，较正式</li>\n<li><strong>poor / bad</strong>：&quot;差的、糟糕的&quot;，更口语化</li>\n<li><strong>substandard</strong>：&quot;低于标准的&quot;，强调不符合标准</li>\n<li><strong>lower</strong>：&quot;较低的&quot;，仅指位置或级别</li>\n<li><strong>subordinate</strong>：&quot;从属的、下属的&quot;，强调等级关系</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>This product is inferior to its competitors in terms of durability. / 这种产品在耐久性方面不如竞争对手的产品。</li>\n<li>The court ruled that the defendant&#x27;s claim was inferior and rejected it. / 法院裁定被告的诉求在法律上位置较低并予以驳回。</li>\n<li>Many people develop an inferior complex due to repeated failures. / 许多人因反复失败而形成自卑情结。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Inferior在Task 2写作中常用于比较话题，&quot;inferior to&quot;是自然的对比表达。讨论产品质量、教育质量等时，&quot;inferior quality&quot;比&quot;bad quality&quot;更学术。口语Part 3讨论社会阶层或能力差异时，&quot;feel inferior&quot;是自然高级表达。Task 1若涉及数据或指标对比，&quot;inferior performance&quot;也是常见表述。</blockquote>", "cutlery": "<p><strong>词性：</strong> 名词（不可数）</p>\n<p><strong>含义：</strong> 刀叉勺等餐具（统称）；刀具（工具）</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；日常和商业语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Cutlery主要指&quot;餐用刀叉勺&quot;等餐具的总称，是一个不可数名词。在英式英语中非常常见，美式英语通常用&quot;utensils&quot;或&quot;flatware&quot;代替。也可指一般的刀具工具。</p>\n<table>\n<tr><th>含义</th><th>搭配</th><th>示例</th></tr>\n<tr><td>餐具（刀叉勺）</td><td>cutlery set / drawer</td><td>Plastic cutlery（塑料餐具）</td></tr>\n<tr><td>刀具（工具）</td><td>cutlery shop / knife</td><td>kitchen cutlery（厨房刀具）</td></tr>\n<tr><td>餐具摆放</td><td>lay out cutlery</td><td>formal cutlery（正式餐具）</td></tr>\n<tr><td>特定类别</td><td>silver cutlery（银质餐具）</td><td>stainless steel cutlery（不锈钢餐具）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>cutlery</strong>：英式英语，特指刀叉勺等餐具，较正式</li>\n<li><strong>utensils</strong>：&quot;用具、餐具&quot;，美式常用，范围更广</li>\n<li><strong>flatware</strong>：美式英语，特指餐刀叉勺（平的餐具）</li>\n<li><strong>silverware</strong>：&quot;银制餐具&quot;，强调材质</li>\n<li><strong>crockery</strong>：&quot;陶器、碗盘&quot;，不包括刀叉</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Please lay out the cutlery on both sides of the plate. / 请在盘子两侧摆放刀叉。</li>\n<li>The restaurant provides plastic cutlery for takeout orders. / 这家餐厅为外卖提供塑料餐具。</li>\n<li>We need to invest in high-quality cutlery for the new kitchen. / 我们需要为新厨房购置高质量的刀具。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Cutlery在Task 1（餐厅设施、用品描述）和Task 2（服务业、环保话题如&quot;plastic vs reusable cutlery&quot;）中可能出现。&quot;Lay out cutlery&quot;是正式餐饮表达。讨论环保或食品卫生时，&quot;cutlery management&quot;或&quot;reusable cutlery&quot;是自然学术用语。口语Part 1若涉及餐桌礼仪话题也可能用到。</blockquote>", "tunnel": "<p><strong>词性：</strong> 名词（可作动词）</p>\n<p><strong>含义：</strong> ①隧道、地道；②（引申）狭窄的通道；③动词：挖隧道、凿通</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；日常和学术语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Tunnel最常用作名词，指&quot;通过山岭或地下的通道&quot;。也可作动词表示&quot;挖掘隧道&quot;或&quot;像隧道一样穿过&quot;。常见搭配是&quot;tunnel through&quot;（穿透）、&quot;tunnel vision&quot;（隧道视野，引申为片面思维）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>railway/road tunnel</td><td>铁路/公路隧道</td></tr>\n<tr><td>tunnel through</td><td>穿过、挖通</td></tr>\n<tr><td>tunnel vision</td><td>隧道视野；片面观点</td></tr>\n<tr><td>tunnel under</td><td>从...下面挖隧道</td></tr>\n<tr><td>wind tunnel</td><td>风洞（测试设施）</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>tunnel</strong>：强调&quot;为了通过而挖的地下通道&quot;，较常见</li>\n<li><strong>passage</strong>：&quot;通道、走廊&quot;，范围更广</li>\n<li><strong>subway</strong>：地铁（美式），特指城市地下铁路</li>\n<li><strong>underpass</strong>：&quot;地下通道&quot;，强调在地下</li>\n<li><strong>cavern / cave</strong>：&quot;洞穴&quot;，自然形成</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The Channel Tunnel connects England and France. / 英吉利海峡隧道连接了英国和法国。</li>\n<li>Workers tunneled through the mountain to build the railway. / 工人们穿过山岭挖建铁路隧道。</li>\n<li>He has tunnel vision about his goals and ignores other perspectives. / 他对目标有片面的看法，忽视了其他观点。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Tunnel在Task 1（基础设施描述）和Task 2（城市规划、交通话题）中可能出现。讨论基础设施或交通运输时，&quot;tunnel&quot;是自然术语。&quot;tunnel vision&quot;作为习语在Task 2讨论思维方式或决策偏见时很有用。口语中&quot;tunnel under/through&quot;描述地下通道建设也很常见。</blockquote>", "municipal": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> 市政的、城市的、市级的、城镇政府的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；政治、行政、规划语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Municipal指&quot;与城市或城镇政府相关的&quot;。常用于描述由市级政府管理或提供的服务、设施、法规等。相关名词是&quot;municipality&quot;（市政府、城市）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>municipal government / council</td><td>市政府、市议会</td></tr>\n<tr><td>municipal services</td><td>市政服务</td></tr>\n<tr><td>municipal bonds</td><td>市政债券</td></tr>\n<tr><td>municipal election</td><td>市级选举</td></tr>\n<tr><td>municipal waste / water</td><td>城市垃圾/水</td></tr>\n<tr><td>municipal regulations</td><td>市政法规</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>municipal</strong>：特指城市/城镇级的政府或管理，较正式学术</li>\n<li><strong>urban</strong>：&quot;城市的、城市中的&quot;，范围更广，描述城市特征</li>\n<li><strong>civic</strong>：&quot;市民的、公民的&quot;，强调公众参与</li>\n<li><strong>local</strong>：&quot;当地的、地方的&quot;，范围最广</li>\n<li><strong>city / town</strong>：名词，具体的城市或城镇</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The municipal government announced new plans for public transportation. / 市政府宣布了公共交通的新规划。</li>\n<li>Municipal services include garbage collection, water supply, and street maintenance. / 市政服务包括垃圾收集、供水和街道维护。</li>\n<li>Residents can participate in municipal elections to choose their representatives. / 居民可以参加市级选举来选择他们的代表。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Municipal在Task 1（城市规划、设施描述）和Task 2（城市治理、公共服务、环保话题）中高频出现。讨论城市基础设施、政府政策或城市管理时，&quot;municipal services&quot;、&quot;municipal government&quot;是自然学术表达。Task 2若涉及公共政策或城镇发展，&quot;municipal regulations&quot;或&quot;municipal planning&quot;是常见用语。</blockquote>", "bilateral": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> ①双边的、双方的；②（医学/解剖）两侧的、左右两侧的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；政治、外交、医学语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Bilateral指&quot;涉及两个方面或两个国家的&quot;，最常用于国际关系、贸易、协议等正式语境。医学中也表示&quot;两侧的&quot;（如bilateral hearing loss）。词源自拉丁文&quot;bilateralis&quot;（两侧的）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>bilateral agreement / treaty</td><td>双边协议/条约</td></tr>\n<tr><td>bilateral relations / trade</td><td>双边关系/贸易</td></tr>\n<tr><td>bilateral negotiation</td><td>双边谈判</td></tr>\n<tr><td>bilateral symmetry</td><td>双侧对称</td></tr>\n<tr><td>bilateral cooperation</td><td>双边合作</td></tr>\n<tr><td>bilateral contract</td><td>双边合同</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>bilateral</strong>：强调&quot;两方之间的、相互的&quot;，较正式学术</li>\n<li><strong>mutual</strong>：&quot;相互的、彼此的&quot;，更通用</li>\n<li><strong>reciprocal</strong>：&quot;互惠的、相互的&quot;，强调等价交换</li>\n<li><strong>two-sided</strong>：&quot;两边的&quot;，更口语化</li>\n<li><strong>unilateral</strong>：单边的（相反词）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The two countries signed a bilateral trade agreement. / 两个国家签署了双边贸易协议。</li>\n<li>Bilateral cooperation between the nations has increased significantly. / 两国之间的双边合作显著增加。</li>\n<li>The patient was diagnosed with bilateral hearing loss. / 患者被诊断为双侧听力丧失。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Bilateral在Task 2（国际关系、政治、贸易话题）和Task 1（医学图表）中可能出现。讨论国际关系、外交政策或贸易协议时，&quot;bilateral agreement&quot;、&quot;bilateral relations&quot;是自然学术表达。与&quot;multilateral&quot;（多边的）、&quot;unilateral&quot;（单边的）对比使用能体现高级词汇水平。口语Part 3讨论国际合作时也很实用。</blockquote>", "egalitarian": "<p><strong>词性：</strong> 形容词（可作名词）</p>\n<p><strong>含义：</strong> ①平等主义的、倡导平等的；②支持或实践平等的人</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；政治、社会话题常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Egalitarian指&quot;相信人人平等&quot;或&quot;倡导平等权利&quot;的理念。可作形容词修饰制度、社会、原则等，也可作名词指持平等主义观点的人。词源自法文&quot;égal&quot;（平等）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>egalitarian society</td><td>平等主义社会</td></tr>\n<tr><td>egalitarian principles</td><td>平等主义原则</td></tr>\n<tr><td>egalitarian approach</td><td>平等主义方法</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>egalitarian</strong>：强调倡导&quot;人人平等&quot;的理想，较正式</li>\n<li><strong>equal</strong>：&quot;相等的、平等的&quot;，更中立描述事实</li>\n<li><strong>democratic</strong>：&quot;民主的&quot;，强调权力分配</li>\n<li><strong>fair</strong>：&quot;公平的、公正的&quot;，范围更广</li>\n<li><strong>equitable</strong>：&quot;公平的、合理分配的&quot;，侧重结果公正</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>An egalitarian society aims to reduce inequality. / 平等主义社会旨在减少不平等。</li>\n<li>The organization promotes egalitarian values. / 该组织倡导平等主义价值观。</li>\n<li>Many egalitarians believe that wealth should be more fairly distributed. / 许多平等主义者认为财富应该更公平地分配。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Egalitarian在Task 2（社会平等、经济不平等、政治制度话题）中常见。讨论社会理想或政治制度时，&quot;egalitarian society&quot;或&quot;egalitarian principles&quot;是高级学术表达。与&quot;democratic&quot;、&quot;authoritarian&quot;对比使用能展现思辨能力。口语Part 3讨论社会公平或理想社会时也很实用。</blockquote>", "defer": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> ①推迟、延迟；②遵从、顺从</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；正式文体和日常都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Defer有两个主要含义：推迟某事（defer sth.），或在某人面前表示尊重/顺从（defer to sb.）。两个含义虽不同但都很常用。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>defer payment</td><td>延迟付款</td></tr>\n<tr><td>defer a decision / meeting</td><td>推迟决定/会议</td></tr>\n<tr><td>defer to sb.</td><td>尊重某人、顺从某人</td></tr>\n<tr><td>defer judgment</td><td>暂缓判断</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>defer</strong>（推迟）：正式学术用语</li>\n<li><strong>delay / postpone</strong>：&quot;延迟、推迟&quot;，更通用</li>\n<li><strong>put off</strong>：&quot;推迟&quot;，更口语化</li>\n<li><strong>defer to</strong>（遵从）：强调对他人专业或权威的尊重</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>We decided to defer the meeting until next week. / 我们决定把会议推迟到下周。</li>\n<li>I defer to your expertise on this matter. / 在这件事上我尊重你的专业意见。</li>\n<li>The company deferred payment due to cash flow issues. / 公司由于现金流问题延迟了付款。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Defer在Task 2（商业、政策、决策话题）中常见。&quot;defer payment&quot;或&quot;defer a decision&quot;是正式商业表达。&quot;defer to&quot;在讨论权力关系或尊重专业意见时很有用。比&quot;delay&quot;更正式学术，能提升表达水平。</blockquote>", "lull": "<p><strong>词性：</strong> 动词（可作名词）</p>\n<p><strong>含义：</strong> ①使安静、缓和、放松；②催眠、使入睡；③（名词）短暂的平静期</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；文学和日常都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Lull主要表示&quot;使...安静或平静&quot;。常搭配&quot;into&quot;表示&quot;诱骗进入某状态&quot;。名词形式表示&quot;短暂的平静期&quot;（如lull before the storm）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>lull sb. to sleep</td><td>使某人入睡</td></tr>\n<tr><td>lull into false security</td><td>诱骗进入虚假安全感</td></tr>\n<tr><td>lull before the storm</td><td>暴风雨前的平静</td></tr>\n<tr><td>lull into complacency</td><td>使陷入自满</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>lull</strong>：强调&quot;缓和、平息或用柔和方式安抚&quot;，较文学</li>\n<li><strong>calm / soothe</strong>：&quot;使平静、安抚&quot;，更通用</li>\n<li><strong>rock / cradle</strong>：&quot;摇晃使入睡&quot;，更具体动作</li>\n<li><strong>tranquility / calm</strong>（名词）：&quot;平静、宁静&quot;，强调状态</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The gentle music lulled the baby to sleep. / 温柔的音乐使婴儿入睡。</li>\n<li>The calm market lulled investors into overconfidence. / 平静的市场诱骗投资者过度自信。</li>\n<li>There was a brief lull in the fighting before it resumed. / 战斗暂时停止了，但随后又重新开始。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Lull在Task 2（商业、心理、警示话题）和文学描写中常见。&quot;lull into false security/complacency&quot;是讨论人们被愚弄或过度自信时的高级表达。&quot;lull before the storm&quot;作为习语在描述局势变化时很有用。比&quot;calm&quot;更文雅，能提升写作品质。</blockquote>", "consort": "<p><strong>词性：</strong> 名词（可作动词）</p>\n<p><strong>含义：</strong> ①配偶、伴侣（特别是君主的配偶）；②同伴、陪伴者；③动词：与...交往、陪伴</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；文学和正式语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Consort最常用作名词，指&quot;君主的配偶&quot;（如queen consort女王配偶）或&quot;陪伴者&quot;。作动词时表示&quot;与...一起&quot;或&quot;交往&quot;，通常搭配&quot;with&quot;。词源自拉丁文&quot;consors&quot;（共同持有者）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>royal consort</td><td>王妃、王配</td></tr>\n<tr><td>queen consort</td><td>女王配偶</td></tr>\n<tr><td>prince consort</td><td>王夫</td></tr>\n<tr><td>consort with</td><td>与...交往、陪伴</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>consort</strong>（名词）：强调&quot;配偶或同伴&quot;，较正式文学</li>\n<li><strong>spouse</strong>：&quot;配偶&quot;，更通用中立</li>\n<li><strong>partner</strong>：&quot;伴侣、合作者&quot;，更现代</li>\n<li><strong>companion</strong>：&quot;同伴、陪伴者&quot;，范围更广</li>\n<li><strong>associate</strong>（名词）：&quot;同伙、相关者&quot;，有时有贬义</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Queen Victoria&#x27;s consort was Prince Albert. / 维多利亚女王的配偶是艾伯特王子。</li>\n<li>He should not consort with people of questionable character. / 他不应该与品质可疑的人来往。</li>\n<li>The king and his consort attended the ceremony together. / 国王和他的配偶一起参加了典礼。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Consort在Task 1（历史或皇室话题）和Task 2（文学、历史讨论）中可能出现。讨论君主制或皇室成员时，&quot;queen consort&quot;或&quot;royal consort&quot;是正式用语。作动词&quot;consort with&quot;在讨论人际关系或品德时很有用，比&quot;associate with&quot;更文雅。阅读文学类文章时常见此词。</blockquote>", "lease": "<p><strong>词性：</strong> 名词（可作动词）</p>\n<p><strong>含义：</strong> ①租赁协议、租约、租期；②动词：出租、租赁、租用</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；商业、房产、日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Lease作名词指&quot;租赁协议或租期&quot;（房屋、车辆等长期使用），与&quot;rent&quot;（租赁）相关但更正式。作动词表示&quot;将...出租给&quot;或&quot;从...租赁&quot;。常搭配&quot;sign a lease&quot;（签租约）、&quot;lease out&quot;（出租）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>sign a lease</td><td>签署租赁协议</td></tr>\n<tr><td>lease agreement / contract</td><td>租赁协议</td></tr>\n<tr><td>lease out</td><td>出租、租赁给他人</td></tr>\n<tr><td>lease term</td><td>租期</td></tr>\n<tr><td>long-term / short-term lease</td><td>长期/短期租赁</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>lease</strong>：正式的租赁协议，通常长期，较商业</li>\n<li><strong>rent</strong>：&quot;租赁、租金&quot;，更通用口语</li>\n<li><strong>hire</strong>：&quot;雇佣、租赁&quot;，通常指人工或临时</li>\n<li><strong>let</strong>（英式）：&quot;出租、租给他人&quot;</li>\n<li><strong>sublease</strong>：&quot;转租、二次出租&quot;</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>I signed a one-year lease for the apartment. / 我签署了一份为期一年的公寓租赁协议。</li>\n<li>The company leases office space in the city center. / 该公司在市中心租赁办公空间。</li>\n<li>They leased out their house to a family while traveling abroad. / 他们在出国旅行期间把房子租给了一家人。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Lease在Task 1（房产、商业话题）和Task 2（房屋政策、商业经营话题）中常见。讨论房产或商业租赁时，&quot;lease agreement&quot;、&quot;sign a lease&quot;是自然正式表达。与&quot;rent&quot;对比：lease更正式学术，rent更日常口语。Task 2讨论住房问题或商业成本时，&quot;lease term&quot;或&quot;lease cost&quot;是常见用语。</blockquote>", "astrology": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 占星术、占星学（根据天体位置预测命运的信仰体系）</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；日常和文化语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Astrology是一种古老的信仰体系，认为天体的位置会影响人的性格和命运。与astronomy（天文学，科学）不同，占星术不被科学界认可，属于伪科学。常搭配&quot;believe in&quot;（相信）、&quot;horoscope&quot;（星座运势）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>believe in astrology</td><td>相信占星术</td></tr>\n<tr><td>astrology sign / chart</td><td>星座符号/出生图</td></tr>\n<tr><td>Chinese astrology</td><td>中国占星术</td></tr>\n<tr><td>astrology reading</td><td>占星预测</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>astrology</strong>：占星术（伪科学、信仰体系）</li>\n<li><strong>astronomy</strong>：天文学（真科学）</li>\n<li><strong>horoscope</strong>：星座运势（占星术的产物）</li>\n<li><strong>divination</strong>：占卜（更广泛的预测体系）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Many people believe in astrology, but it has no scientific basis. / 许多人相信占星术，但它没有科学依据。</li>\n<li>She studies astrology as a hobby. / 她把占星术作为爱好来研究。</li>\n<li>Astrology has been practiced for thousands of years across different cultures. / 占星术在不同文化中已被实践了数千年。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Astrology在Task 2（文化话题、科学与信仰讨论）和阅读中可能出现。讨论伪科学或文化信仰时，了解astrology与astronomy的区别很重要。能精准区分这两个词能展现对英文细微差别的理解。</blockquote>", "astronomy": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 天文学、天文科学（科学地研究天体和宇宙的学科）</p>\n<p><strong>语域：</strong> 正式 / 书面 / 学术；科学和教育语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Astronomy是一门真实的科学学科，研究星星、行星、星系等天体的物理特性和运动规律。与astrology（占星术）相反，astronomy是基于观察和科学方法的。常搭配&quot;study&quot;（研究）、&quot;telescope&quot;（望远镜）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>study astronomy</td><td>研究天文学</td></tr>\n<tr><td>astronomy class / course</td><td>天文学课程</td></tr>\n<tr><td>observational astronomy</td><td>观测天文学</td></tr>\n<tr><td>modern astronomy</td><td>现代天文学</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>astronomy</strong>：天文学（科学学科）</li>\n<li><strong>astrophysics</strong>：天体物理学（更专门的分支）</li>\n<li><strong>astrology</strong>：占星术（伪科学）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Astronomy is a branch of natural science. / 天文学是自然科学的一个分支。</li>\n<li>The telescope is an important tool in astronomy. / 望远镜是天文学中的重要工具。</li>\n<li>Modern astronomy has revealed the vastness of the universe. / 现代天文学揭示了宇宙的广阔。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Astronomy在Task 1（科学图表）和Task 2（科学技术话题）中常见。讨论科学研究或太空探索时是必用词。与astrology对比使用能体现对科学与非科学的批判性思维。</blockquote>", "astronaut": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 宇航员、太空人（受过训练进行太空飞行的人）</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；日常和新闻语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Astronaut指&quot;经过专业训练进行太空任务的人&quot;。美式英语通常用astronaut，英式英语有时用cosmonaut（苏联/俄罗斯用语）。相关词是&quot;astronaut training&quot;（宇航员培训）、&quot;space mission&quot;（太空任务）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>astronaut training</td><td>宇航员培训</td></tr>\n<tr><td>space astronaut</td><td>太空宇航员</td></tr>\n<tr><td>astronaut in space</td><td>在太空的宇航员</td></tr>\n<tr><td>become an astronaut</td><td>成为宇航员</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>astronaut</strong>：宇航员（一般用法）</li>\n<li><strong>cosmonaut</strong>：宇航员（特指苏联/俄罗斯）</li>\n<li><strong>spaceman</strong>：太空人（较古老的说法）</li>\n<li><strong>pilot</strong>：飞行员（不一定是太空）</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Neil Armstrong was the first astronaut to walk on the moon. / 尼尔·阿姆斯特朗是第一个登月的宇航员。</li>\n<li>Astronauts undergo years of rigorous training before their missions. / 宇航员在执行任务前要经历多年的严格训练。</li>\n<li>The astronaut spent six months on the International Space Station. / 宇航员在国际空间站上停留了六个月。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Astronaut在Task 1（科学技术话题）和Task 2（探索、科技进步话题）中常见。讨论太空探索或科技成就时是自然用词。能准确使用astronaut vs cosmonaut的区别能展现对地理和历史的理解。</blockquote>", "comprehend": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 理解、明白、领会</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Comprehend表示&quot;理解或掌握某个意思或概念&quot;，是understand的较正式同义词。强调对信息的深层理解而不仅仅是听懂。常用于学术或正式文体。相关名词是comprehension（理解）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>comprehend the meaning</td><td>理解含义</td></tr>\n<tr><td>comprehend the concept</td><td>掌握概念</td></tr>\n<tr><td>comprehend fully</td><td>完全理解</td></tr>\n<tr><td>hard to comprehend</td><td>难以理解</td></tr>\n<tr><td>comprehend a text</td><td>理解一篇文章</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>comprehend</strong>：较正式、学术，强调深层理解，较书面</li>\n<li><strong>understand</strong>：&quot;理解&quot;，最通用，口语和书面都用</li>\n<li><strong>grasp</strong>：&quot;抓住、理解&quot;，较口语，强调抓住要点</li>\n<li><strong>get</strong>：&quot;明白、理解&quot;，最口语化</li>\n<li><strong>fathom</strong>：&quot;理解、测透&quot;，强调努力理解或彻底理解</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>It is difficult to comprehend the complexity of quantum physics. / 很难理解量子物理学的复杂性。</li>\n<li>She could not comprehend why he left without saying goodbye. / 她无法理解他为什么不告别就离开了。</li>\n<li>Most students comprehend the basic concepts of the course. / 大多数学生理解了课程的基本概念。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Comprehend在Task 2写作和阅读理解中常见，特别是讨论理解或学习话题时。用&quot;comprehend&quot;比&quot;understand&quot;更显学术和正式，特别在讨论复杂概念时。相关词&quot;comprehension&quot;在阅读练习中频繁出现。口语中较少使用，书面表达中能体现更高的语言水平。</blockquote>", "anticipate": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> ①预期、期待、预想；②提前做准备；③（事件等）即将发生</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Anticipate表示&quot;预料到某事会发生&quot;或&quot;期待某事&quot;。与expect（期望）相关但更强调主动的预见和准备。可搭配动名词（anticipate doing）或名词。相关名词是anticipation（期待、预期）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>anticipate a problem</td><td>预见问题</td></tr>\n<tr><td>anticipate the future</td><td>期待未来</td></tr>\n<tr><td>anticipate that...</td><td>预期...会发生</td></tr>\n<tr><td>anticipate doing</td><td>期待做某事</td></tr>\n<tr><td>anticipate with pleasure</td><td>期待地等待</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>anticipate</strong>：强调预见、预料，通常有提前准备的含义</li>\n<li><strong>expect</strong>：&quot;期望、预期&quot;，更通用，可以是被动的期待</li>\n<li><strong>foresee</strong>：&quot;预见、看到未来&quot;，强调看到（见）</li>\n<li><strong>predict</strong>：&quot;预测、推断&quot;，较科学、客观</li>\n<li><strong>look forward to</strong>：&quot;期待、盼望&quot;，强调积极心态</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>We anticipate significant changes in the market next year. / 我们预期明年市场会有重大变化。</li>\n<li>She anticipated that he would arrive late. / 她预料到他会迟到。</li>\n<li>I anticipate with great pleasure the opportunity to visit you. / 我期待着有机会来访你。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Anticipate在Task 2（预测、规划话题）和阅读中常见。讨论未来趋势或预期结果时，&quot;anticipate that/doing&quot;是自然学术表达。用&quot;anticipate&quot;比&quot;expect&quot;更显正式和学术性。相关名词&quot;anticipation&quot;也常在阅读理解中出现。口语中较少用，书面表达中能提升语言质量。</blockquote>", "smell": "<p><strong>词性：</strong> 动词（可作名词）</p>\n<p><strong>含义：</strong> ①嗅、闻到（气味）；②发散气味、有气味；③名词：气味、臭味</p>\n<p><strong>语域：</strong> 非正式 / 书面 / 中性；日常和文学语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Smell既可作动词（嗅觉动作或发散气味），也可作名词（气味本身）。作动词时可以是及物动词（smell something）或不及物动词（it smells good）。可以用来描述各种气味，包括好的（pleasant smell）或坏的（bad smell）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>smell good / bad</td><td>闻起来好/坏</td></tr>\n<tr><td>smell like</td><td>闻起来像...</td></tr>\n<tr><td>sense of smell</td><td>嗅觉</td></tr>\n<tr><td>a pleasant / foul smell</td><td>令人愉快/令人厌恶的气味</td></tr>\n<tr><td>smell flowers</td><td>闻花香</td></tr>\n<tr><td>smell danger</td><td>察觉到危险</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>smell</strong>：嗅、闻到、气味，最通用</li>\n<li><strong>scent</strong>：&quot;香味、香气&quot;，较正式、通常指好闻的</li>\n<li><strong>odor / odour</strong>：&quot;气味、臭味&quot;，较正式，中立或贬义</li>\n<li><strong>aroma</strong>：&quot;香气、芳香&quot;，强调怡人的香气</li>\n<li><strong>fragrance</strong>：&quot;香气、芳香&quot;，较正式，指舒适的香气</li>\n<li><strong>stench</strong>：&quot;恶臭&quot;，强烈的坏味道</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>I can smell fresh bread from the kitchen. / 我能从厨房闻到新鲜面包的香气。</li>\n<li>This flower smells wonderful. / 这朵花闻起来很香。</li>\n<li>He smelled danger in the air. / 他察觉到空中有危险。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Smell在Task 1（描写场景、食物）和Task 2（感官体验话题）中常见。讨论五感或环境描写时，&quot;smell good/bad&quot;或&quot;a pleasant smell&quot;是自然表达。能区分smell与scent、aroma等近义词能提升写作精准性。口语Part 1若涉及日常经历话题也可能用到。</blockquote>", "slender": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> ①（身材）苗条的、纤细的；②（物体）细长的、狭长的；③（数量、资源等）微薄的、有限的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；文学和日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Slender主要描述&quot;身材或物体细长优美&quot;。作形容词修饰人时强调苗条而优雅的身材（通常是积极的评价）。也可用于描述物体的形状或数量的有限性。词源自中古英语，与&quot;瘦&quot;相关。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>slender figure / waist</td><td>苗条的身材/腰部</td></tr>\n<tr><td>slender build</td><td>细长的身材</td></tr>\n<tr><td>slender chance / hope</td><td>微薄的机会/希望</td></tr>\n<tr><td>slender resources</td><td>有限的资源</td></tr>\n<tr><td>slender neck</td><td>细长的颈部</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>slender</strong>：强调&quot;纤细、优雅&quot;，通常是积极评价</li>\n<li><strong>thin</strong>：&quot;瘦的、细的&quot;，更中立或可能消极</li>\n<li><strong>slim</strong>：&quot;苗条的、匀称的&quot;，接近但更通用</li>\n<li><strong>lean</strong>：&quot;精瘦的、紧实的&quot;，强调肌肉线条</li>\n<li><strong>narrow</strong>：&quot;狭窄的&quot;，多用于物体宽度</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>She has a slender figure and elegant posture. / 她身材苗条，姿态优雅。</li>\n<li>The slender branches of the willow tree swayed in the wind. / 柳树细长的枝条在风中摇曳。</li>\n<li>They have only a slender chance of winning the match. / 他们只有微薄的赢得比赛的机会。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Slender在Task 1（人物描写）和Task 2（身材、外观话题）中可能出现。描写人的身材时，&quot;slender figure&quot;比&quot;thin&quot;更文雅、更正面。也可用于比喻&quot;微薄的希望&quot;等抽象概念。掌握此词能提升写作的优美程度，特别是在文学性描写中。</blockquote>", "edible": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> 可食用的、能吃的、适合食用的</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；科学、烹饪、日常语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Edible是形容词，表示&quot;适合吃、能安全食用&quot;。通常用来区分哪些东西可以吃，哪些不能吃。相反词是inedible（不能吃的、有毒的）。常搭配名词如plants、fruits、oils等。词源自拉丁文edibilis。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>edible plants / fruits</td><td>可食用的植物/水果</td></tr>\n<tr><td>edible oils</td><td>食用油</td></tr>\n<tr><td>edible flowers</td><td>可食用的花</td></tr>\n<tr><td>edible mushrooms</td><td>可食用的蘑菇</td></tr>\n<tr><td>edible seaweed</td><td>可食用的海草</td></tr>\n<tr><td>edibility</td><td>可食用性</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>edible</strong>：可食用的、安全可吃，较正式学术</li>\n<li><strong>eatable</strong>：&quot;能吃的、可口的&quot;，更通用但较少见</li>\n<li><strong>consumable</strong>：&quot;可消费的&quot;，范围更广</li>\n<li><strong>fit for consumption</strong>：&quot;适合食用&quot;，更正式表达</li>\n<li><strong>safe to eat</strong>：&quot;安全可吃&quot;，更口语化</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Are these mushrooms edible or poisonous? / 这些蘑菇能吃还是有毒的？</li>\n<li>Many edible plants grow wild in the forest. / 许多可食用的植物在森林里野生生长。</li>\n<li>The edible flowers add color and flavor to the dish. / 可食用的花为这道菜增添了颜色和风味。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Edible在Task 1（食物、自然话题）和Task 2（食品安全、营养话题）中可能出现。讨论食物安全或可持续食物来源时，&quot;edible plants&quot;或&quot;edible insects&quot;是自然学术表达。与inedible对比使用能展现词汇准确性。环保话题中&quot;edible packaging&quot;也是新兴用法。</blockquote>", "decent": "<p><strong>词性：</strong> 形容词</p>\n<p><strong>含义：</strong> 体面的、得体的、相当的、还不错的</p>\n<p><strong>语域：</strong> 中性 / 口语 / 非正式；各类语境都常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Decent是常见形容词，有两个主要含义。第一，表示&quot;体面的、得体的、合乎礼仪的&quot;，强调符合社会规范。第二，表示&quot;相当的、还不错的、满意的&quot;，用来评价事物质量或程度。在口语中，&quot;that&#x27;s decent&quot;相当于&quot;还不错、很好&quot;。词源自拉丁文decens（得体的）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>decent person</td><td>体面的人、有操守的人</td></tr>\n<tr><td>decent clothes / appearance</td><td>得体的衣着/外表</td></tr>\n<tr><td>decent income / salary</td><td>相当可观的收入</td></tr>\n<tr><td>decent food</td><td>还不错的食物</td></tr>\n<tr><td>a decent job</td><td>一份不错的工作</td></tr>\n<tr><td>decent standard of living</td><td>相当不错的生活水平</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>decent</strong>：&quot;体面的、相当的&quot;，强调符合规范或质量不错</li>\n<li><strong>respectable</strong>：&quot;值得尊敬的、可敬的&quot;，更强调名誉和社会地位</li>\n<li><strong>acceptable</strong>：&quot;可接受的&quot;，强调达到最低标准</li>\n<li><strong>decent / fairly good</strong>：&quot;相当好的&quot;，日常评价用语</li>\n<li><strong>proper</strong>：&quot;恰当的、得体的&quot;，更正式</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>He comes from a decent family with good reputation. / 他出身于一个体面的、声誉良好的家庭。</li>\n<li>She earns a decent salary as a project manager. / 作为项目经理，她的薪水相当可观。</li>\n<li>We had a decent meal at that restaurant last night. / 我们昨晚在那家餐厅吃了顿不错的饭。</li>\n<li>He wore decent clothes to the job interview. / 他穿得很体面去参加工作面试。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Decent在雅思写作和口语中频繁出现，用于评价生活水平、工作条件、物品质量等。在Task 2写作中，&quot;decent living standard&quot;、&quot;decent income&quot;等搭配可表达社会福利相关话题。在口语Part 2中描述地点或物品时，&quot;it&#x27;s a decent place&quot;是自然的表达。掌握此词能使评价更自然贴切。</blockquote>", "descend": "<p><strong>词性：</strong> 动词</p>\n<p><strong>含义：</strong> 下降、下去、下沉、沿袭、出身于</p>\n<p><strong>语域：</strong> 正式 / 书面 / 中性；学术和文学语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Descend是正式动词，主要表示&quot;向下移动&quot;，强调从高到低的移动方向。可指人物的物理下降（下楼、下山），也可指飞机、太阳等的下降。引申义可表示&quot;社会地位或品德的堕落&quot;或&quot;代代相传、沿袭&quot;。词源自拉丁文descendere。与ascend（上升）相对。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>descend from</td><td>出身于、源于</td></tr>\n<tr><td>descend to</td><td>堕落到、降低到</td></tr>\n<tr><td>descend the stairs</td><td>下楼</td></tr>\n<tr><td>descend the mountain</td><td>下山</td></tr>\n<tr><td>descend into</td><td>陷入、沦为</td></tr>\n<tr><td>descendant</td><td>后代、子孙</td></tr>\n<tr><td>descending order</td><td>降序、递减顺序</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>descend</strong>：&quot;下降、下去&quot;，较正式，强调方向性</li>\n<li><strong>go down</strong>：&quot;下去&quot;，更口语化</li>\n<li><strong>climb down</strong>：&quot;爬下来&quot;，强调用力</li>\n<li><strong>fall</strong>：&quot;掉下、下落&quot;，强调速度和重力</li>\n<li><strong>decline / deteriorate</strong>：&quot;衰退、恶化&quot;，引申义</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>The plane began to descend as it approached the airport. / 飞机接近机场时开始下降。</li>\n<li>She descended the grand staircase in her wedding dress. / 她穿着婚纱沿着宏伟的楼梯走了下来。</li>\n<li>The family descends from a long line of scholars. / 这个家族出身于长期的学者世系。</li>\n<li>The situation descended into chaos and violence. / 局势陷入了混乱和暴力。</li>\n<li>The sun was descending toward the horizon. / 太阳正向地平线下落。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Descend在雅思阅读和写作中常见，特别是在描写变化趋势、社会问题恶化等话题中。Task 1数据描写中，&quot;descending order&quot;（降序）是必须掌握的表达。在Task 2论证中，描述社会滑坡时&quot;descend into&quot;是有力的学术表达。与&quot;ascending&quot;相对使用能展现语言的精准性和对比能力。</blockquote>", "remuneration": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 报酬、酬劳、薪酬、赔偿</p>\n<p><strong>语域：</strong> 正式 / 书面；商务、法律、学术语境常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Remuneration是正式名词，指为工作或服务所得的报酬、薪水或赔偿。比&quot;salary&quot;和&quot;wage&quot;更正式、更书面，通常用于商务沟通、法律文件或学术讨论中。可指现金或其他形式的补偿。相关词包括remunerate（v. 给予报酬）、remunerative（adj. 报酬丰厚的）。词源自拉丁文remunerare（回报）。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>fair remuneration</td><td>公平的报酬</td></tr>\n<tr><td>adequate remuneration</td><td>充分的酬劳</td></tr>\n<tr><td>receive remuneration for</td><td>因...获得报酬</td></tr>\n<tr><td>remuneration package</td><td>薪酬福利包</td></tr>\n<tr><td>financial remuneration</td><td>经济赔偿</td></tr>\n<tr><td>reasonable remuneration</td><td>合理的薪酬</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>remuneration</strong>：&quot;报酬、酬劳&quot;，较正式，包括薪水、奖金等全面补偿</li>\n<li><strong>salary</strong>：&quot;薪水、月薪&quot;，通常指固定的月薪，较通用</li>\n<li><strong>wage</strong>：&quot;工资、报酬&quot;，通常指按时计酬（小时工资），更口语</li>\n<li><strong>compensation</strong>：&quot;补偿、赔偿&quot;，范围更广，可指经济赔偿</li>\n<li><strong>payment</strong>：&quot;付款、报酬&quot;，更通用，强调支付行为</li>\n<li><strong>fee</strong>：&quot;费用、酬金&quot;，通常指专业人士的报酬</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>Employees are entitled to fair remuneration for their work. / 员工有权获得公平的工作报酬。</li>\n<li>The company offers an attractive remuneration package including bonuses and benefits. / 公司提供具有吸引力的薪酬方案，包括奖金和福利。</li>\n<li>She received substantial financial remuneration for her expertise and consultation. / 她因其专业知识和咨询意见获得了可观的经济报酬。</li>\n<li>The agreement specifies the terms of remuneration for the contracted services. / 协议规定了承包服务的报酬条款。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Remuneration在Task 2写作中常见，特别是讨论工作、薪酬、职业发展、福利待遇等话题。&quot;fair remuneration&quot;、&quot;remuneration package&quot;等搭配是学术表达的亮点词汇。在讨论劳动权益、性别薪酬差异等社会问题时，此词比简单的&quot;salary&quot;更显正式和权威性。掌握此词能提升Task 2论文的学术质感。</blockquote>", "vocation": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 职业、使命、天职、呼召</p>\n<p><strong>语域：</strong> 正式 / 书面；文学、宗教、职业话题常见</p>\n<p><strong>用法说明：</strong></p>\n<p>Vocation是较为正式的名词，指一个人感到被&quot;召唤&quot;去从事的职业或工作，强调职业的使命感、热情和天职属性。不仅指工作本身，更强调与个人价值观、兴趣和天赋的契合。常用于描述教师、医生、社工等具有服务精神的职业。词源自拉丁文vocatio（召唤、职业）。与&quot;occupation&quot;相比，vocation更具精神层面和使命感。</p>\n<table>\n<tr><th>搭配</th><th>含义</th></tr>\n<tr><td>find one&#x27;s vocation</td><td>找到自己的天职</td></tr>\n<tr><td>a true vocation</td><td>真正的职业使命</td></tr>\n<tr><td>teaching vocation</td><td>教师职业（强调使命）</td></tr>\n<tr><td>vocational training</td><td>职业培训</td></tr>\n<tr><td>vocational school</td><td>职业学校</td></tr>\n<tr><td>sense of vocation</td><td>职业使命感</td></tr>\n</table>\n<p><strong>近义词辨析：</strong></p>\n<ul>\n<li><strong>vocation</strong>：&quot;职业、天职&quot;，强调使命感和热情，较正式</li>\n<li><strong>occupation</strong>：&quot;职业、工作&quot;，更中立和通用</li>\n<li><strong>profession</strong>：&quot;专业、职业&quot;，通常指需要专业资格的工作</li>\n<li><strong>job</strong>：&quot;工作、职位&quot;，较口语化，泛指所有工作</li>\n<li><strong>calling</strong>：&quot;召唤、天职&quot;，更文学、强调精神使命</li>\n</ul>\n<p><strong>例句：</strong></p>\n<ul>\n<li>She felt teaching was her true vocation, not just a job. / 她觉得教学是她真正的天职，而不仅仅是一份工作。</li>\n<li>His vocation as a doctor allowed him to serve the community. / 作为医生的职业使命让他能服务社区。</li>\n<li>Many young people struggle to find their vocations in life. / 许多年轻人苦于找不到人生的职业使命。</li>\n<li>Vocational training programs help students develop practical skills. / 职业培训课程帮助学生发展实际技能。</li>\n</ul>\n<blockquote><strong>雅思备考提示：</strong> Vocation在Task 2写作中用于讨论职业选择、工作意义、职业发展等话题时能体现更深层的思考。与&quot;occupation&quot;对比使用，&quot;vocation&quot;强调的是职业的意义和热情，而&quot;occupation&quot;更中立客观。在描述职业满足感、人生使命时，&quot;vocation&quot;是更有表达力的选择，能提升论文的文化品味。</blockquote>", "occupation": "<p><strong>词性：</strong> 名词</p>\n<p><strong>含义：</strong> 职业、工作、占领、
